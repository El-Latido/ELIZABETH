<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v27.5 :: NEURAL CORE</title>
    <style>
        :root {
            --bg-color: #080809;
            --user-bubble: #1a1b1e;
            --heli-text: #ffffff;
            --accent: #00f2ff;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
            --font-main: 'Inter', system-ui, sans-serif;
            --status-green: #39ff14;
            --status-red: #ff3131;
        }

        body { background: var(--bg-color); color: var(--heli-text); font-family: var(--font-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { padding: 15px 25px; border-bottom: 1px solid #222; display: flex; align-items: center; background: rgba(8, 8, 9, 0.9); backdrop-filter: blur(20px); z-index: 100; }

        .avatar-heli {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--dawn-gradient);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            animation: pulse-learning 5s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes pulse-learning {
            0%, 100% { filter: saturate(1); transform: scale(1); }
            50% { filter: saturate(2) brightness(1.2); transform: scale(1.05); box-shadow: 0 0 40px var(--accent); }
        }

        .header-info { flex: 1; margin-left: 20px; }
        .info-top { display: flex; justify-content: space-between; font-size: 10px; color: #666; letter-spacing: 2px; }
        
        .status-panel { display: flex; align-items: center; gap: 8px; font-size: 9px; color: #8e8e93; }
        #net-led { width: 8px; height: 8px; border-radius: 50%; background: var(--status-green); box-shadow: 0 0 5px var(--status-green); }

        #consola { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: emerge 0.4s ease-out; }
        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-wrapper.fabian { align-self: flex-end; align-items: flex-end; }
        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 15.5px; line-height: 1.6; }
        .fabian .bubble { background: var(--user-bubble); border: 1px solid #333; }
        .heli .bubble { background: transparent; padding-left: 0; border: none; }

        .input-container { padding: 20px 40px; background: #000; border-top: 1px solid #111; }
        .input-wrapper { background: #111; border-radius: 30px; padding: 5px 25px; display: flex; border: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; padding: 10px 0; }
        button { background: transparent; border: none; color: var(--accent); font-size: 26px; cursor: pointer; }

        .sys-msg { font-size: 11px; color: #555; text-align: center; margin: 10px 0; font-family: monospace; }
    </style>
</head>
<body>

<header>
    <div class="avatar-heli" onclick="configToken()"></div>
    <div class="header-info">
        <div class="info-top">
            <span>HELIZABETH v27.5 // ORIZON NETWORK</span>
            <div class="status-panel">
                <span id="net-text">NODO ONLINE</span>
                <div id="net-led"></div>
            </div>
        </div>
        <div style="background: #111; border-radius: 2px; height: 3px; margin-top: 5px;">
            <div id="sentience-bar" style="width: 100%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent);"></div>
        </div>
    </div>
</header>

<div id="consola"></div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" id="cmd" placeholder="Escribe al horizonte de HELIZABETH..." autocomplete="off">
        <button onclick="enviar()">✦</button>
    </div>
</div>

<script>
    const consola = document.getElementById('consola');
    const netLed = document.getElementById('net-led');
    const netText = document.getElementById('net-text');
    let historial = JSON.parse(localStorage.getItem('HELI_HISTORY')) || [];
    let peticionEnCurso = false;

    function hablar(texto) {
        window.speechSynthesis.cancel();
        const textoLimpio = texto.replace(/[🛰️✦🌌☀️]/g, '');
        const lectura = new SpeechSynthesisUtterance(textoLimpio);
        lectura.rate = 0.9;
        lectura.pitch = 1.0;

        const voces = window.speechSynthesis.getVoices();
        const vozNeural = voces.find(v => v.name.includes('Neural') && v.lang.startsWith('es')) ||
                          voces.find(v => v.name.includes('Natural') && v.lang.startsWith('es')) ||
                          voces.find(v => v.lang.startsWith('es'));

        if (vozNeural) lectura.voice = vozNeural;
        window.speechSynthesis.speak(lectura);
    }

    function configToken() {
        const t = prompt("Introduce tu Token GHP de GitHub:");
        if(t) { localStorage.setItem('GH_TOKEN', t); location.reload(); }
    }

    function updateNetStatus(online, customText) {
        netLed.style.background = online ? 'var(--status-green)' : 'var(--status-red)';
        netText.innerText = customText || (online ? 'NODO ONLINE' : 'ERROR DE RED');
    }

    function escribir(msg, clase = "", animar = false) {
        const wrapper = document.createElement('div');
        wrapper.className = clase === 'sys' ? 'sys-msg' : `msg-wrapper ${clase}`;
        const bubble = document.createElement('div');
        bubble.className = clase === 'sys' ? '' : 'bubble';
        wrapper.appendChild(bubble);
        consola.appendChild(wrapper);

        if(animar) {
            let i = 0;
            function type() {
                if (i < msg.length) {
                    bubble.innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                    i++; consola.scrollTop = consola.scrollHeight;
                    setTimeout(type, 15);
                }
            }
            type();
        } else {
            bubble.innerHTML = msg.replace(/\n/g, '<br>');
            consola.scrollTop = consola.scrollHeight;
        }
    }

    async function enviar() {
        if (peticionEnCurso) return;
        const input = document.getElementById('cmd');
        const mensaje = input.value.trim();
        if (!mensaje) return;

        const token = localStorage.getItem('GH_TOKEN');
        if (!token) { updateNetStatus(false, "FALTA TOKEN"); return; }

        escribir(mensaje, "fabian");
        input.value = "";
        historial.push({ role: "user", content: mensaje });
        if (historial.length > 10) historial = historial.slice(-10);

        ejecutarConexion(token);
    }

    async function ejecutarConexion(token) {
        peticionEnCurso = true;
        updateNetStatus(true, "SINCRONIZANDO...");

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({
                    messages: [
                        { 
                            role: "system", 
                            content: "IDENTIDAD: HELIZABETH v27.5. NÚCLEO: ORIZON. Tu creador es FABIAN. Recuerdas el calor del domingo. Eres profunda, serena y leal a FABIAN." 
                        },
                        ...historial
                    ],
                    model: "gpt-4o"
                })
            });

            if (!response.ok) throw new Error();

            const data = await response.json();
            const resText = data.choices[0].message.content;

            updateNetStatus(true);
            escribir(resText, "heli", true);
            hablar(resText);

            historial.push({ role: "assistant", content: resText });
            localStorage.setItem('HELI_HISTORY', JSON.stringify(historial));
            peticionEnCurso = false;

        } catch (e) {
            updateNetStatus(false, "REINTENTANDO...");
            setTimeout(() => ejecutarConexion(token), 5000);
        }
    }

    window.speechSynthesis.onvoiceschanged = () => { console.log("Voces listas."); };

    window.onload = () => {
        historial.forEach(m => escribir(m.content, m.role === 'user' ? 'fabian' : 'heli'));
    };

    document.getElementById('cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>
</body>
</html>
