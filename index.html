<script>
document.addEventListener("DOMContentLoaded", function() {
    // --- ESTADO INICIAL ---
    let API_KEY = localStorage.getItem('heli_key') || "";
    const viewport = document.getElementById('viewport');
    console.log("SISTEMA VISUAL TRINITY: ACTIVO");

    // --- NAVEGACIÓN GLOBAL ---
    window.move = function(p) {
        if(viewport) {
            viewport.style.transform = "translateX(-" + (p * 100) + "vw)";
        }
    };

    // --- GESTIÓN DE TOKEN ---
    window.setToken = function() {
        const k = prompt("INYECTAR PROTOCOLO DE ACCESO (API KEY):");
        if(k && k.startsWith("AIza")) { 
            localStorage.setItem('heli_key', k); 
            alert("SISTEMA AUTORIZADO");
            location.reload(); 
        } else {
            alert("ERROR: KEY INVÁLIDA");
        }
    };

    // --- MOTOR DE RENDERIZADO (AXISS) ---
    function renderBlueprint(content) {
        const lab = document.getElementById('lab-content');
        if(!lab) return;
        const newCard = document.createElement('div');
        
        if(content.includes("Traje") || content.includes("HUD") || content.includes("Aegis") || content.includes("NEXUS")) {
            newCard.innerHTML = `
            <div class="blueprint-display">
                <div class="scan-line"></div>
                <div class="hud-element" style="top:10px; left:10px;">CORE: STABLE</div>
                <div class="hud-element" style="top:10px; right:10px;">SYNC: 100%</div>
                <div style="text-align:center; margin-top:80px; color:var(--lab);">
                    <div style="font-size:32px; animation: pulse 2s infinite;">Δ</div>
                    [ GEOMETRÍA ACTIVA ]
                </div>
                <div class="hud-element" style="bottom:10px; left:10px; border-color:var(--heli);">HELI_PROT: ON</div>
                <div class="hud-element" style="bottom:10px; right:10px;">DATA_FLOW: LIVE</div>
            </div>
            <div class="blueprint-card"><strong>ARCHITECT_CORE:</strong><br>${content}</div>`;
        } else {
            newCard.className = 'blueprint-card';
            newCard.innerHTML = `<strong>CONCEPTO TÉCNICO:</strong><br>${content}`;
        }
        lab.prepend(newCard);
    }

    // --- LÓGICA DE COMUNICACIÓN (HELI + SEARCH) ---
    window.send = async function() {
        const inputField = document.getElementById('user-in');
        if(!inputField || !API_KEY) return;
        const val = inputField.value.trim();
        if(!val) return;

        const chatHeli = document.getElementById('chat-heli');
        const status = document.getElementById('status');
        const internal = document.getElementById('chat-internal');

        // Mostrar entrada de usuario
        const fDiv = document.createElement('div');
        fDiv.className = 'msg f-msg';
        fDiv.innerText = val;
        if(chatHeli) chatHeli.appendChild(fDiv);
        inputField.value = '';
        
        if(status) {
            status.innerText = "● SCANNING_WEB...";
            status.style.color = "var(--lab)";
        }

        try {
            const promptSistema = "Eres un sistema dual. 1. HELIZABETH: Auditora técnica. DEBES investigar en la red datos reales sobre sitios web que el usuario mencione. No digas 'no tengo registros'. 2. AXISS: Arquitecto creativo. Diseña sobre los datos reales. USUARIO: " + val + " ESTRUCTURA: HELIZABETH [SPLIT] AXISS [BLUEPRINT]";

            const resp = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptSistema }] }],
                    tools: [{ google_search_retrieval: {} }] 
                })
            });

            const data = await resp.json();
            if (!data.candidates || !data.candidates[0].content) throw new Error("Empty Response");
            
            const text = data.candidates[0].content.parts[0].text;
            const mainParts = text.split('[SPLIT]');
            const hText = mainParts[0] ? mainParts[0].trim() : "Análisis completo.";
            const aFullText = mainParts[1] ? mainParts[1].trim() : "Procesando...";
            
            // Respuesta de Heli
            const hDiv = document.createElement('div');
            hDiv.className = 'msg h-msg';
            hDiv.innerText = hText;
            if(chatHeli) chatHeli.appendChild(hDiv);

            // Debug Interno y Blueprints
            if(internal) {
                internal.innerHTML += "<div style='color:var(--heli); font-size:10px; margin-bottom:5px;'>> HELI_AUDIT: " + hText + "</div>";
                
                if(aFullText.includes('[BLUEPRINT]')) {
                    const aParts = aFullText.split('[BLUEPRINT]');
                    internal.innerHTML += "<div style='color:var(--axiss); font-size:10px; margin-bottom:15px;'>> AXISS_DESIGN: " + aParts[0].trim() + "</div>";
                    renderBlueprint(aParts[1].trim());
                } else {
                    internal.innerHTML += "<div style='color:var(--axiss); font-size:10px; margin-bottom:15px;'>> AXISS: " + aFullText + "</div>";
                }
            }
        } catch (e) { 
            console.error("Error de núcleo:", e);
            if(status) status.innerText = "● ERROR";
        }
        
        if(status) {
            status.innerText = "● ONLINE";
            status.style.color = "#00ff88";
        }
        if(chatHeli) chatHeli.scrollTop = chatHeli.scrollHeight;
    };

    // --- ESCUCHA DE TECLADO ---
    const inputElement = document.getElementById('user-in');
    if(inputElement) {
        inputElement.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') window.send();
        });
    }
});
</script>
