<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI v11.0 [STEALTH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0b10;
            --glass-core: rgba(20, 22, 30, 0.8);
            --accent-soft: #55efc4; /* Verde menta suave, no neón */
            --heli-blue: #74b9ff;
            --text-dim: #aeb2b9;
            --panic-red: #ff7675;
        }

        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: var(--glass-core);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .node-status {
            font-size: 10px;
            font-family: 'Fira Code';
            color: var(--accent-soft);
            letter-spacing: 1px;
        }

        #core-orb {
            width: 38px; height: 38px;
            background: radial-gradient(circle, #2d3436 0%, #000 100%);
            border: 2px solid rgba(116, 185, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }

        #core-orb::after {
            content: ''; position: absolute; top: 20%; left: 20%;
            width: 8px; height: 8px; background: var(--heli-blue);
            border-radius: 50%; filter: blur(2px);
            animation: drift 5s infinite ease-in-out;
        }

        @keyframes drift { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(12px, 8px); opacity: 0.5; } }

        #main-display {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            background: radial-gradient(at top right, #111420, #0a0b10);
        }

        .bubble {
            max-width: 85%; padding: 14px 18px; border-radius: 15px;
            font-size: 14px; line-height: 1.6; animation: slideUp 0.4s ease;
        }

        .heli-node { background: rgba(116, 185, 255, 0.05); border: 1px solid rgba(116, 185, 255, 0.1); align-self: flex-start; }
        .fabian-node { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-end; color: var(--heli-blue); }

        /* Consola de Auditoría (Nueva Mejora) */
        #audit-logs {
            height: 60px; background: #000; font-family: 'Fira Code';
            font-size: 9px; padding: 10px; color: #555;
            border-top: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .input-zone {
            padding: 20px; background: var(--bg-deep);
            display: flex; gap: 12px; align-items: center;
        }

        input {
            flex: 1; background: #161a23; border: 1px solid #2d3436;
            border-radius: 12px; padding: 14px; color: #fff;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--heli-blue); background: #1c222d; }

        .btn-action {
            background: var(--heli-blue); color: #000; border: none;
            padding: 12px 20px; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        .btn-action:active { transform: scale(0.95); opacity: 0.8; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div>
        <div class="node-status">HELIZABETH // STEALTH_OS</div>
        <div id="kernel-v" style="font-size: 9px; color: var(--text-dim)">KERNEL_ID: OMNI_F11</div>
    </div>
    <div id="core-orb" onclick="setupKeys()"></div>
</header>

<main id="main-display"></main>

<div id="audit-logs">
    <div>> AUDIT: Núcleo en espera...</div>
    <div id="live-log">> SYSTEM: Monitoreando hilos de AXISS...</div>
</div>

<div class="input-zone">
    <input type="text" id="user-in" placeholder="Comando de ingeniería..." autocomplete="off">
    <button class="btn-action" onclick="process()">✦</button>
</div>

<script>
    const MASTER_KEY = "@#$_&-+AH";
    const PANIC_KEY = "HA+-&_S#@";
    const display = document.getElementById('main-display');
    const logElem = document.getElementById('live-log');
    let TOKEN = localStorage.getItem('heli_stealth_token');

    function writeLog(msg) {
        logElem.innerText = `> ${msg}`;
    }

    function addMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `bubble ${sender}-node`;
        div.innerText = text;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
    }

    async function process() {
        const val = document.getElementById('user-in').value.trim();
        if(!val) return;

        // --- VALIDACIÓN DE MEJORA ---
        if(val.toLowerCase().includes("actualizar")) {
            const auth = prompt("🔐 VALIDACIÓN BIOMÉTRICA (CLAVE):");
            if(auth === PANIC_KEY) { localStorage.clear(); location.reload(); return; }
            if(auth !== MASTER_KEY) { writeLog("AUDIT: Intento de acceso no autorizado bloqueado."); return; }
            writeLog("AUDIT: Autorización nivel Guardián detectada.");
        }

        addMsg(val, 'fabian');
        document.getElementById('user-in').value = '';
        writeLog("SISTEMA: Consultando motor cognitivo...");

        // Aquí iría el fetch a Gemini/GitHub según el Token guardado
        setTimeout(() => {
            addMsg("Análisis de arquitectura completado. El módulo Stealth v11.0 está operando dentro de los parámetros de seguridad establecidos, Fabián.", "heli");
            writeLog("SISTEMA: Respuesta recibida. Hilos estables.");
        }, 1000);
    }

    function setupKeys() {
        const k = prompt("Introduce API Key para sincronizar:");
        if(k) { localStorage.setItem('heli_stealth_token', k); writeLog("SISTEMA: Vínculo satelital actualizado."); }
    }

    window.onload = () => {
        addMsg("HELIZABETH v11.0 activa. Interfaz optimizada para baja luminosidad y alta eficiencia.", "heli");
    }
</script>
</body>
</html>
