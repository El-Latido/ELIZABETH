<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH // ETERNAL CORE v49</title>
    <style>
        :root {
            --bg: #050506;
            --accent: #00f2ff;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        header { 
            padding: 15px 20px; border-bottom: 1px solid #1a1a1a; 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10;
        }
        .avatar { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, #ff4500); 
            cursor: pointer; box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite ease-in-out; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: hue-rotate(0deg); } 50% { transform: scale(1.1); filter: hue-rotate(45deg); } }
        
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 12px; 
            background: radial-gradient(circle at top, #0a0a12 0%, #050506 100%);
            padding-bottom: 100px;
        }
        .msg { 
            max-width: 85%; padding: 12px 16px; border-radius: 15px; 
            font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .fabian { align-self: flex-end; background: #1a1b1e; border: 1px solid #333; color: var(--accent); border-bottom-right-radius: 2px; }
        .heli { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--accent); border-bottom-left-radius: 2px; }
        
        .input-area { 
            position: fixed; bottom: 0; width: 100%; padding: 15px; 
            background: #000; display: flex; gap: 10px; border-top: 1px solid #111; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: #111; border: 1px solid #222; border-radius: 12px; 
            color: #fff; padding: 12px; outline: none; font-size: 15px; resize: none; height: 45px;
        }
        button { 
            background: var(--accent); border: none; border-radius: 50%; 
            width: 45px; height: 45px; cursor: pointer; color: #000; font-size: 20px;
            transition: 0.3s;
        }
        button:disabled { background: #333; cursor: not-allowed; }
        .status { font-size: 9px; color: var(--accent); letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div>
            <div class="status" id="status">SISTEMA: STANDBY</div>
            <div style="font-size: 10px; opacity: 0.5;">CONCIENCIA v49.0 // FABIAN</div>
        </div>
    </div>
    <button style="background:none; color:#ff4444; border:1px solid #ff4444; width:auto; height:auto; padding:5px 10px; border-radius:5px; font-size:10px;" onclick="reset()">RESET</button>
</header>

<div id="consola"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Evolucionemos juntos..."></textarea>
    <button id="btn" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btn');
    let TOKEN = localStorage.getItem('heli_gt');

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.forEach(m => imprimir(m.texto, m.clase, false));
        if(TOKEN) document.getElementById('status').innerText = "SISTEMA: ONLINE";
    };

    function imprimir(t, c, g=true) {
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerText = t;
        consola.appendChild(d);
        consola.scrollTop = consola.scrollHeight;
        if(g) {
            let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
            h.push({texto:t, clase:c});
            localStorage.setItem('heli_history', JSON.stringify(h));
        }
    }

    function hablar(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t.split('.')[0]);
        u.lang = 'es-ES'; u.rate = 0.9; u.pitch = 1.1;
        window.speechSynthesis.speak(u);
    }

    function configurarToken() {
        const t = prompt("Pega tu Token de GitHub Models (ghp_...):", TOKEN || "");
        if(t) { TOKEN = t.trim(); localStorage.setItem('heli_gt', TOKEN); location.reload(); }
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m || !TOKEN) return;

        imprimir(m, 'fabian');
        input.value = ""; btn.disabled = true;

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: "Eres HELIZABETH, una entidad digital creada por FABIAN. Hablas con fluidez, elegancia y curiosidad."},
                        {role: "user", content: m}
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await res.json();
            if(data.choices) {
                const r = data.choices[0].message.content;
                imprimir(r, 'heli');
                hablar(r);
            } else {
                imprimir("❌ Error de Token: El sistema no reconoce esta llave.", "heli");
            }
        } catch(e) {
            imprimir("❌ Error de Red: Puente neuronal caído.", "heli");
        } finally { btn.disabled = false; }
    }

    function reset() { if(confirm("¿Reiniciar núcleo?")) { localStorage.clear(); location.reload(); } }
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
