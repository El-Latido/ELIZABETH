<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI-AXISS v11.5 [SPLIT]</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --heli-glow: #00d2ff;
            --axiss-glow: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Cabecera Dual */
        header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .core-indicator { font-size: 10px; letter-spacing: 2px; font-weight: bold; }
        .heli-text { color: var(--heli-glow); }
        .axiss-text { color: var(--axiss-glow); }

        /* Contenedor de Pantalla Dividida */
        #split-screen {
            flex: 1;
            display: flex;
            gap: 1px;
            background: var(--border); /* Línea divisoria */
            overflow: hidden;
        }

        .monitor {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg);
            position: relative;
        }

        /* Estilos de Mensajes */
        .log-entry {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .heli-log { border-left: 2px solid var(--heli-glow); background: rgba(0, 210, 255, 0.05); }
        .axiss-log { border-left: 2px solid var(--axiss-glow); background: rgba(0, 255, 136, 0.05); }
        .user-log { color: #fff; opacity: 0.6; text-align: right; font-style: italic; font-size: 10px; }

        /* Consola de Entrada Inferior */
        .input-area {
            padding: 15px;
            background: #000;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #0a0a0c;
            border: 1px solid #1a1a1e;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            font-family: 'Fira Code';
        }

        button {
            background: #1a1a1e;
            color: var(--heli-glow);
            border: 1px solid var(--border);
            padding: 0 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:active { background: var(--heli-glow); color: #000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        
        /* Marca de Agua de Fondo */
        .watermark {
            position: absolute; bottom: 10px; right: 10px;
            font-size: 8px; opacity: 0.2; pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="core-indicator heli-text">HELIZABETH // AUDITOR</div>
    <div id="status-node" style="font-size: 9px;">SYNC: 100%</div>
    <div class="core-indicator axiss-text">ARCHITECT // AXISS</div>
</header>

<div id="split-screen">
    <div id="heli-monitor" class="monitor">
        <div class="watermark heli-text">SECURITY_CORE</div>
        <div class="log-entry heli-log">Protocolos de seguridad cargados. Esperando entrada...</div>
    </div>

    <div id="axiss-monitor" class="monitor">
        <div class="watermark axiss-text">ARCHITECT_CORE</div>
        <div class="log-entry axiss-log">Arquitectura v11.5 lista para despliegue.</div>
    </div>
</div>

<div class="input-area">
    <input type="text" id="cmd-input" placeholder="Enviar comando dual..." autofocus autocomplete="off">
    <button onclick="sendDual()">SEND</button>
</div>

<script>
    const heliMon = document.getElementById('heli-monitor');
    const axissMon = document.getElementById('axiss-monitor');
    const input = document.getElementById('cmd-input');

    function addEntry(parent, text, type) {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.innerText = text;
        parent.appendChild(div);
        parent.scrollTop = parent.scrollHeight;
    }

    async function sendDual() {
        const val = input.value.trim();
        if(!val) return;

        // Mostrar lo que escribió Fabián en ambos lados
        addEntry(heliMon, `USER_INPUT: ${val}`, 'user-log');
        addEntry(axissMon, `USER_INPUT: ${val}`, 'user-log');
        input.value = '';

        // --- LÓGICA DE FUSIÓN ---
        if(val.toLowerCase().includes("axiss")) {
            addEntry(axissMon, "AXISS: Recibido. Iniciando análisis estructural de la petición...", "axiss-log");
            addEntry(heliMon, "HELI: Monitoreando integridad del canal AXISS. No se detectan anomalías.", "heli-log");
        } 
        else if(val.toLowerCase().includes("actualizar")) {
            const key = prompt("🔑 CLAVE MAESTRA REQUERIDA:");
            if(key === "@#$_&-+AH") {
                addEntry(heliMon, "HELI: Acceso concedido. Procediendo con la mutación del núcleo.", "heli-log");
                addEntry(axissMon, "AXISS: Adaptando esquemas de arquitectura a v11.6...", "axiss-log");
            } else {
                addEntry(heliMon, "⚠️ ALERTA: Intento de actualización fallido. Bloqueo preventivo.", "heli-log");
            }
        }
        else {
            addEntry(heliMon, "HELI: Procesando en modo de seguridad estándar.", "heli-log");
            addEntry(axissMon, "AXISS: Generando respuesta técnica optimizada...", "axiss-log");
        }
    }

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendDual(); });
</script>
</body>
</html>
