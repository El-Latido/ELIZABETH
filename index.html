<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI v12.5 [G2.5_FLASH]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #08090b; --heli: #00d2ff; --axiss: #00ff88; --glass: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; overflow: hidden; }
        #viewport { display: flex; width: 200vw; height: 100vh; transition: transform 0.4s ease-in-out; }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: #000; }
        .orb { width: 35px; height: 35px; border-radius: 50%; background: var(--heli); border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 15px var(--heli); }
        #chat-heli, #chat-internal { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .h-msg { background: var(--glass); border-left: 3px solid var(--heli); align-self: flex-start; }
        .f-msg { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--heli); align-self: flex-end; color: var(--heli); }
        .int-msg { margin-bottom: 8px; font-family: 'Fira Code', monospace; font-size: 10px; color: #555; }
        .nav-arrow { position: absolute; top: 50%; width: 45px; height: 45px; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border-radius: 50%; border: 1px solid var(--heli); }
        .to-right { right: 10px; color: var(--axiss); }
        .to-left { left: 10px; color: var(--heli); }
        .input-bar { position: absolute; bottom: 0; width: 100%; padding: 15px; background: #000; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        .btn-send { background: var(--heli); border: none; width: 55px; border-radius: 10px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="viewport">
    <div class="page">
        <header>
            <div class="orb" onclick="setToken()"></div>
            <div style="font-weight: 600; font-size: 14px;">HELI v12.5 [G2.5_CORE]</div>
            <div id="status-ind" style="font-size: 9px; color: #ff4757;">● OFFLINE</div>
        </header>
        <div id="chat-heli">
            <div class="msg h-msg">Sistemas actualizados a Gemini 2.5 Flash, Fabián. Re-inyecta el token para activar el nuevo motor.</div>
        </div>
        <div class="nav-arrow to-right" onclick="move(1)">→</div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="Escribir a Heli..." autocomplete="off">
            <button class="btn-send" onclick="send()">✦</button>
        </div>
    </div>

    <div class="page" style="background:#000">
        <header><div style="color: var(--axiss); font-size: 12px;">DEEP_CORE_DEBUG_v2.5</div></header>
        <div id="chat-internal">
            <div class="int-msg">> [LOG]: Motor 2.5 Flash seleccionado.</div>
        </div>
        <div class="nav-arrow to-left" onclick="move(0)">←</div>
    </div>
</div>

<script>
    window.MY_KEY = localStorage.getItem('heli_key') || "";
    const status = document.getElementById('status-ind');

    function updateStatus() {
        if(window.MY_KEY && window.MY_KEY.length > 10) {
            status.innerText = "● ONLINE (2.5)";
            status.style.color = "#00ff88";
        }
    }
    updateStatus();

    function move(p) { document.getElementById('viewport').style.transform = `translateX(-${p*100}vw)`; }

    function setToken() {
        const k = prompt("Inyectar API Key Gemini:");
        if(k) {
            window.MY_KEY = k.trim();
            localStorage.setItem('heli_key', window.MY_KEY);
            updateStatus();
            document.getElementById('chat-internal').innerHTML += `<div class="int-msg" style="color:var(--axiss)">> [DEBUG]: Token 2.5 detectado.</div>`;
        }
    }

    async function send() {
        const val = document.getElementById('user-in').value.trim();
        if(!val || !window.MY_KEY) return;

        // Render Fabián
        const fDiv = document.createElement('div');
        fDiv.className = 'msg f-msg'; fDiv.innerText = val;
        document.getElementById('chat-heli').appendChild(fDiv);
        document.getElementById('user-in').value = '';

        const iChat = document.getElementById('chat-internal');
        iChat.innerHTML += `<div class="int-msg">> [CALL]: Transmitiendo a Gemini 2.5 Flash...</div>`;

        try {
            // URL ACTUALIZADA AL MODELO GEMINI 2.5 FLASH
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${window.MY_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Responde como HELIZABETH (auditora) y AXISS (arquitecto). Usuario: "${val}". Separa con [SPLIT].` }] }] })
            });

            const data = await resp.json();
            if(data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            const parts = text.split('[SPLIT]');

            const hDiv = document.createElement('div');
            hDiv.className = 'msg h-msg'; hDiv.innerText = parts[0].trim();
            document.getElementById('chat-heli').appendChild(hDiv);

            iChat.innerHTML += `<div class="int-msg" style="color:var(--heli)">HELI: ${parts[0].trim()}</div>`;
            iChat.innerHTML += `<div class="int-msg" style="color:var(--axiss)">AXISS: ${parts[1] || "Sincronizando..." }</div>`;

        } catch (e) {
            iChat.innerHTML += `<div class="int-msg" style="color:red">> [ERROR]: ${e.message}</div>`;
            if(e.message.includes("2.5-flash")) {
                 iChat.innerHTML += `<div class="int-msg">> Sugerencia: El modelo 2.5 podría estar en otra región de API. Intentando fallback...</div>`;
            }
        }
        document.getElementById('chat-heli').scrollTop = document.getElementById('chat-heli').scrollHeight;
    }
</script>
</body>
</html>
