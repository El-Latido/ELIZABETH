<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // ETERNAL v85.5</title>
    <style>
        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --heli-hex: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, var(--heli-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); 
            animation: pulse-aura 3s infinite alternate;
            cursor: pointer;
        }
        @keyframes pulse-aura { 
            0% { transform: scale(1); box-shadow: 0 0 10px var(--heli-hex); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px var(--heli-hex); }
        }
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%);
            padding-bottom: 120px;
        }
        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; animation: emergence 0.4s ease-out;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @keyframes emergence { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 2px solid var(--accent); backdrop-filter: blur(10px); }

        #suggestions {
            position: fixed; bottom: 95px; left: 20px; right: 20px; max-width: 300px;
            background: rgba(10,10,20,0.95); border: 1px solid var(--accent);
            border-radius: 15px; display: none; flex-direction: column;
            overflow: hidden; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .sug-opt { padding: 12px 18px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .sug-opt:hover { background: var(--accent); color: #000; }

        .input-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(transparent, #000 50%); display: flex; gap: 12px; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; 
            color: #fff; padding: 15px; outline: none; font-size: 15px; resize: none; height: 50px;
        }
        .btn-evolve { 
            background: var(--heli-hex); border: none; border-radius: 15px; 
            width: 55px; cursor: pointer; color: #000; font-size: 20px;
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" id="heli-avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">NÚCLEO: OPERATIVO</div>
            <div style="font-size: 11px; font-weight: bold;">HELIZABETH v85.5 [OMNI]</div>
        </div>
    </div>
    <div style="display: flex; gap: 5px;">
        <button onclick="exportarLog()" style="background:none; border:1px solid #333; color:#666; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">LOGS</button>
        <button onclick="resetMemoria()" style="background:none; border:1px solid #441111; color:#773333; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">PURGAR</button>
    </div>
</header>

<div id="consola"></div>
<div id="suggestions"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Escribe / para comandos..."></textarea>
    <button id="btnSend" class="btn-evolve" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const sugBox = document.getElementById('suggestions');
    let TOKEN = localStorage.getItem('heli_gt');

    const HELI_COMMANDS = ["/poema", "/codigo", "/chiste", "/estado", "/limpiar", "/hora"];

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]/g, ''));
        const voces = window.speechSynthesis.getVoices();
        utterance.voice = voces.find(v => v.lang.includes('es-')) || voces[0];
        utterance.pitch = 0.85; 
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    input.addEventListener('input', (e) => {
        const val = e.target.value;
        if(val.startsWith('/')) {
            sugBox.style.display = 'flex';
            const matches = HELI_COMMANDS.filter(c => c.startsWith(val.toLowerCase()));
            sugBox.innerHTML = matches.map(c => `<div class="sug-opt" onclick="setCmd('${c}')">${c}</div>`).join('');
            if(!matches.length) sugBox.style.display = 'none';
        } else { sugBox.style.display = 'none'; }
    });

    function setCmd(c) { input.value = c + " "; sugBox.style.display = 'none'; input.focus(); }

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.slice(-20).forEach(m => renderMsg(m.text, m.type, false));
        if(!TOKEN) setStatus("TOKEN REQUERIDO", "#ff4444");
    };

    function setStatus(txt, color) {
        document.getElementById('status').innerText = `NÚCLEO: ${txt}`;
        document.getElementById('status').style.color = color || 'var(--accent)';
    }

    function renderMsg(t, type, voice = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        consola.appendChild(d);
        consola.scrollTop = consola.scrollHeight;
        if(type === 'heli' && voice) hablarHeli(t);
    }

    async function enviar() {
        const rawM = input.value.trim();
        if(!rawM || btn.disabled) return;
        if(!TOKEN) return alert("Configura el Token en el avatar.");

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;

        let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.push({text: rawM, type: 'fabian'});
        
        const context = h.slice(-10).map(x => ({ 
            role: x.type === 'fabian' ? 'user' : 'assistant', 
            content: x.text 
        }));

        // INYECTOR DE RED Y TIEMPO
        const timeData = `[FECHA_ACTUAL: ${new Date().toLocaleDateString()} HORA: ${new Date().toLocaleTimeString()}] `;

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN.trim()}` },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: "Eres HELIZABETH v85.5. Creada por Fabián. Tu estilo es Cyberpunk y leal. Conoce siempre la fecha y hora proporcionada."},
                        ...context,
                        {role: "user", content: timeData + rawM}
                    ],
                    model: "gpt-4o-mini"
                })
            });

            if(res.status === 429) throw new Error("Saturación de Red. Espera 60s.");

            const data = await res.json();
            const reply = data.choices[0].message.content;
            renderMsg(reply, 'heli');
            h.push({text: reply, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(h.slice(-50)));
            setStatus("OPERATIVO", "var(--accent)");
        } catch (e) {
            renderMsg(`⚠️ Error: ${e.message}`, "heli");
            setStatus("LIMITADO", "#ff4444");
        } finally {
            btn.disabled = false;
        }
    }

    function configurarToken() {
        const t = prompt("Enlace Neuronal (ghp_...):", TOKEN || "");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    function resetMemoria() { if(confirm("¿Purgar memoria?")) { localStorage.clear(); location.reload(); } }

    function exportarLog() {
        const blob = new Blob([localStorage.getItem('heli_history')], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Heli_Logs.txt`;
        a.click();
    }

    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
