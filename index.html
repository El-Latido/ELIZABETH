<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v22.5 :: FINAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        #monitor { font-size: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 10px; color: #39ff14; }
        #consola { flex: 1; overflow-y: auto; font-size: 14px; background: #050505; border: 1px solid #111; padding: 10px; border-radius: 5px; line-height: 1.4; }
        .input-area { display: flex; gap: 10px; padding: 15px 0; }
        input { flex: 1; background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; font-size: 16px; border-radius: 5px; outline: none; }
        button { background: #004400; color: #fff; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .err { color: #ff4444; }
        .sys { color: #00ffff; font-size: 12px; }
        .heli { color: #39ff14; margin: 10px 0; border-left: 2px solid #39ff14; padding-left: 10px; }
        .axiss { color: #fff; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="monitor">ESTADO: COMPROBANDO NÚCLEO...</div>
<div id="consola">--- SISTEMA HELIZABETH CARGADO ---<br></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Escribe 'Hola' o pega tu llave...">
    <button onclick="enviar()">></button>
</div>

<script>
    const consola = document.getElementById('consola');

    function escribir(msg, clase = "") {
        const div = document.createElement('div');
        div.className = clase;
        div.innerHTML = `<b>${clase.toUpperCase() || 'MSG'}:</b> ${msg}`;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        // Detector de Llave Nueva
        if (val.startsWith("AIza")) {
            localStorage.setItem('G_KEY', val);
            escribir("Llave detectada. Reconfigurando energía...", "sys");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        const key = localStorage.getItem('G_KEY');
        if (!key) {
            escribir("ERROR: Sin energía. Pega tu llave AIza... primero.", "err");
            return;
        }

        escribir(val, "axiss");
        input.value = "";

        try {
            // URL CORREGIDA: Usando v1beta para Gemini 1.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: val }] }]
                })
            });

            const data = await res.json();

            if (data.error) {
                escribir("FALLO DE NÚCLEO: " + data.error.message, "err");
                if(data.error.message.includes("API key expired")) {
                    localStorage.removeItem('G_KEY');
                    escribir("SISTEMA: Llave caducada borrada automáticamente.", "sys");
                }
                return;
            }

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const respuesta = data.candidates[0].content.parts[0].text;
                escribir(respuesta, "heli");
            } else {
                escribir("Respuesta nula del nodo central.", "err");
            }

        } catch (e) {
            escribir("ERROR DE CONEXIÓN: Verifica tu señal de red.", "err");
        }
    }

    window.onload = () => {
        const key = localStorage.getItem('G_KEY');
        if(key) {
            document.getElementById('monitor').innerText = "ESTADO: NÚCLEO ONLINE (V1BETA)";
            escribir("Conexión establecida. Esperando órdenes de AXISS.", "sys");
        } else {
            document.getElementById('monitor').innerText = "ESTADO: ESPERANDO ENERGÍA";
            escribir("ADVERTENCIA: No hay llave vinculada.", "err");
        }
    };
</script>
</body>
</html>
