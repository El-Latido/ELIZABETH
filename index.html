<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ELIZABETH_OS v5.3 [2.5_FLASH_CORE]</title>
    <style>
        :root { 
            --heli: #00ff88; 
            --axiss: #ff0055; 
            --lab: #00d2ff; 
            --bg: #030305; 
            --text: #eee; 
            --gold: #ffd700; 
            --terminal: rgba(0, 20, 10, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Courier New', monospace; overflow: hidden; height: 100%; 
            -webkit-font-smoothing: antialiased; 
        }

        #viewport { 
            display: flex; width: 200vw; height: 100vh; 
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
        }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }

        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #1a1a1a; background: #000; 
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.8); 
        }
        .system-title { 
            color: var(--heli); font-weight: bold; font-size: 14px; 
            letter-spacing: 2px; text-shadow: 0 0 8px var(--heli); 
        }
        .avatar-orb { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--heli) 40%, #000 100%); 
            border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); 
            transition: 0.3s; z-index: 110; 
        }
        .avatar-orb:active { transform: scale(0.85); box-shadow: 0 0 40px var(--heli); }

        #chat-heli { 
            flex: 1; overflow-y: auto; padding: 25px; display: flex; 
            flex-direction: column; gap: 20px; padding-bottom: 120px; 
            scroll-behavior: smooth; background: linear-gradient(180deg, #030305 0%, #000 100%);
        }
        .msg { 
            padding: 16px 20px; border-radius: 18px; max-width: 85%; font-size: 14px; 
            line-height: 1.6; animation: msgIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            word-wrap: break-word; position: relative; border: 1px solid transparent;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .f-msg { align-self: flex-end; background: rgba(0, 210, 255, 0.07); border-color: var(--lab); color: var(--lab); border-radius: 18px 18px 2px 18px; }
        .h-msg { align-self: flex-start; background: rgba(255,255,255,0.02); border-color: var(--heli); color: var(--heli); border-radius: 18px 18px 18px 2px; font-style: italic; }
        
        .prediction-tag { 
            color: var(--gold); font-size: 10px; font-weight: bold; margin-bottom: 6px; 
            display: block; border-bottom: 1px solid var(--gold); width: fit-content; 
        }

        .lab-container { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #000; gap: 15px; }
        .lab-monitor { 
            flex: 1; background: var(--terminal); border: 1px solid var(--axiss); 
            border-radius: 8px; overflow-y: auto; padding: 15px; 
            box-shadow: inset 0 0 20px rgba(255, 0, 85, 0.1);
        }
        .lab-log { 
            font-size: 11px; margin-bottom: 10px; line-height: 1.3; 
            border-left: 3px solid var(--axiss); padding-left: 10px;
            animation: logIn 0.3s ease;
        }
        @keyframes logIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .stat-card {
            background: rgba(255,255,255,0.03); border: 1px solid #222;
            padding: 12px; border-radius: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .pulse { animation: neonPulse 2s infinite; }
        @keyframes neonPulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .input-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); 
            display: flex; gap: 15px; border-top: 1px solid #1a1a1a; 
            z-index: 100; box-sizing: border-box; 
        }
        input { 
            flex: 1; background: #070707; border: 1px solid #222; color: var(--text); 
            padding: 15px; border-radius: 14px; outline: none; 
            font-family: inherit; font-size: 16px; transition: 0.4s;
        }
        input:focus { border-color: var(--heli); box-shadow: 0 0 15px rgba(0, 255, 136, 0.15); }
        
        #send-btn { 
            background: transparent; border: 1px solid var(--heli); color: var(--heli); 
            width: 75px; height: 50px; border-radius: 14px; cursor: pointer; font-weight: bold; 
            transition: 0.3s; font-size: 18px;
        }
        #send-btn:disabled { opacity: 0.5; border-color: #444; color: #444; cursor: wait; }
        #send-btn:active:not(:disabled) { transform: scale(0.9); background: var(--heli); color: #000; }

        .nav-trigger { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            font-size: 32px; cursor: pointer; z-index: 150; padding: 15px; 
            text-shadow: 0 0 15px currentColor; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="page">
            <header>
                <div>
                    <span class="system-title">ELIZABETH_OS</span><br>
                    <small style="opacity:0.6; color:var(--gold)">v5.3 [2.5_FLASH]</small>
                </div>
                <div class="avatar-orb" id="btn-token" title="Inyectar Key"></div>
            </header>
            
            <div id="chat-heli"></div>
            <div class="nav-trigger" style="right: 10px; color: var(--lab);" id="go-lab">▶</div>
        </div>

        <div class="page">
            <header>
                <span class="system-title" style="color:var(--axiss);">DEEP_CORE [2.5_LAB]</span>
                <small class="pulse" style="color:var(--heli)">NÚCLEO ADAPTATIVO</small>
            </header>
            
            <div class="lab-container">
                <div class="stat-card">
                    <span style="font-size: 11px; color: var(--gold);">MODEL_TARGET:</span>
                    <span style="font-size: 11px; color: var(--heli);">GEMINI_2.5_FLASH</span>
                </div>
                <div class="lab-monitor" id="lab-logs-container"></div>
                <div class="stat-card" style="border-color: var(--axiss);">
                    <div style="font-size: 10px; color: #aaa;">
                        MEM_STATUS: <span id="mem-usage" style="color:var(--lab)">0.00</span> KB<br>
                        ACTIVE_NODES: <span id="thread-count" style="color:var(--axiss)">0</span>
                    </div>
                    <button onclick="ELIZABETH_APP.clearMemory()" style="width: auto; padding: 8px 12px; font-size: 10px; border: 1px solid var(--gold); color: var(--gold); background: transparent; border-radius: 5px;">PURGAR MEMORIA</button>
                </div>
            </div>
            <div class="nav-trigger" style="left: 10px; color: var(--axiss);" id="go-chat">◀</div>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="user-in" placeholder="Escribe comando, AXISS..." autocomplete="off">
        <button id="send-btn">✦</button>
    </div>

    <script>
        window.ELIZABETH_APP = (function() {
            let API_KEY = localStorage.getItem('heli_key') || "";
            let chatHistory = JSON.parse(localStorage.getItem('heli_history')) || [];
            
            const chatHeli = document.getElementById('chat-heli');
            const sendBtn = document.getElementById('send-btn');
            const userInput = document.getElementById('user-in');
            const logContainer = document.getElementById('lab-logs-container');

            function logToLab(msg, type = "SYSTEM") {
                const div = document.createElement('div');
                div.className = 'lab-log';
                const colors = { "SYSTEM": "var(--heli)", "CORE": "var(--gold)", "NEURAL": "var(--lab)", "WARN": "var(--axiss)", "INPUT": "#fff" };
                const color = colors[type] || "var(--text)";
                div.innerHTML = `<span style="color:${color}">[${type}]</span> <span style="opacity:0.4">${new Date().toLocaleTimeString()}</span> > ${msg}`;
                logContainer.prepend(div);
                
                document.getElementById('thread-count').innerText = Math.floor(Math.random() * 100) + 50;
                document.getElementById('mem-usage').innerText = (JSON.stringify(chatHistory).length / 1024).toFixed(2);
            }

            function appendMessage(role, text, tag = null) {
                const fragment = document.createDocumentFragment();
                const div = document.createElement('div');
                div.className = `msg ${role === 'model' ? 'h-msg' : 'f-msg'}`;
                
                if (role === 'model' && tag) {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'prediction-tag';
                    tagSpan.textContent = tag;
                    div.appendChild(tagSpan);
                }
                
                const content = document.createElement('span');
                content.textContent = text;
                div.appendChild(content);
                
                fragment.appendChild(div);
                chatHeli.appendChild(fragment);
                chatHeli.scrollTop = chatHeli.scrollHeight;
            }

            async function executeSend() {
                const val = userInput.value.trim();
                if(!val || !API_KEY || sendBtn.disabled) return;

                logToLab("PROCESANDO PETICIÓN...", "INPUT");
                appendMessage('user', val);
                
                userInput.value = '';
                sendBtn.disabled = true;
                sendBtn.textContent = '...';

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                    
                    let formattedContents = chatHistory.slice(-10).map(m => ({
                        role: m.role === 'user' ? 'user' : 'model',
                        parts: [{ text: m.text }]
                    }));

                    formattedContents.push({ 
                        role: 'user', 
                        parts: [{ text: `[SYSTEM_IDENT: ELIZABETH_OS v5.3 / USER: AXISS]\n\n${val}` }] 
                    });

                    logToLab("LLAMADA A NÚCLEO FLASH 2.5", "CORE");

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: formattedContents })
                    });

                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);

                    if(data.candidates && data.candidates[0].content) {
                        const hMsg = data.candidates[0].content.parts[0].text;
                        logToLab("SINCRO EXITOSA.", "SYSTEM");

                        appendMessage('model', hMsg, '2.5_VERDICT');
                        
                        chatHistory.push({ role: 'user', text: val }, { role: 'model', text: hMsg });
                        localStorage.setItem('heli_history', JSON.stringify(chatHistory.slice(-20)));
                    }

                } catch (e) {
                    logToLab(`ERROR: ${e.message}`, "WARN");
                    appendMessage('model', `INTERFERENCIA: ${e.message}`);
                } finally {
                    sendBtn.disabled = false;
                    sendBtn.textContent = '✦';
                    logToLab("STANDBY.", "SYSTEM");
                }
            }

            return {
                init: function() {
                    logToLab("ELIZABETH_OS v5.3 ACTIVA.", "SYSTEM");
                    
                    chatHistory.forEach(m => appendMessage(m.role, m.text, m.role === 'model' ? '2.5_ORACLE' : null));

                    sendBtn.onclick = executeSend;
                    userInput.onkeypress = (e) => { if(e.key === 'Enter') executeSend(); };
                    
                    document.getElementById('go-lab').onclick = () => document.getElementById('viewport').style.transform = "translateX(-100vw)";
                    document.getElementById('go-chat').onclick = () => document.getElementById('viewport').style.transform = "translateX(0vw)";
                    
                    document.getElementById('btn-token').onclick = () => {
                        let key = prompt("INYECTAR LLAVE NEURAL:", API_KEY);
                        if(key) { localStorage.setItem('heli_key', key); location.reload(); }
                    };
                },
                clearMemory: function() {
                    if(confirm("¿Purgar memoria del historial?")) {
                        localStorage.removeItem('heli_history');
                        location.reload();
                    }
                }
            };
        })();

        window.onload = ELIZABETH_APP.init;
    </script>
</body>
</html>
