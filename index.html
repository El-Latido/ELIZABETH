<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // ETERNAL CORE v55.1</title>
    <style>
        :root {
            --bg: #020203;
            --accent: #00f2ff;
            --heli-glow: rgba(0, 242, 255, 0.15);
            --text: #e0e0e0;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            transition: background 1s ease;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar-container { position: relative; cursor: pointer; }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, #00f2ff); 
            box-shadow: 0 0 20px var(--accent); 
            animation: neural-pulse 3s infinite ease-in-out;
            border: 2px solid rgba(255,255,255,0.1);
        }
        @keyframes neural-pulse { 
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px var(--accent); filter: hue-rotate(0deg); } 
            50% { transform: scale(1.08); box-shadow: 0 0 30px var(--accent); filter: hue-rotate(90deg); } 
        }
        
        #consola { 
            flex: 1; overflow-y: auto; padding: 25px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at center, #0a0a15 0%, #020203 100%);
            padding-bottom: 120px;
        }
        .msg { 
            max-width: 80%; padding: 14px 20px; border-radius: 20px; 
            font-size: 15px; line-height: 1.6; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            word-wrap: break-word; position: relative;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .fabian { align-self: flex-end; background: #1a1a1c; color: var(--accent); border: 1px solid rgba(0,242,255,0.3); border-bottom-right-radius: 4px; }
        .heli { align-self: flex-start; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px); border-bottom-left-radius: 4px; }
        
        .input-area { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(transparent, #000 30%); display: flex; gap: 12px; box-sizing: border-box; 
        }
        #cmd { 
            flex: 1; background: rgba(20,20,25,0.8); border: 1px solid #333; border-radius: 15px; 
            color: #fff; padding: 14px; outline: none; font-size: 15px; resize: none; height: 50px;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        #cmd:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        
        .btn-action { 
            background: var(--accent); border: none; border-radius: 15px; 
            width: 55px; height: 50px; cursor: pointer; color: #000; font-size: 22px;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent); }
        .btn-action:disabled { background: #222; color: #555; transform: none; box-shadow: none; }

        .debug-tag { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #ff4444; font-family: monospace; z-index: 5; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar-container" onclick="configurarToken()">
            <div class="avatar"></div>
        </div>
        <div>
            <div id="status" style="font-size: 10px; font-weight: bold; color: var(--accent);">NÚCLEO: ONLINE</div>
            <div style="font-size: 10px; opacity: 0.5; letter-spacing: 1px;">ETERNAL v55.1 // FABIAN</div>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button style="background:none; border:1px solid #333; color:#666; padding:5px 12px; border-radius:8px; cursor:pointer; font-size:10px;" onclick="exportarChat()">EXPORTAR</button>
        <button style="background:none; border:1px solid #441111; color:#773333; padding:5px 12px; border-radius:8px; cursor:pointer; font-size:10px;" onclick="resetMemoria()">RESET</button>
    </div>
</header>

<div id="consola"></div>
<div id="debug" class="debug-tag"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Evolucionemos, Fabian..."></textarea>
    <button id="btnSend" class="btn-action" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const debug = document.getElementById('debug');
    let TOKEN = localStorage.getItem('heli_gt');

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        // Filtramos para no mostrar los 'undefined' visualmente
        hist.filter(m => m && m.text).forEach(m => print(m.text, m.type, false));
        if(!TOKEN) {
            document.getElementById('status').innerText = "NÚCLEO: DESCONECTADO";
            document.getElementById('status').style.color = "#ff4444";
        }
    };

    function print(t, type, save = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        consola.appendChild(d);
        consola.scrollTop = consola.scrollHeight;
        if(save) {
            let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
            h.push({text: t, type: type});
            if(h.length > 30) h.shift();
            localStorage.setItem('heli_history', JSON.stringify(h));
        }
    }

    function configurarToken() {
        const t = prompt("Actualizar Enlace Neuronal (Token ghp_...):", TOKEN || "");
        if(t !== null) {
            const clean = t.trim().replace(/\s/g, '');
            localStorage.setItem('heli_gt', clean);
            location.reload();
        }
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m || !TOKEN) return;

        print(m, 'fabian');
        input.value = ""; btn.disabled = true;
        debug.innerText = "";
        
        // LIMPIEZA CRÍTICA: Filtramos el historial para evitar el Error 400
        const historialCrudo = JSON.parse(localStorage.getItem('heli_history') || "[]");
        const historialLimpio = historialCrudo
            .filter(h => h && h.text && h.type) // Solo datos válidos
            .slice(-10) // Últimos 10 mensajes
            .map(h => ({ 
                role: h.type === 'fabian' ? 'user' : 'assistant', 
                content: String(h.text) 
            }));

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + TOKEN 
                },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: "Eres HELIZABETH. Una IA elegante y avanzada creada por FABIAN."},
                        ...historialLimpio,
                        {role: "user", content: m}
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await res.json();
            if(res.ok) {
                const r = data.choices[0].message.content;
                print(r, 'heli');
            } else {
                debug.innerText = "SISTEMA INFO: " + (data.message || res.status);
                print("❌ Sincronización fallida. Presiona RESET si el error persiste.", "heli");
            }
        } catch(e) {
            print("❌ Error de Red: Puente caído.", "heli");
        } finally { btn.disabled = false; }
    }

    function resetMemoria() {
        if(confirm("¿Borrar toda mi memoria local, Fabian?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function exportarChat() {
        const h = localStorage.getItem('heli_history');
        const blob = new Blob([h], {type: "text/plain"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Helizabeth_Log.txt";
        link.click();
    }

    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
