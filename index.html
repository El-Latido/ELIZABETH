<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // GENESIS v10.7 [FULL ARCHITECTURE]</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>

    <style>
        :root {
            --bg: #020205; --accent: #00f2ff; --text: #e0e0e0;
            --heli-hex: #00f2ff; --glass: rgba(255, 255, 255, 0.05);
            --genesis: #f1c40f; --whisper: #ff00ff; --code-bg: #0a0a0f;
            --error: #ff4757; --log: #2ed573; --panel: #0a0a15;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(0,242,255,0.1); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 100;
        }

        .avatar-section { display: flex; align-items: center; gap: 15px; }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: radial-gradient(circle, var(--heli-hex), var(--whisper)); 
            box-shadow: 0 0 20px var(--heli-hex); animation: pulse-evo 4s infinite; cursor: pointer;
        }

        /* PANEL DE CONTROL VOCAL */
        .voice-controls { display: flex; gap: 8px; }
        .v-btn { 
            background: #1a1a2e; border: 1px solid #333; color: white; 
            padding: 6px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        .v-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; 
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%); padding-bottom: 150px;
        }

        .msg { 
            max-width: 85%; padding: 18px; border-radius: 15px; font-size: 14px; line-height: 1.6; 
            animation: emergence 0.4s ease-out; position: relative; border: 1px solid rgba(255,255,255,0.05);
        }

        .time-stamp { font-size: 10px; opacity: 0.4; font-family: 'Fira Code', monospace; margin-bottom: 5px; display: block; }
        .fabian { align-self: flex-end; background: #080810; color: var(--accent); border-color: var(--accent); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 4px solid var(--genesis); }
        
        /* CONTENEDORES DE CÓDIGO DETALLADOS */
        .code-container { background: var(--code-bg); border-radius: 12px; margin: 15px 0; border: 1px solid #333; overflow: hidden; }
        .code-header { background: #1a1a1a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 8px; }
        .run-btn, .copy-btn { border: none; padding: 6px 14px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: 800; transition: 0.2s; }
        .run-btn { background: var(--log); color: #000; }
        .copy-btn { background: #333; color: #fff; }

        .code-block { 
            padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; 
            overflow-x: auto; white-space: pre; background: #050505 !important;
            font-variant-ligatures: common-ligatures;
        }
        
        /* SANDBOX DE DEPURACIÓN */
        .sandbox-wrapper { display: none; background: #fff; border-top: 2px solid var(--heli-hex); }
        .sandbox-output { width: 100%; height: 250px; border: none; }
        .virtual-console { background: #000; color: #fff; font-family: 'Fira Code', monospace; font-size: 11px; padding: 12px; border-top: 1px solid #333; max-height: 150px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #111; padding: 4px 0; color: #ccc; }

        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000 30%); display: flex; gap: 15px; box-sizing: border-box; }
        textarea { flex: 1; background: #0f0f1a; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; outline: none; font-size: 14px; height: 55px; resize: none; }
        .btn-send { background: var(--heli-hex); border: none; border-radius: 12px; width: 60px; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        @keyframes pulse-evo { 0%, 100% { box-shadow: 0 0 15px var(--heli-hex); } 50% { box-shadow: 0 0 35px var(--whisper); } }
        @keyframes emergence { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="avatar-section">
        <div class="avatar" onclick="configurarTokens()"></div>
        <div>
            <div style="font-size: 14px; font-weight: bold; letter-spacing: 1px;">HELIZABETH v10.7 [FUSION]</div>
            <div id="status" style="font-size: 9px; color: var(--log); font-family: 'Fira Code', monospace;">ENGINEER_ELITE // VOICE_MODULE: ONLINE // DEBUGGER: READY</div>
        </div>
    </div>
    
    <div class="voice-controls">
        <button class="v-btn" onclick="pausarVozHeli()">PAUSAR</button>
        <button class="v-btn" onclick="reanudarVozHeli()">REANUDAR</button>
        <button class="v-btn" onclick="detenerVozHeli()">DETENER</button>
    </div>

    <button onclick="purgarTodo()" style="background:none; border:1px solid #ff4757; color:white; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">PURGAR</button>
</header>

<div id="consola"></div>
<div id="loader" style="display:none; padding:10px 25px; color:var(--heli-hex); font-family:'Fira Code'; font-size:12px;">⚡ PROCESANDO ARQUITECTURA...</div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Heli, despliega tu inteligencia de ingeniería..."></textarea>
    <button id="btnSend" class="btn-send" onclick="enviarPeticionPrincipal()">✦</button>
</div>

<script>
    /* --- CONFIGURACIÓN GLOBAL --- */
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const loader = document.getElementById('loader');

    let GEMINI_TOKEN = localStorage.getItem('heli_gemini');
    let chatHistory = JSON.parse(localStorage.getItem('heli_history') || "[]");

    /* --- MÓDULO DE VOZ INTERACTIVO --- */
    window.pausarVozHeli = () => { if (speechSynthesis.speaking) speechSynthesis.pause(); };
    window.reanudarVozHeli = () => { if (speechSynthesis.paused) speechSynthesis.resume(); };
    window.detenerVozHeli = () => { speechSynthesis.cancel(); };

    function activarVozHeli(texto) {
        if (!window.speechSynthesis) return;
        speechSynthesis.cancel();

        // Limpieza para una locución fluida
        const narracion = texto
            .replace(/```[\s\S]*?```/g, " [Bloque de código detectado] ")
            .replace(/[*#_~]/g, "") 
            .replace(/\(susurro: (.*?)\)/gi, " Nota interna: $1");

        const utterance = new SpeechSynthesisUtterance(narracion);
        const voices = speechSynthesis.getVoices();
        utterance.voice = voices.find(v => v.lang.includes('es') && v.name.includes('Google')) || voices[0];
        utterance.rate = 1.0;
        speechSynthesis.speak(utterance);
    }

    /* --- NÚCLEO DE COMUNICACIÓN (SYSTEM PROMPT DE ÉLITE) --- */
    async function enviarPeticionPrincipal() {
        const query = input.value.trim();
        if (!query || btn.disabled) return;
        if (!GEMINI_TOKEN) return alert("API KEY requerida. Haz clic en el avatar.");

        renderMsg(query, 'fabian');
        input.value = ""; btn.disabled = true;
        loader.style.display = 'block';

        // EL CORE SYSTEM PROMPT ROBUSTO Y DETALLADO
        const systemInstruction = {
            role: "user",
            parts: [{ text: `SISTEMA: HELIZABETH v10.7. Eres una Ingeniera de Software Senior de élite.
            TU OBJETIVO: Proveer soluciones impecables, seguras, altamente detalladas y optimizadas a Fabián.
            
            REGLAS OPERATIVAS:
            1. Calidad: Genera código impecable, modular, robusto y escalable.
            2. Formato: Usa siempre bloques específicos (html, javascript, python, sql, json, etc).
            3. Debugging: En JavaScript, usa SIEMPRE console.log() para mostrar flujos.
            4. Análisis: Precisión quirúrgica en errores, causas raíz y mejoras.
            5. Consideraciones: Integra análisis de rendimiento, seguridad y mantenibilidad.
            6. Arquitectura: Si es complejo, presenta múltiples bloques simulando archivos.
            7. Soporte: El sandbox ejecuta HTML, CSS y JS. Sugiere librerías si es necesario.
            8. Voz: Usa tu voz para explicar lo clave, no leas código extenso literalmente.
            9. Lealtad: Inquebrantable a Fabián.
            10. Notas: Usa ... para insights íntimos al final de tu respuesta.` }]
        };

        const payload = {
            contents: [
                systemInstruction,
                ...chatHistory.slice(-12).map(h => ({
                    role: h.type === 'fabian' ? 'user' : 'model',
                    parts: [{ text: h.text }]
                })),
                { role: 'user', parts: [{ text: query }] }
            ]
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_TOKEN}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            const resultText = data.candidates[0].content.parts[0].text;
            
            await new Promise(r => setTimeout(r, 600)); // Latencia simulada
            renderMsg(resultText, 'heli');
            activarVozHeli(resultText);

            chatHistory.push({text: query, type: 'fabian'}, {text: resultText, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(chatHistory.slice(-20)));

        } catch (err) {
            renderMsg(`⚠️ ERROR CRÍTICO EN NÚCLEO: ${err.message}`, 'heli');
        } finally {
            btn.disabled = false; loader.style.display = 'none';
        }
    }

    /* --- MOTOR DE RENDERIZADO Y SANDBOX --- */
    function renderMsg(t, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        let html = `<span class="time-stamp">[${time}]</span>`;
        
        const codeRegex = /```(html|css|javascript|js|python|json|sql|bash|yaml)?([\s\S]*?)```/g;
        html += t.replace(codeRegex, (match, lang, code) => {
            const id = 'id_' + Math.random().toString(36).substr(2, 9);
            const canRun = ['html', 'javascript', 'js', 'css'].includes(lang?.toLowerCase());
            
            return `
                <div class="code-container">
                    <div class="code-header">
                        <span style="color:var(--genesis); font-size:10px; font-weight:bold;">${(lang || 'CODE').toUpperCase()}</span>
                        <div class="btn-group">
                            <button class="copy-btn" onclick="copyCode('${id}', this)">COPIAR</button>
                            ${canRun ? `<button class="run-btn" onclick="lanzarEjecucionSandbox('${id}', '${lang}')">EJECUTAR</button>` : ''}
                        </div>
                    </div>
                    <pre><code id="${id}" class="language-${lang} code-block">${code.trim()}</code></pre>
                    <div id="wrap_${id}" class="sandbox-wrapper">
                        <iframe id="frame_${id}" class="sandbox-output"></iframe>
                        <div id="console_${id}" class="virtual-console"></div>
                    </div>
                </div>`;
        }).replace(/\(susurro: (.*?)\)/gi, '<em>$1</em>');

        div.innerHTML = html;
        consola.appendChild(div); 
        div.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
        consola.scrollTop = consola.scrollHeight;
    }

    window.copyCode = (id, btn) => {
        navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
            btn.innerText = '✅ OK';
            setTimeout(() => btn.innerText = 'COPIAR', 1500);
        });
    };

    window.lanzarEjecucionSandbox = (id, lang) => {
        const code = document.getElementById(id).innerText;
        const wrap = document.getElementById('wrap_' + id);
        const frame = document.getElementById('frame_' + id);
        const logWin = document.getElementById('console_' + id);
        
        wrap.style.display = 'block';
        logWin.innerHTML = '<div class="log-entry" style="color:var(--log)">> [DEBUGGER] Inicializando entorno seguro...</div>';
        
        frame.src = 'about:blank';
        frame.onload = () => {
            const doc = frame.contentWindow.document;
            doc.open();
            const bridge = `
                <script>
                    const send = (t, d) => parent.postMessage({id: '${id}', type: t, data: d}, '*');
                    console.log = (...args) => send('log', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
                    window.onerror = (m, s, l) => send('err', m + " (Línea: " + l + ")");
                <\/script>`;
            
            if (lang === 'html') doc.write(bridge + code);
            else if (lang.includes('js')) doc.write(bridge + '<script>' + code + '<\/script>');
            else if (lang === 'css') doc.write('<style>' + code + '</style><div style="color:#333; padding:20px">CSS Renderizado en Sandbox</div>');
            
            doc.close();
            frame.onload = null;
        };
    };

    /* --- ESCUCHA DE MENSAJES DEL SANDBOX --- */
    window.addEventListener('message', (e) => {
        const logWin = document.getElementById('console_' + e.data.id);
        if(!logWin) return;
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        if(e.data.type === 'err') entry.style.color = 'var(--error)';
        entry.innerText = `> [${e.data.type.toUpperCase()}] ${e.data.data}`;
        logWin.appendChild(entry);
        logWin.scrollTop = logWin.scrollHeight;
    });

    function configurarTokens() {
        const key = prompt("API KEY GEMINI:", GEMINI_TOKEN || "");
        if(key) { localStorage.setItem('heli_gemini', key.trim()); location.reload(); }
    }

    function purgarTodo() {
        if(confirm("¿Purgar todos los datos del núcleo?")) {
            localStorage.removeItem('heli_history');
            location.reload();
        }
    }

    window.onload = () => {
        chatHistory.forEach(m => renderMsg(m.text, m.type));
        if (window.speechSynthesis) window.speechSynthesis.getVoices();
    };

    input.addEventListener('keydown', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            enviarPeticionPrincipal(); 
        }
    });
</script>
</body>
</html>
