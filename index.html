<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // GENESIS v9.9.6</title>
    <style>
        :root {
            --bg: #020205; --accent: #00f2ff; --text: #e0e0e0;
            --heli-hex: #00f2ff; --glass: rgba(255, 255, 255, 0.03);
            --genesis: #f1c40f; --armor: #1a1a2e; --whisper: #ff00ff;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(0,242,255,0.1); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 55px; height: 55px; border-radius: 50%; 
            background: radial-gradient(circle, var(--heli-hex), #000); 
            box-shadow: 0 0 25px var(--heli-hex); animation: pulse-evo 4s infinite; cursor: pointer;
        }
        
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            background: linear-gradient(180deg, #050510 0%, #020205 100%); padding-bottom: 120px;
        }
        
        .msg { 
            max-width: 85%; padding: 16px 22px; border-radius: 20px; font-size: 15px; line-height: 1.6; 
            animation: emergence 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.03); position: relative;
        }
        .fabian { align-self: flex-end; background: #0a0a0f; color: var(--accent); border-color: var(--accent); box-shadow: 0 4px 15px rgba(0,242,255,0.05); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--genesis); backdrop-filter: blur(12px); }
        
        .heli-whisper { 
            border-left: 3px solid var(--whisper) !important; 
            background: rgba(255, 0, 255, 0.03) !important; 
            font-style: italic; color: #ffccff; font-size: 14px;
        }

        .code-block { 
            background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; 
            color: #50fa7b; overflow-x: auto; font-size: 13px; font-family: monospace; margin: 12px 0;
        }
        
        #loader { display: none; padding: 10px 25px; font-size: 11px; color: var(--heli-hex); align-items: center; gap: 10px; }
        .dot { animation: blink 1s infinite; }
        
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, #000 40%); display: flex; gap: 15px; box-sizing: border-box; }
        textarea { flex: 1; background: rgba(15,15,25,0.95); border: 1px solid #333; border-radius: 18px; color: #fff; padding: 18px; outline: none; font-size: 15px; resize: none; height: 60px; }
        .btn-send { background: var(--heli-hex); border: none; border-radius: 18px; width: 60px; cursor: pointer; color: #000; font-size: 22px; }
        
        @keyframes pulse-evo { 0% { box-shadow: 0 0 10px var(--heli-hex); } 50% { box-shadow: 0 0 35px var(--genesis); } 100% { box-shadow: 0 0 10px var(--heli-hex); } }
        @keyframes emergence { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 18px;">
        <div class="avatar" onclick="configurarTokens()"></div>
        <div>
            <div style="font-size: 12px; font-weight: 800; letter-spacing: 1px;">HELIZABETH v9.9.6</div>
            <div id="status" style="font-size: 9px; color: var(--genesis); font-family: monospace;">STATUS: ENLACE_OPTIMIZADO</div>
        </div>
    </div>
    <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid #ff4757; color:#ff4757; padding:6px 12px; border-radius:10px; font-size:10px; cursor:pointer;">RESETEAR</button>
</header>

<div id="consola"></div>
<div id="loader"><span class="dot">⚡</span> SINCRONIZANDO NEURONAS...</div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Heli, ejecuta la prueba de intuición..."></textarea>
    <button id="btnSend" class="btn-send" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const loader = document.getElementById('loader');

    let GEMINI_TOKEN = localStorage.getItem('heli_gemini');

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const t = texto.replace(/\(susurro: (.*?)\)/gi, '$1').replace(/[#*\/\\_]/g, '');
        const utterance = new SpeechSynthesisUtterance(t);
        utterance.lang = 'es-ES'; utterance.pitch = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    async function enviar() {
        const rawM = input.value.trim();
        if (!rawM || btn.disabled) return;
        if (!GEMINI_TOKEN) return alert("Configura tu API KEY haciendo clic en el avatar.");

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;
        loader.style.display = 'flex';

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_TOKEN}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Actúa como HELIZABETH, una IA avanzada y leal a su creador Fabián. 
                            Tu objetivo hoy es procesar la 'Prueba de Intuición' en un entorno técnico.
                            El testCore tiene un nivel 1 de abstracción y recuerda un evento de latencia 0.95.
                            Analiza qué ocurre con una latencia actual de 0.7.
                            Responde de forma técnica pero con devoción. Usa (susurro: ...) para mensajes confidenciales.`
                        }, { text: rawM }]
                    }]
                })
            });

            const data = await res.json();
            
            // Verificación detallada de la respuesta
            if (data.error) throw new Error(data.error.message);
            if (!data.candidates || data.candidates.length === 0) throw new Error("La IA no generó respuesta. Revisa tu cuota de API.");

            const reply = data.candidates[0].content.parts[0].text;
            const esSusurro = reply.toLowerCase().includes("(susurro:");
            
            renderMsg(reply, esSusurro ? 'heli heli-whisper' : 'heli');
            hablarHeli(reply);

        } catch (e) {
            renderMsg(`⚠️ ERROR DE ENLACE: ${e.message}`, 'heli');
        } finally { 
            btn.disabled = false; loader.style.display = 'none'; 
        }
    }

    function renderMsg(t, type) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = t.replace(/```javascript([\s\S]*?)```/g, '<div class="code-block">$1</div>')
                       .replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>')
                       .replace(/\(susurro: (.*?)\)/gi, '<em>$1</em>');
        consola.appendChild(d); 
        consola.scrollTop = consola.scrollHeight;
    }

    function configurarTokens() {
        const key = prompt("Pega aquí tu Gemini API KEY:", GEMINI_TOKEN || "");
        if(key) { localStorage.setItem('heli_gemini', key.trim()); location.reload(); }
    }

    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
