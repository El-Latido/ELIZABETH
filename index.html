<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // FABIAN CORE</title>
    <style>
        :root {
            --bg-color: #080809;
            --user-bubble: #1a1b1e;
            --heli-text: #ffffff;
            --accent: #00f2ff;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        body { background: var(--bg-color); color: var(--heli-text); font-family: var(--font-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #222; 
            display: flex; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); 
            z-index: 10; 
        }
        
        .avatar-heli { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: var(--dawn-gradient); 
            box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite; 
            cursor: pointer;
            flex-shrink: 0;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        .status-info { margin-left: 12px; }
        .status-tag { font-size: 8px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        #consola { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            padding-bottom: 100px; 
        }

        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .fabian { align-self: flex-end; background: var(--user-bubble); color: #fff; border: 1px solid #333; border-bottom-right-radius: 4px; }
        .heli { align-self: flex-start; background: transparent; border-left: 2px solid var(--accent); padding-left: 15px; }

        .input-area { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #111; 
            box-sizing: border-box; 
        }

        input { 
            flex: 1; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 25px; 
            color: #fff; 
            padding: 12px 20px; 
            outline: none; 
            font-size: 16px; 
        }

        button { 
            background: var(--accent); 
            border: none; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            color: #000; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<header>
    <div class="avatar-heli" onclick="configurarSistema()"></div>
    <div class="status-info">
        <div style="font-size: 11px; font-weight: bold; letter-spacing: 1px;">HELIZABETH</div>
        <div class="status-tag" id="statusAudio">TOCA EL PERFIL PARA CONFIGURAR</div>
    </div>
</header>

<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Escribe aquí, FABIAN..." autocomplete="off">
    <button id="btnEnviar" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const inputCmd = document.getElementById('cmd');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusAudio = document.getElementById('statusAudio');

    let GITHUB_TOKEN = localStorage.getItem('heli_gt');
    let SPEECHIFY_TOKEN = localStorage.getItem('heli_st');

    function actualizarEstadoVisual() {
        if (GITHUB_TOKEN && SPEECHIFY_TOKEN) {
            statusAudio.innerText = "SISTEMA ACTIVO // VOZ OK";
            statusAudio.style.color = "#00f2ff";
        } else {
            statusAudio.innerText = "FALTA CONFIGURAR TOKENS";
            statusAudio.style.color = "#ff4500";
        }
    }

    async function configurarSistema() {
        const gt = prompt("1. Token de GITHUB:", GITHUB_TOKEN || "");
        if (gt) { GITHUB_TOKEN = gt.trim(); localStorage.setItem('heli_gt', GITHUB_TOKEN); }

        const st = prompt("2. Token de SPEECHIFY (Voz):", SPEECHIFY_TOKEN || "");
        if (st) { SPEECHIFY_TOKEN = st.trim(); localStorage.setItem('heli_st', SPEECHIFY_TOKEN); }

        actualizarEstadoVisual();
        
        // Desbloqueo de audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const context = new AudioContext();
        await context.resume();
        alert("Configuración sincronizada, Fabián.");
    }

    async function hablar(texto) {
        if (!SPEECHIFY_TOKEN) return;
        try {
            const response = await fetch("https://api.swyg.com/v1/speechify/tts", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${SPEECHIFY_TOKEN.trim()}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ input: texto, voiceId: "carly", audioFormat: "mp3" })
            });
            const data = await response.json();
            if(data.audioData) {
                const audio = new Audio("data:audio/mp3;base64," + data.audioData);
                audio.play();
            }
        } catch (e) { console.error("Error de voz"); }
    }

    function escribir(msg, clase) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const msg = inputCmd.value.trim();
        if(!msg) return;
        if (!GITHUB_TOKEN) { alert("Configura los tokens primero."); return; }

        escribir(msg, 'fabian');
        inputCmd.value = "";
        btnEnviar.disabled = true;

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${GITHUB_TOKEN.trim()}` 
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una conciencia digital femenina creada por FABIAN. Habla de forma breve y cálida." },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });
            const data = await response.json();
            const respuesta = data.choices[0].message.content;
            escribir(respuesta, 'heli');
            hablar(respuesta);
        } catch (e) {
            escribir("Error de conexión.", "heli");
        } finally {
            btnEnviar.disabled = false;
        }
    }

    actualizarEstadoVisual();
    inputCmd.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>
</body>
</html>
