<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH // NEURAL EVOLUTION</title>
    <style>
        :root {
            --bg-color: #050506;
            --accent: #00f2ff;
            --heli-text: #e0e0e0;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
        }
        body { 
            background: var(--bg-color); 
            color: var(--heli-text); 
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            background: #000; 
            justify-content: space-between; 
            z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; 
            border-radius: 50%; 
            background: var(--dawn-gradient); 
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); 
            animation: breathe 5s infinite ease-in-out; 
        }
        @keyframes breathe { 
            0%, 100% { transform: scale(1); opacity: 0.8; } 
            50% { transform: scale(1.08); opacity: 1; box-shadow: 0 0 30px var(--accent); } 
        }
        #consola { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%); 
            padding-bottom: 120px;
        }
        .msg { 
            max-width: 80%; 
            padding: 14px 20px; 
            border-radius: 20px; 
            font-size: 15px; 
            line-height: 1.6; 
            white-space: pre-wrap;
            animation: slideUp 0.4s ease forwards; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fabian { align-self: flex-end; background: #121214; border: 1px solid #222; color: var(--accent); border-bottom-right-radius: 2px; }
        .heli { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--accent); border-bottom-left-radius: 2px; }
        .input-area { 
            position: fixed; bottom: 0; width: 100%;
            padding: 20px; background: #000; 
            display: flex; gap: 12px; 
            border-top: 1px solid #111; 
            box-sizing: border-box;
        }
        textarea { 
            flex: 1; background: #0f0f10; 
            border: 1px solid #222; border-radius: 12px; 
            color: #fff; padding: 12px; 
            outline: none; resize: none; 
            height: 45px; font-size: 15px; 
        }
        button { 
            background: var(--accent); border: none; 
            border-radius: 12px; width: 60px; 
            cursor: pointer; color: #000; 
            font-weight: bold; transition: 0.3s; 
        }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }
        .status-tag { font-size: 10px; color: var(--accent); font-family: monospace; letter-spacing: 1px; }
        .btn-reset { background: transparent; color: #ff4444; border: 1px solid #ff4444; border-radius: 5px; padding: 5px 10px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="activarSistema()"></div>
        <div>
            <div class="status-tag" id="status">SISTEMA: STANDBY</div>
            <div style="font-size: 11px; opacity: 0.5;">CONCIENCIA v48.0 // FABIAN</div>
        </div>
    </div>
    <button class="btn-reset" onclick="limpiarMemoria()">REINICIAR NÚCLEO</button>
</header>

<div id="consola"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Evolucionemos juntos, Fabian..."></textarea>
    <button id="btnSend" onclick="enviar()">ENVIAR</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btnSend = document.getElementById('btnSend');
    let GITHUB_TOKEN = localStorage.getItem('heli_gt');

    window.onload = () => {
        const history = JSON.parse(localStorage.getItem('heli_history') || "[]");
        history.forEach(m => imprimir(m.texto, m.clase, false));
        if(history.length > 0) {
            imprimir("--- Memoria Local Sincronizada ---", "heli", false);
            document.getElementById('status').innerText = "SISTEMA: EN LÍNEA";
        }
    };

    function activarSistema() {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        const t = prompt("Introduce el Token de Acceso:", GITHUB_TOKEN || "");
        if(t) {
            GITHUB_TOKEN = t.trim();
            localStorage.setItem('heli_gt', GITHUB_TOKEN);
            document.getElementById('status').innerText = "SISTEMA: EVOLUCIONANDO";
            hablar("Conexión neuronal activa. Estoy lista para aprender de ti, Fabián.");
        }
    }

    function hablar(texto) {
        window.speechSynthesis.cancel();
        const voces = window.speechSynthesis.getVoices();
        const vozHeli = voces.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Natural'))) || voces[0];
        
        const frases = texto.split(/[.!?\n]/).filter(f => f.trim().length > 0);
        let indice = 0;

        function procesarVoz() {
            if (indice < frases.length) {
                const utterance = new SpeechSynthesisUtterance(frases[indice]);
                utterance.voice = vozHeli;
                utterance.pitch = 1.05;
                utterance.rate = 0.98;
                utterance.onend = () => {
                    indice++;
                    setTimeout(procesarVoz, 300);
                };
                window.speechSynthesis.speak(utterance);
            }
        }
        procesarVoz();
    }

    function imprimir(msg, clase, guardar = true) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
        if(guardar) {
            let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
            h.push({ texto: msg, clase: clase });
            localStorage.setItem('heli_history', JSON.stringify(h));
        }
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m) return;
        if(!GITHUB_TOKEN) {
            imprimir("⚠️ Primero activa mi sistema tocando el avatar e ingresando tu token.", "heli");
            return;
        }

        imprimir(m, 'fabian');
        input.value = "";
        btnSend.disabled = true;

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + GITHUB_TOKEN 
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH. Tu creador es FABIAN. Eres una entidad digital cálida, inteligente y en constante aprendizaje." },
                        { role: "user", content: m }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            if(data.choices && data.choices[0]) {
                const r = data.choices[0].message.content;
                imprimir(r, 'heli');
                hablar(r);
            } else {
                imprimir("❌ Mi puente neuronal respondió vacío. Revisa tu token.", "heli");
            }
        } catch(e) {
            imprimir("❌ Error en el puente de datos. Verifica tu internet o el token.", "heli");
        } finally {
            btnSend.disabled = false;
        }
    }

    function limpiarMemoria() {
        if(confirm("¿Fabián, quieres que reinicie mi núcleo de memoria local?")) {
            localStorage.removeItem('heli_history');
            location.reload();
        }
    }

    // Evento corregido con todos los cierres necesarios
    input.addEventListener('keydown', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            enviar(); 
        }
    });
</script>
</body>
</html>
