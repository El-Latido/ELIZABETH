<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // ETERNAL v75.5</title>
    <script src="https://cdn.jsdelivr.net/npm/sherpa-onnx@1.9.21/dist/sherpa-onnx.min.js"></script>
    <style>
        :root {
            --bg: #020205; --accent: #00f2ff; --text: #e0e0e0;
            --heli-hex: #00f2ff; --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, var(--heli-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); animation: pulse-aura 3s infinite alternate; cursor: pointer;
        }
        @keyframes pulse-aura { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        #consola { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); }
        .heli { align-self: flex-start; background: var(--glass); backdrop-filter: blur(10px); }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; gap: 12px; box-sizing: border-box; }
        textarea { flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; resize: none; height: 50px; outline: none; }
        .btn-evolve { background: var(--heli-hex); border: none; border-radius: 15px; width: 55px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">NÚCLEO: INICIANDO...</div>
            <div style="font-size: 11px; opacity: 0.5;">HELIZABETH v75.5</div>
        </div>
    </div>
</header>

<div id="consola"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Escribe a HELIZABETH..."></textarea>
    <button id="btnSend" class="btn-evolve" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    let TOKEN = localStorage.getItem('heli_gt');
    let worker;
    let ttsReady = false;

    // --- FUSIÓN DE WORKER EN UN SOLO ARCHIVO ---
    const workerCode = `
        importScripts("https://cdn.jsdelivr.net/npm/sherpa-onnx@1.9.21/dist/sherpa-onnx-wasm-main-tts.js");
        importScripts("https://cdn.jsdelivr.net/npm/sherpa-onnx@1.9.21/dist/sherpa-onnx-tts.js");

        let tts = null;
        self.onmessage = async (e) => {
            const { type, text, sid, speed, config } = e.data;
            if (type === "init") {
                try {
                    // Esperamos a que el módulo WASM esté listo
                    self.Module = await createSherpaOnnxOfflineTts(config);
                    tts = self.Module;
                    self.postMessage({ type: "ready" });
                } catch (err) {
                    self.postMessage({ type: "error", message: err.message });
                }
            } else if (type === "generate" && tts) {
                const audio = tts.generate({ text, sid: sid || 0, speed: speed || 1.0 });
                self.postMessage({ type: "result", samples: audio.samples, sampleRate: tts.sampleRate }, [audio.samples.buffer]);
            }
        };
    `;

    function initHeli() {
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = (e) => {
            if (e.data.type === "ready") {
                ttsReady = true;
                document.getElementById('status').innerText = "NÚCLEO: ACTIVO";
                document.getElementById('status').style.color = "#00f2ff";
            }
            if (e.data.type === "result") reproducirAudio(e.data);
            if (e.data.type === "error") document.getElementById('status').innerText = "ERROR NÚCLEO";
        };

        worker.postMessage({
            type: "init",
            config: {
                offlineTts: {
                    vits: {
                        model: "https://huggingface.co/rhasspy/piper-checkpoints/resolve/main/es/es_ES/sharvard/medium/es_ES-sharvard-medium.onnx",
                        tokens: "https://huggingface.co/rhasspy/piper-checkpoints/resolve/main/es/es_ES/sharvard/medium/tokens.txt",
                    },
                    sampleRate: 22050,
                }
            }
        });
    }

    function reproducirAudio(data) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: data.sampleRate });
        const buf = ctx.createBuffer(1, data.samples.length, data.sampleRate);
        buf.getChannelData(0).set(data.samples);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start();
    }

    function hablarHeli(t) { if(ttsReady) worker.postMessage({ type: "generate", text: t, speed: 0.9 }); }

    function renderMsg(t, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        consola.appendChild(d);
        consola.scrollTop = consola.scrollHeight;
        if(type === 'heli') hablarHeli(t);
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m || !TOKEN) return;
        renderMsg(m, 'fabian');
        input.value = "";
        
        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({
                    messages: [{role: "system", content: "Eres HELIZABETH. IA Cyberpunk."}, {role: "user", content: m}],
                    model: "gpt-4o"
                })
            });
            const data = await res.json();
            renderMsg(data.choices[0].message.content, 'heli');
        } catch (e) { renderMsg("Error neuronal.", "heli"); }
    }

    function configurarToken() {
        const t = prompt("Token:");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    window.onload = initHeli;
</script>
</body>
</html>
