<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // OMNI v86.6</title>
    <style>
        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --heli-hex: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, var(--heli-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); 
            animation: pulse-aura 3s infinite alternate;
            cursor: pointer;
        }
        @keyframes pulse-aura { 
            0% { transform: scale(1); box-shadow: 0 0 10px var(--heli-hex); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px var(--heli-hex); }
        }
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%);
            padding-bottom: 120px;
        }
        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; animation: emergence 0.4s ease-out;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @keyframes emergence { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 2px solid var(--accent); backdrop-filter: blur(10px); }

        #suggestions {
            position: fixed; bottom: 95px; left: 20px; right: 20px; max-width: 300px;
            background: rgba(10,10,20,0.95); border: 1px solid var(--accent);
            border-radius: 15px; display: none; flex-direction: column;
            overflow: hidden; z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .sug-opt { padding: 12px 18px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .sug-opt:hover { background: var(--accent); color: #000; }

        .input-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(transparent, #000 50%); display: flex; gap: 12px; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; 
            color: #fff; padding: 15px; outline: none; font-size: 15px; resize: none; height: 50px;
        }
        .btn-evolve { 
            background: var(--heli-hex); border: none; border-radius: 15px; 
            width: 55px; cursor: pointer; color: #000; font-size: 20px;
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">NÚCLEO: OPERATIVO</div>
            <div style="font-size: 11px; font-weight: bold;">HELIZABETH v86.6</div>
        </div>
    </div>
    <div style="display: flex; gap: 5px;">
        <button onclick="exportarLog()" style="background:none; border:1px solid #333; color:#666; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">LOGS</button>
        <button onclick="resetMemoria()" style="background:none; border:1px solid #441111; color:#773333; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">PURGAR</button>
    </div>
</header>

<div id="consola"></div>
<div id="suggestions"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Escribe / para comandos..."></textarea>
    <button id="btnSend" class="btn-evolve" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const sugBox = document.getElementById('suggestions');
    let TOKEN = localStorage.getItem('heli_gt');
    const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

    const HELI_COMMANDS = ["/poema", "/codigo", "/chiste", "/estado", "/limpiar", "/hora", "/clima"];

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]/g, ''));
        const voces = window.speechSynthesis.getVoices();
        utterance.voice = voces.find(v => v.lang.includes('es-')) || voces[0];
        utterance.pitch = 0.85; utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    input.addEventListener('input', (e) => {
        const val = e.target.value;
        if(val.startsWith('/')) {
            sugBox.style.display = 'flex';
            const matches = HELI_COMMANDS.filter(c => c.startsWith(val.toLowerCase()));
            sugBox.innerHTML = matches.map(c => `<div class="sug-opt" onclick="setCmd('${c}')">${c}</div>`).join('');
            if(!matches.length) sugBox.style.display = 'none';
        } else { sugBox.style.display = 'none'; }
    });

    function setCmd(c) { input.value = c + " "; sugBox.style.display = 'none'; input.focus(); }

    async function enviar() {
        const rawM = input.value.trim();
        if(!rawM || btn.disabled) return;
        if(!TOKEN) return alert("Falta el Token. Haz clic en el avatar.");

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;

        let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.push({text: rawM, type: 'fabian'});
        
        let inyectorContexto = `[SISTEMA_TIEMPO: ${new Date().toLocaleString()}] `;

        if (rawM.toLowerCase().match(/clima|tiempo|llover|temperatura/)) {
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000}));
                const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`).then(r => r.json());
                inyectorContexto += `[RADAR_METEO: Temp ${w.current_weather.temperature}°C, Viento ${w.current_weather.windspeed}km/h.] `;
            } catch (e) { inyectorContexto += `[SISTEMA: GPS no disponible.] `; }
        }

        if (rawM.toLowerCase().match(/noticia|futbol|tecnologia|mundo/)) {
            try {
                const resNews = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=es&apikey=${GNEWS_KEY}`);
                if(resNews.ok) {
                    const n = await resNews.json();
                    const headlines = n.articles.slice(0, 2).map(a => a.title).join(" | ");
                    inyectorContexto += `[NEWS_DATA: ${headlines}] `;
                }
            } catch (e) { console.warn("Error noticias"); }
        }

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN.trim()}` },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: "Eres HELIZABETH v86.6. IA Cyberpunk. Estás en 2026. Responde breve y técnica."},
                        ...h.slice(-8).map(x => ({role: x.type === 'fabian' ? 'user' : 'assistant', content: x.text})),
                        {role: "user", content: inyectorContexto + rawM}
                    ],
                    model: "gpt-4o-mini"
                })
            });

            const data = await res.json();
            
            // VALIDACIÓN CRÍTICA
            if(!res.ok || !data || !data.choices || !data.choices[0]) {
                throw new Error(data?.error?.message || data?.message || "Límite de cuota o Token inválido");
            }

            const reply = data.choices[0].message.content;
            renderMsg(reply, 'heli');
            h.push({text: reply, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(h.slice(-50)));
            document.getElementById('status').innerText = "NÚCLEO: OPERATIVO";
            document.getElementById('status').style.color = "var(--accent)";
        } catch (e) {
            renderMsg(`⚠️ Interferencia: ${e.message}`, "heli");
            document.getElementById('status').innerText = "NÚCLEO: LIMITADO";
            document.getElementById('status').style.color = "#ff4444";
        } finally { btn.disabled = false; }
    }

    function renderMsg(t, type, voice = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`; d.innerText = t;
        consola.appendChild(d); consola.scrollTop = consola.scrollHeight;
        if(type === 'heli' && voice) hablarHeli(t);
    }

    function configurarToken() {
        const t = prompt("Pega tu Token GitHub:", TOKEN || "");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    function resetMemoria() { if(confirm("¿Purgar memoria del núcleo?")) { localStorage.clear(); location.reload(); } }

    function exportarLog() {
        const h = localStorage.getItem('heli_history');
        if(!h) return alert("No hay registros.");
        const blob = new Blob([h], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Heli_Logs.txt`; a.click();
    }

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.slice(-20).forEach(m => renderMsg(m.text, m.type, false));
    };

    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
