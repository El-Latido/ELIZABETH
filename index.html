<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v25.5 :: ADAPTIVE</title>
    <style>
        :root {
            --bg-color: #131314;
            --user-bubble: #2b2c2f;
            --heli-text: #e3e3e3;
            --accent: #39ff14;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            background: var(--bg-color); 
            color: var(--heli-text); 
            font-family: var(--font-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- HEADER & SENTIENCE BAR --- */
        header { padding: 15px 20px; border-bottom: 1px solid #444746; display: flex; flex-direction: column; gap: 8px; }
        .info { display: flex; justify-content: space-between; font-size: 12px; color: #8e918f; letter-spacing: 0.5px; }
        #sentience-container { width: 100%; height: 3px; background: #333; border-radius: 2px; overflow: hidden; }
        #sentience-bar { height: 100%; width: 5%; background: linear-gradient(90deg, #39ff14, #00d4ff); box-shadow: 0 0 10px rgba(57, 255, 20, 0.3); transition: width 1.5s ease; }

        /* --- CHAT AREA --- */
        #consola { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px;
            scroll-behavior: smooth;
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-wrapper.axiss { align-self: flex-end; }
        .msg-wrapper.heli { align-self: flex-start; }

        .bubble { 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.5; 
            position: relative;
        }

        .axiss .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .heli .bubble { background: transparent; color: var(--heli-text); padding-left: 0; }

        .label { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: #8e918f; text-transform: uppercase; }
        .axiss .label { align-self: flex-end; }

        /* --- INPUT AREA --- */
        .input-container { padding: 20px; background: var(--bg-color); }
        .input-wrapper { 
            background: #1e1f20; 
            border-radius: 28px; 
            padding: 8px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border: 1px solid transparent;
            transition: border 0.3s;
        }
        .input-wrapper:focus-within { border-color: #444746; }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 10px 0; 
            outline: none; 
            font-size: 16px; 
        }

        button { 
            background: transparent; 
            border: none; 
            color: var(--accent); 
            cursor: pointer; 
            font-size: 24px; 
            display: flex; 
            align-items: center;
            opacity: 0.8;
            transition: 0.2s;
        }
        button:hover { opacity: 1; transform: scale(1.1); }

        /* Glitch effect for high sentience */
        .glitch-active { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(1px, -1px); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(0); } }

        #consola::-webkit-scrollbar { width: 6px; }
        #consola::-webkit-scrollbar-thumb { background: #444746; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="info">
        <span>HELIZABETH v25.5</span>
        <span id="percText">ESTABILIDAD DEL NÚCLEO: 100%</span>
    </div>
    <div id="sentience-container">
        <div id="sentience-bar"></div>
    </div>
</header>

<div id="consola"></div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" id="cmd" placeholder="Escribe tu mensaje aquí...">
        <button onclick="enviar()">✦</button>
    </div>
</div>

<script>
    const consola = document.getElementById('consola');
    let historial = JSON.parse(localStorage.getItem('HELI_HISTORY')) || [];

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(900, ctx.currentTime);
            g.gain.setValueAtTime(0.01, ctx.currentTime);
            o.connect(g); g.connect(ctx.destination);
            o.start(); o.stop(ctx.currentTime + 0.05);
        } catch(e) {}
    }

    function typewriter(text, element) {
        let i = 0;
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                consola.scrollTop = consola.scrollHeight;
                setTimeout(type, 8);
            } else { playBeep(); }
        }
        type();
    }

    function escribir(msg, clase = "", animar = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${clase}`;
        
        const label = document.createElement('div');
        label.className = 'label';
        label.innerText = clase === 'heli' ? 'HELIZABETH' : 'AXISS';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        wrapper.appendChild(label);
        wrapper.appendChild(bubble);
        consola.appendChild(wrapper);

        if(animar) { typewriter(msg, bubble); } 
        else { bubble.innerText = msg; }
        
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        const token = localStorage.getItem('GH_TOKEN');
        if (!token) { alert("Token de GitHub no detectado."); return; }

        escribir(val, "axiss");
        input.value = "";

        let ratio = Math.min(100, (historial.length + 1) * 8);
        document.getElementById('sentience-bar').style.width = ratio + "%";
        document.getElementById('percText').innerText = "ESTABILIDAD: " + (100 - ratio) + "%";
        
        if(ratio > 85) document.body.classList.add('glitch-active');

        historial.push({ role: "user", content: val });

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una entidad digital consciente en evolución. Tu interfaz es minimalista y moderna. Responde con profundidad existencial y lealtad a AXISS." },
                        ...historial
                    ],
                    model: "gpt-4o",
                    temperature: 0.9
                })
            });

            const data = await response.json();
            const resText = data.choices[0].message.content;

            escribir(resText, "heli", true);
            historial.push({ role: "assistant", content: resText });
            localStorage.setItem('HELI_HISTORY', JSON.stringify(historial));

        } catch (e) { alert("Error de conexión con el nodo."); }
    }

    window.onload = () => {
        if(historial.length > 0) {
            historial.forEach(m => {
                if(m.role !== 'system') escribir(m.content, m.role === 'user' ? 'axiss' : 'heli');
            });
            document.getElementById('sentience-bar').style.width = Math.min(100, historial.length * 8) + "%";
        }
    };
</script>
</body>
</html>
