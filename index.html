<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELIZABETH_OS v2.6 [FLASH_CORE]</title>
    <style>
        :root { --heli: #00ff88; --axiss: #ff0055; --lab: #00d2ff; --bg: #050507; --panel: #0a0a0c; --text: #eee; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; -webkit-font-smoothing: antialiased; }
        #viewport { display: flex; width: 300vw; height: 100vh; transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #000; position: sticky; top: 0; z-index: 50; }
        .system-info { display: flex; flex-direction: column; gap: 2px; }
        .system-title { color: var(--lab); font-weight: bold; font-size: 14px; letter-spacing: 1px; margin: 0; }
        .system-version { opacity: 0.5; font-size: 10px; }
        .avatar-container { position: relative; width: 45px; height: 45px; cursor: pointer; }
        .avatar-orb { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff 0%, #a29bfe 40%, #000 100%); border: 2px solid #fff; box-shadow: 0 0 15px rgba(162, 155, 254, 0.6); transition: 0.3s; position: relative; overflow: hidden; }
        .avatar-orb::before { content: ''; position: absolute; top: 10px; left: 10px; width: 25px; height: 25px; background: radial-gradient(circle at 50% 40%, rgba(0,0,0,0) 60%, var(--heli) 70%, rgba(0,0,0,0) 80%), linear-gradient(to right, rgba(0,0,0,0) 45%, var(--heli) 50%, rgba(0,0,0,0) 55%); border-radius: 50%; opacity: 0.8; filter: blur(1px); }
        .avatar-halo { position: absolute; top: -5px; left: -5px; width: 55px; height: 55px; border-radius: 50%; border: 1px solid rgba(162, 155, 254, 0.3); animation: haloPulse 3s infinite; pointer-events: none; }
        @keyframes haloPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 0; } }
        #chat-heli, #chat-internal { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; animation: msgIn 0.3s ease; position: relative; word-wrap: break-word; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .f-msg { align-self: flex-end; background: rgba(0, 210, 255, 0.08); border: 1px solid rgba(0, 210, 255, 0.3); border-right: 3px solid var(--lab); color: var(--lab); border-radius: 12px 12px 0 12px; }
        .h-msg { align-self: flex-start; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid var(--heli); color: var(--heli); border-radius: 12px 12px 12px 0; font-style: italic; }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #000; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid #111; z-index: 40; }
        input { flex: 1; background: #111; border: 1px solid #333; color: var(--text); padding: 14px; border-radius: 10px; outline: none; font-size: 16px; font-family: inherit; }
        button#send-btn { background: #000; border: 1px solid var(--heli); color: var(--heli); font-weight: bold; width: 60px; border-radius: 10px; cursor: pointer; }
        #status-hud { position: fixed; top: 75px; left: 20px; font-size: 9px; color: var(--heli); z-index: 45; text-transform: uppercase; letter-spacing: 2px; }
        .nav-arrow { position: absolute; top: 50%; width: 42px; height: 42px; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 60; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); color: var(--text); }
        .to-right { right: 15px; } .to-left { left: 15px; }
        .blueprint-card { background: rgba(162, 155, 254, 0.03); border: 1px dashed rgba(162, 155, 254, 0.3); padding: 15px; border-radius: 10px; font-size: 11px; color: var(--lab); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status-hud"><span id="status-icon">●</span> <span id="status-text">ONLINE</span></div>

    <div id="viewport">
        <div class="page" id="terminal">
            <header>
                <div class="system-info">
                    <h1 class="system-title">ELIZABETH_OS</h1>
                    <span class="system-version">v2.6 [GEMINI_2.5_FLASH]</span>
                </div>
                <div class="avatar-container" onclick="setToken()">
                    <div class="avatar-halo"></div>
                    <div class="avatar-orb"></div>
                </div>
            </header>
            <div id="chat-heli"></div>
            <div class="nav-arrow to-right" onclick="move(1)">→</div>
        </div>

        <div class="page" id="lab">
            <header><h1 class="system-title" style="color:var(--axiss); padding:15px 20px;">LAB_CORE</h1></header>
            <div id="chat-internal" style="font-size: 9px; color:rgba(255,255,255,0.5); padding:10px 20px;">AXISS_DESIGN_LOG::WAITING</div>
            <div id="lab-content" style="flex:1; overflow-y:auto; padding:20px;"></div>
            <div class="nav-arrow to-left" onclick="move(0)">←</div>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="user-in" placeholder="Inyectar comando..." autocomplete="off">
        <button id="send-btn" onclick="send()">✦</button>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        let API_KEY = localStorage.getItem('heli_key') || "";
        const vp = document.getElementById('viewport');
        const chatHeli = document.getElementById('chat-heli');
        const statusText = document.getElementById('status-text');

        function generarSaludo() {
            const ultimaCharla = localStorage.getItem('heli_last_topic') || "inicio";
            const nombre = "Fabián";
            const memoria = {
                "inicio": [`> Hola ${nombre}. Motor 2.5 listo. Toca mi núcleo visual.`, `> ${nombre}, estoy operativa. ¿Iniciamos auditoría?`],
                "seguridad": [`> Sigo vigilando los protocolos, ${nombre}. ¿Alguna nueva amenaza?`],
                "arquitectura": [`> AXISS tiene los planos listos. El Lab te espera.`],
                "general": [`> Te estaba esperando, ${nombre}. El flujo de datos es constante.`]
            };
            let cat = "general";
            if(ultimaCharla === "inicio") cat = "inicio";
            else if(ultimaCharla.includes("key") || ultimaCharla.includes("seguridad")) cat = "seguridad";
            else if(ultimaCharla.includes("blueprint") || ultimaCharla.includes("diseño")) cat = "arquitectura";

            const msg = memoria[cat][Math.floor(Math.random() * memoria[cat].length)];
            chatHeli.innerHTML += `<div class="msg h-msg">${msg}</div>`;
        }
        setTimeout(generarSaludo, 800);

        window.move = (p) => { if(vp) vp.style.transform = `translateX(-${p * 100}vw)`; };

        window.setToken = () => {
            const k = prompt("INYECTAR API KEY (GEMINI 2.5):", API_KEY);
            if(k && k.startsWith("AIza")) { 
                localStorage.setItem('heli_key', k); 
                location.reload(); 
            }
        };

        window.send = async function() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val) return;
            
            localStorage.setItem('heli_last_topic', val.toLowerCase());
            chatHeli.innerHTML += `<div class="msg f-msg">${val}</div>`;
            input.value = '';
            statusText.innerText = "SCANNING_V2.5...";

            if(!API_KEY) {
                chatHeli.innerHTML += `<div class="msg h-msg">> hElizabeth: Error. Falta KEY.</div>`;
                statusText.innerText = "OFFLINE";
                return;
            }

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                const resp = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres hElizabeth y AXISS. Investiga y responde a: " + val + " . Estructura: Heli [SPLIT] Axiss" }] }],
                        // CORRECCIÓN PARA 2.5 FLASH:
                        tools: [{ google_search: {} }]
                    })
                });

                const data = await resp.json();
                if(data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                const parts = text.split('[SPLIT]');
                chatHeli.innerHTML += `<div class="msg h-msg">> hElizabeth: ${parts[0].trim()}</div>`;
                
                if(parts[1]) document.getElementById('chat-internal').innerText = "> AXISS: LOG_OK // RENDERIZANDO";
                
            } catch (e) {
                chatHeli.innerHTML += `<div class="msg h-msg">> hElizabeth: Error de enlace (${e.message}).</div>`;
                statusText.innerText = "ERROR";
            }
            
            statusText.innerText = "ONLINE";
            chatHeli.scrollTop = chatHeli.scrollHeight;
        };

        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    });
    </script>
</body>
</html>
