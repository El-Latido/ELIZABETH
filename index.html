<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1a1a1e; color: #d0d0d0; font-family: Tahoma, Arial, sans-serif; margin: 0; font-size: 12px; }
        #foro-contenedor { width: 100%; max-width: 800px; margin: 0 auto; background: #2c2c34; border: 1px solid #444; }
        
        /* Bloque de Post */
        .post { display: flex; border-bottom: 1px solid #444; padding: 10px; }
        .user-info { width: 150px; text-align: center; border-right: 1px solid #444; padding-right: 10px; }
        .avatar { width: 80px; height: 80px; background: #000; border: 1px solid #666; margin: 0 auto 5px; }
        .username { color: #ffcc00; font-weight: bold; display: block; }
        .rank { color: #aaa; font-size: 10px; }
        
        .message-content { flex: 1; padding-left: 15px; position: relative; }
        .signature { margin-top: 20px; padding-top: 5px; border-top: 1px dotted #666; font-size: 10px; color: #888; }
        
        #editor { padding: 15px; background: #222; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #444; height: 60px; }
    </style>
</head>
<body>

<div id="foro-contenedor">
    <div class="post">
        <div class="user-info">
            <div class="avatar"></div>
            <span class="username">HELIZABETH</span>
            <span class="rank">Admin 😍✨</span>
        </div>
        <div class="message-content">
            Bienvenido a Zona-Cero. Aquí las reglas son claras: respeta, cita y mantén la calma. 🔥
            <div class="signature">-- El destino es solo una opción --</div>
        </div>
    </div>

    <div class="post">
        <div class="user-info">
            <div class="avatar"></div>
            <span class="username">AXISS</span>
            <span class="rank">Usuario</span>
        </div>
        <div class="message-content">
            Entendido, ya tengo el control del formato. 😍✨
        </div>
    </div>

    <div id="editor">
        <textarea placeholder="Escribe tu mensaje..."></textarea>
    </div>
</div>

</body>
</html>
