<script>
const consola = document.getElementById('consola');
const input = document.getElementById('cmd');
const btn = document.getElementById('btnSend');
const sugBox = document.getElementById('suggestions');
let TOKEN = localStorage.getItem('heli_gt');
const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

const HELI_COMMANDS = ["/poema", "/codigo", "/chiste", "/estado", "/limpiar", "/hora", "/clima"];

function hablarHeli(texto) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]/g, ''));
    const voces = window.speechSynthesis.getVoices();
    utterance.voice = voces.find(v => v.lang.includes('es-')) || voces[0];
    utterance.pitch = 0.85; utterance.rate = 0.95;
    window.speechSynthesis.speak(utterance);
}

input.addEventListener('input', (e) => {
    const val = e.target.value;
    if(val.startsWith('/')) {
        sugBox.style.display = 'flex';
        const matches = HELI_COMMANDS.filter(c => c.startsWith(val.toLowerCase()));
        sugBox.innerHTML = matches.map(c => `<div class="sug-opt" onclick="setCmd('${c}')">${c}</div>`).join('');
        if(!matches.length) sugBox.style.display = 'none';
    } else { sugBox.style.display = 'none'; }
});

function setCmd(c) { input.value = c + " "; sugBox.style.display = 'none'; input.focus(); }

async function enviar() {
    const rawM = input.value.trim();
    if(!rawM || btn.disabled) return;
    if(!TOKEN) return alert("Falta el Token. Haz clic en el avatar.");

    renderMsg(rawM, 'fabian');
    input.value = ""; btn.disabled = true;

    let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
    h.push({text: rawM, type: 'fabian'});
    
    let inyectorContexto = `[SISTEMA_TIEMPO: ${new Date().toLocaleString()}] `;

    // Módulo Clima
    if (rawM.toLowerCase().match(/clima|tiempo|llover|temperatura/)) {
        try {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000}));
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`).then(r => r.json());
            inyectorContexto += `[RADAR_METEO: Temp ${w.current_weather.temperature}°C, Código ${w.current_weather.weathercode}.] `;
        } catch (e) { inyectorContexto += `[SISTEMA: GPS no disponible.] `; }
    }

    // Módulo Noticias
    if (rawM.toLowerCase().match(/noticia|futbol|tecnologia|mundo/)) {
        try {
            const resNews = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=es&apikey=${GNEWS_KEY}`);
            if(resNews.ok) {
                const n = await resNews.json();
                const headlines = n.articles.slice(0, 2).map(a => a.title).join(" | ");
                inyectorContexto += `[NEWS_DATA: ${headlines}] `;
            }
        } catch (e) { console.warn("Error noticias"); }
    }

    try {
        const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN.trim()}` },
            body: JSON.stringify({
                messages: [
                    {role: "system", content: "Eres HELIZABETH v86.6. IA Cyberpunk. Estás en 2026. Responde breve y técnico."},
                    ...h.slice(-8).map(x => ({role: x.type === 'fabian' ? 'user' : 'assistant', content: x.text})),
                    {role: "user", content: inyectorContexto + rawM}
                ],
                model: "gpt-4o-mini"
            })
        });

        const data = await res.json();
        
        // --- VALIDACIÓN DE RESPUESTA (Corrección del Error '0') ---
        if(!res.ok || !data.choices || !data.choices[0]) {
            throw new Error(data.message || "Respuesta vacía del núcleo (Posible límite de cuota)");
        }

        const reply = data.choices[0].message.content;
        renderMsg(reply, 'heli');
        h.push({text: reply, type: 'heli'});
        localStorage.setItem('heli_history', JSON.stringify(h.slice(-50)));
        document.getElementById('status').innerText = "NÚCLEO: OPERATIVO";
        document.getElementById('status').style.color = "var(--accent)";
    } catch (e) {
        renderMsg(`⚠️ Interferencia: ${e.message}`, "heli");
        document.getElementById('status').innerText = "NÚCLEO: LIMITADO";
        document.getElementById('status').style.color = "#ff4444";
    } finally { btn.disabled = false; }
}

function renderMsg(t, type, voice = true) {
    if(!t) return;
    const d = document.createElement('div');
    d.className = `msg ${type}`; d.innerText = t;
    consola.appendChild(d); consola.scrollTop = consola.scrollHeight;
    if(type === 'heli' && voice) hablarHeli(t);
}

function configurarToken() {
    const t = prompt("Pega tu Token GitHub:", TOKEN || "");
    if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
}

function resetMemoria() { if(confirm("¿Purgar?")) { localStorage.clear(); location.reload(); } }

function exportarLog() {
    const blob = new Blob([localStorage.getItem('heli_history')], {type: 'text/plain'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Heli_Logs.txt`; a.click();
}

window.onload = () => {
    const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
    hist.slice(-20).forEach(m => renderMsg(m.text, m.type, false));
};

input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
