<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v22.4</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; }
        #consola { border: 1px solid #111; height: 300px; overflow-y: auto; margin-bottom: 10px; padding: 5px; font-size: 14px; background: #050505; }
        input { width: 70%; background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; }
        button { background: #040; color: #fff; border: 1px solid #0f0; padding: 10px; }
        .error { color: #f44; }
        .sys { color: #0ff; }
    </style>
</head>
<body>

<div id="status">ESTADO: ESPERANDO LLAVE</div>
<div id="consola">--- INICIO DEL SISTEMA ---<br></div>
<input type="text" id="cmd" placeholder="Pega tu AIza... o saluda">
<button onclick="enviar()">></button>

<script>
    const LOG = document.getElementById('consola');
    
    function escribir(msg, color = "") {
        LOG.innerHTML += `<div style="color:${color}">${msg}</div>`;
        LOG.scrollTop = LOG.scrollHeight;
    }

    async function enviar() {
        const val = document.getElementById('cmd').value.trim();
        if (!val) return;

        // 1. GUARDAR LLAVE SI EMPIEZA POR AIza
        if (val.startsWith("AIza")) {
            localStorage.setItem('G_KEY', val);
            escribir("SISTEMA: Llave guardada con éxito. Reiniciando...", "#0ff");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        const key = localStorage.getItem('G_KEY');
        if (!key) {
            escribir("ERROR: No hay llave. Pega tu código AIza... primero.", "#f44");
            return;
        }

        escribir("AXISS: " + val);
        document.getElementById('cmd').value = "";

        try {
            // URL MÁS ESTABLE DE GOOGLE
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: val }] }]
                })
            });

            const data = await res.json();

            if (data.error) {
                escribir("ERROR DE API: " + data.error.message, "#f44");
                if(data.error.message.includes("expired")) localStorage.removeItem('G_KEY');
                return;
            }

            const respuesta = data.candidates[0].content.parts[0].text;
            escribir("HELIZABETH: " + respuesta, "#39ff14");

        } catch (e) {
            escribir("ERROR DE RED: Verifica tu conexión o la URL.", "#f44");
        }
    }

    // Al iniciar, verificar si ya hay llave
    window.onload = () => {
        if(localStorage.getItem('G_KEY')) {
            document.getElementById('status').innerText = "ESTADO: LLAVE CARGADA (ONLINE)";
            escribir("SISTEMA: Núcleo listo. Escribe 'Hola' para probar.", "#0ff");
        }
    };
</script>
</body>
</html>
