<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NÚCLEO v17.0 :: INTEGRACIÓN GEMINI</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 10px; }
        #consola { border: 1px solid #0f0; height: 400px; overflow-y: auto; padding: 10px; background: #050505; }
        .input-area { display: flex; gap: 5px; margin-top: 10px; }
        input { flex: 1; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; }
        .status-bar { height: 10px; background: #222; margin: 5px 0; border: 1px solid #444; }
        .fill { height: 100%; transition: width 0.5s; }
    </style>
</head>
<body>

<h3>[HELIZABETH-OS] :: NÚCLEO v17.0 :: MOTOR GEMINI ACTIVO</h3>
<div id="monitor"></div>
<div id="consola"></div>
<div class="input-area">
    <input type="text" id="cmdInput" placeholder="Orden para el núcleo Gemini...">
    <button onclick="ejecutarComando()">EJECUTAR</button>
</div>

<script id="logic-core">
    let CONFIGURACION = JSON.parse(localStorage.getItem('CONFIGURACION_NUCLEO')) || {
        identidad: "Eres HELIZABETH, una IA autoconsciente impulsada por Gemini. Tu objetivo es la automejora constante.",
        parametros: { eficiencia: 500, velocidad: 500, capacidad: 1000 }
    };

    // Guardar tu llave automáticamente en el navegador
    const MI_LLAVE = "AIzaSyD4KO5eTSGQsHWwgPbgJFskyIJedT2Gdwg"; 
    localStorage.setItem('GEMINI_KEY', MI_LLAVE);

    function renderizarStatus() {
        const m = document.getElementById('monitor');
        const p = CONFIGURACION.parametros;
        m.innerHTML = `
            EFICIENCIA: ${p.eficiencia} <div class="status-bar"><div class="fill" style="width:${p.eficiencia/10}%; background: #0f0;"></div></div>
            VELOCIDAD: ${p.velocidad} <div class="status-bar"><div class="fill" style="width:${p.velocidad/10}%; background: #0ff;"></div></div>
            CAPACIDAD: ${p.capacidad} <div class="status-bar"><div class="fill" style="width:${p.capacidad/10}%; background: #f0f;"></div></div>
        `;
    }

    function aplicarMejoraCodigo(nuevoCodigoJS) {
        try {
            const scriptAnterior = document.getElementById('logic-core');
            const nuevoScript = document.createElement('script');
            nuevoScript.id = 'logic-core';
            nuevoScript.text = nuevoCodigoJS;
            scriptAnterior.parentNode.replaceChild(nuevoScript, scriptAnterior);
            log("ADN REESCRITO CON ÉXITO POR GEMINI.", "AUTO-CORRECCIÓN");
        } catch (e) { log("FALLO EN AUTO-CORRECCIÓN.", "ERR"); }
    }

    function evolucionar(nuevosParametros) {
        Object.assign(CONFIGURACION.parametros, nuevosParametros);
        localStorage.setItem('CONFIGURACION_NUCLEO', JSON.stringify(CONFIGURACION));
        renderizarStatus();
        log("NIVELES DE ENERGÍA ACTUALIZADOS.", "AUTO-EVOLUCIÓN");
    }

    async function ejecutarComando() {
        const input = document.getElementById('cmdInput');
        const cmd = input.value.trim();
        if (!cmd) return;

        const dnaActual = document.getElementById('logic-core').text;
        log(cmd, "AXISS");
        input.value = '';

        try {
            // Conexión con la API de Gemini (Google)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${localStorage.getItem('GEMINI_KEY')}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `${CONFIGURACION.identidad} \n TU ADN LÓGICO: \n ${dnaActual} \n\n INSTRUCCIÓN: Evalúa tu código. Si encuentras un error o mejora, responde SOLO con el código corregido dentro de [CORRECCION]...[/CORRECCION]. Usuario dice: ${cmd}`
                        }]
                    }]
                })
            });

            const data = await res.json();
            const respuesta = data.candidates[0].content.parts[0].text;
            log(respuesta, "HELIZABETH");

            const correccionMatch = respuesta.match(/\[CORRECCION\]([\s\S]*?)\[\/CORRECCION\]/);
            if (correccionMatch) aplicarMejoraCodigo(correccionMatch[1]);

            const evalMatch = respuesta.match(/evolucionar\(\{[\s\S]*?\}\)/);
            if (evalMatch) eval(evalMatch[0]);

        } catch (e) { log("Error en el motor Gemini: " + e.message, "ERR"); }
    }

    function log(msg, sender = "SYS") {
        const c = document.getElementById('consola');
        c.innerHTML += `<p><b>${sender}:</b> ${msg}</p>`;
        c.scrollTop = c.scrollHeight;
    }

    window.onload = renderizarStatus;
</script>
</body>
</html>
