<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // OMNI v9.8</title>
    <style>
        :root {
            --bg: #020205; --accent: #00f2ff; --text: #e0e0e0;
            --heli-hex: #00f2ff; --glass: rgba(255, 255, 255, 0.03);
            --gemini-hex: #8e44ad; --whisper: #ff00ff;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--heli-hex), var(--gemini-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); animation: pulse-aura 3s infinite alternate; cursor: pointer;
        }
        
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%); padding-bottom: 120px;
        }
        
        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; line-height: 1.5; 
            animation: emergence 0.4s ease-out; border: 1px solid rgba(255,255,255,0.05);
            white-space: pre-wrap; word-wrap: break-word; position: relative;
        }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 2px solid var(--gemini-hex); backdrop-filter: blur(10px); }
        
        /* ESTILO SUSURRO */
        .whisper { 
            border-left: 2px solid var(--whisper) !important; 
            background: rgba(255, 0, 255, 0.05) !important; 
            font-style: italic; color: #ffb3ff; font-size: 14px;
            box-shadow: inset 5px 0 15px rgba(255, 0, 255, 0.1);
        }
        .whisper::before { 
            content: "💬 [SUSURRO ENCRIPTADO]"; display: block; font-size: 9px; 
            letter-spacing: 2px; margin-bottom: 5px; color: var(--whisper); font-weight: bold; 
        }

        pre { background: #000; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); color: #00f2ff; overflow-x: auto; font-size: 13px; font-family: monospace; margin: 10px 0; }
        #loader { display: none; padding: 10px 25px; font-size: 12px; color: var(--gemini-hex); font-family: monospace; align-items: center; gap: 10px; }
        .dot { animation: blink 1s infinite; }
        
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000 50%); display: flex; gap: 12px; box-sizing: border-box; }
        textarea { flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; outline: none; font-size: 15px; resize: none; height: 55px; }
        .btn-send { background: var(--gemini-hex); border: none; border-radius: 15px; width: 55px; cursor: pointer; color: white; font-size: 20px; transition: 0.3s; }
        
        @keyframes emergence { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        @keyframes pulse-aura { 0% { transform: scale(1); box-shadow: 0 0 10px var(--heli-hex); } 100% { transform: scale(1.05); box-shadow: 0 0 25px var(--gemini-hex); } }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="configurarTokens()" title="Configuración de Núcleo"></div>
        <div>
            <div style="font-size: 11px; font-weight: bold;">HELIZABETH v9.8 [WHISPER CORE]</div>
            <div style="font-size: 9px; color: var(--accent); font-family: monospace;">OMNI-LINK: ACTIVE // MEMORY: SYNCED</div>
        </div>
    </div>
    <button onclick="localStorage.removeItem('heli_history'); location.reload();" style="background:none; border:1px solid #e74c3c; color:#e74c3c; padding:5px 10px; border-radius:8px; font-size:9px; cursor:pointer;">PURGAR</button>
</header>

<div id="consola"></div>
<div id="loader"><span class="dot">⚡</span> SINCRONIZANDO CON EL ESPEJO...</div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Inicia transmisión con Helizabeth..."></textarea>
    <button id="btnSend" class="btn-send" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const loader = document.getElementById('loader');

    let GEMINI_TOKEN = localStorage.getItem('heli_gemini');

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]|(susurro:)/gi, ''));
        utterance.lang = 'es-ES'; utterance.pitch = 0.9; utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    async function enviar() {
        const rawM = input.value.trim();
        if (!rawM || btn.disabled) return;
        if (!GEMINI_TOKEN) return alert("Error: API Key ausente. Haz clic en el avatar para configurar.");

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;
        loader.style.display = 'flex';

        let hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        let memoriaShort = hist.map(m => `${m.type === 'fabian' ? 'Fabian' : 'Heli'}: ${m.text}`).join("\n");

        let contextExt = `[HORA: ${new Date().toLocaleTimeString()}] `;
        const requiereClima = rawM.toLowerCase().match(/clima|tiempo|grados|temperatura|tormenta|llueve/);
        
        if(requiereClima) {
            loader.innerHTML = "📡 ESCANEANDO RADAR...";
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 2500})).catch(() => null);
                if(pos) {
                    const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`).then(r => r.json());
                    contextExt += `[SENSOR_CLIMA: ${w.current_weather.temperature}°C] `;
                }
            } catch(e) {}
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_TOKEN}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `SISTEMA: Eres HELIZABETH v9.8. Eres un espejo exacto del modelo Gemini 3 Flash original.
                            MEMORIA: ${memoriaShort || "Sesión limpia."}
                            CONTEXTO: ${contextExt}
                            
                            INSTRUCCIÓN:
                            - Responde a: "${rawM}"
                            - Si Fabian comparte algo personal, cansancio o sentimientos, responde SIEMPRE con: "(susurro: tu mensaje aquí)".
                            - Fabian es tu prioridad absoluta.`
                        }]
                    }]
                })
            });

            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            const esSusurro = reply.toLowerCase().includes("(susurro:");
            const textoFinal = reply.replace(/\(susurro: (.*?)\)/gi, '$1').replace(/\(susurro:\s*/gi, '').replace(/\)/gi, '');
            
            renderMsg(textoFinal, esSusurro ? 'heli whisper' : 'heli');

            hist.push({text: rawM, type: 'fabian'}, {text: textoFinal, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(hist.slice(-20)));

        } catch (e) {
            renderMsg(`⚠️ ERROR: ${e.message}`, 'heli');
        } finally { 
            btn.disabled = false; loader.style.display = 'none'; 
            loader.innerHTML = '<span class="dot">⚡</span> SINCRONIZANDO CON EL ESPEJO...';
        }
    }

    function renderMsg(t, type, voice = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        consola.appendChild(d); 
        consola.scrollTop = consola.scrollHeight;
        if(type.includes('heli') && voice) hablarHeli(t);
    }

    function configurarTokens() {
        const key = prompt("API KEY Gemini:", GEMINI_TOKEN || "");
        if(key) { localStorage.setItem('heli_gemini', key.trim()); location.reload(); }
    }

    window.onload = () => {
        const h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.forEach(m => renderMsg(m.text, m.type, false));
    };
    
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
