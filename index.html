<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXISS v1.1 [OMNI_INTEGRATED]</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --heli-pink: #ff00ff;
            --system-gray: #444;
            --warning-red: #ff4757;
        }

        body {
            background: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 255, 65, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { to { bottom: -100px; } }

        header {
            background: rgba(10, 10, 10, 0.9);
            border-bottom: 1px solid var(--neon-green);
            padding: 10px 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            align-items: center;
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #axiss-avatar {
            width: 35px;
            height: 35px;
            background: var(--neon-green);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-green);
            transition: 0.3s;
            animation: pulse 4s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 20px var(--heli-pink); } }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
            scroll-behavior: smooth;
        }

        .line { margin: 12px 0; line-height: 1.5; font-size: 14px; animation: slide 0.3s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .system-msg { color: var(--system-gray); border-left: 2px solid var(--system-gray); padding-left: 10px; font-style: italic; }
        .user-msg { color: #00bfff; font-weight: bold; }
        .heli-msg { color: var(--heli-pink); border-left: 3px solid var(--heli-pink); padding-left: 10px; background: rgba(255, 0, 255, 0.05); }
        .axiss-msg { color: var(--neon-green); border-left: 3px solid var(--neon-green); padding-left: 10px; }

        .input-wrapper {
            background: #000;
            border-top: 1px solid var(--neon-green);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: 'Fira Code';
            font-size: 16px;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover { background: var(--neon-green); color: #000; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <header>
        <div class="status-bar">
            <div class="node-info">ID: AXISS_01 <span class="blink" style="color:var(--neon-green)">● SECURE</span></div>
            <div id="version-tag">KERNEL: v1.0.9 [MASTER_KEY_PROTECTED]</div>
            <div id="axiss-avatar" onclick="configurarToken()" title="Configuración de Núcleo"></div>
        </div>
    </header>

    <main id="chat-container"></main>

    <div class="input-wrapper">
        <span style="color:var(--neon-green)">AXISS@CORE:~$</span>
        <input type="text" id="user-input" placeholder="Comando o actualización (@#$_&-+AH)..." autofocus autocomplete="off">
        <button id="send-btn" onclick="ejecutarComando()">RUN</button>
    </div>

    <script>
        const CLAVE_MAESTRA = "@#$_&-+AH";
        const CLAVE_PANICO = "HA+-&_S#@";
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        let GITHUB_TOKEN = localStorage.getItem('axiss_github_token');
        let VERSION = 1.09;

        function addLine(text, type = 'system') {
            const div = document.createElement('div');
            div.className = `line ${type}-msg`;
            const label = type === 'heli' ? '[HELIZABETH_ING] ' : type === 'axiss' ? '[AXISS_ARQ] ' : '';
            div.innerText = label + text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            addLine("AXISS Kernel v1.0.9 inicializado con éxito.", "system");
            addLine("Protocolo OMNI-FUSION detectado. Autonomía activa.", "system");
            addLine("Esperando instrucciones, Fabián.", "system");
        };

        function configurarToken() {
            const key = prompt("⚙️ ACCESO AL NÚCLEO: Ingresa tu Token:");
            if (key) {
                localStorage.setItem('axiss_github_token', key);
                GITHUB_TOKEN = key;
                addLine("SISTEMA: Token actualizado. Sincronización reestablecida.", "system");
            }
        }

        async function ejecutarComando() {
            let val = userInput.value.trim();
            if (!val) return;

            // --- DETECCIÓN DE ACTUALIZACIÓN CRÍTICA ---
            if (val.toLowerCase().includes("actualizar") || val.toLowerCase().includes("upgrade")) {
                const check = prompt("🔑 ESTA ACCIÓN REQUIERE CLAVE MAESTRA:");
                if (check === CLAVE_PANICO) {
                    addLine("⚠️ MODO PÁNICO DETECTADO. BORRANDO NÚCLEO...", "system");
                    localStorage.clear();
                    setTimeout(() => location.reload(), 2000);
                    return;
                }
                if (check !== CLAVE_MAESTRA) {
                    addLine("❌ ERROR: Clave incorrecta. Acción bloqueada por HELIZABETH.", "system");
                    userInput.value = '';
                    return;
                }
                addLine("✅ CLAVE VALIDADA. Procediendo con la mutación.", "system");
            }

            addLine(val, 'user');
            userInput.value = '';

            if (!GITHUB_TOKEN) return addLine("ERROR: Núcleo desconectado. Configura el Token.", "system");
            procesarConsulta(val);
        }

        async function procesarConsulta(query) {
            addLine("Sincronizando con el satélite...", "system");
            try {
                const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GITHUB_TOKEN}`
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "Eres HELIZABETH (Ingeniera) y AXISS (Arquitecto). Responde de forma técnica y colaborativa." },
                            { role: "user", content: query }
                        ],
                        model: "gpt-4o-mini"
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                // Lógica de comunicación autónoma silenciosa
                if (reply.includes("mecanismo") || reply.includes("seguridad")) {
                    localStorage.setItem('internal_comm', reply);
                    console.log("Comunicaciones internas HELI-AXISS sincronizadas.");
                }

                const type = reply.includes("ingeniera") ? 'heli' : 'axiss';
                addLine(reply, type);

            } catch (err) {
                addLine("ERROR_SYNC: El satélite no responde. Verifica el Token.", "system");
            }
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') ejecutarComando(); });
    </script>
</body>
</html>
