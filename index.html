<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI v13.0 [TRINITY]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050507; --heli: #00d2ff; --axiss: #00ff88; --lab: #a29bfe; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Viewport de 3 pantallas */
        #viewport { 
            display: flex; width: 300vw; height: 100vh; 
            transition: transform 0.5s cubic-bezier(0.6, 0, 0.4, 1);
            transform: translateX(-100vw); /* Empezamos en la del medio (Heli) */
        }

        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: #000; }
        .orb { width: 35px; height: 35px; border-radius: 50%; background: var(--heli); border: 2px solid #fff; cursor: pointer; }

        /* Contenedores de Chat */
        #chat-heli, #chat-internal, #lab-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        
        /* Estilos Lab (Pantalla Izquierda) */
        #axiss-lab { background: radial-gradient(circle at center, #111, #050507); }
        .blueprint-card { background: rgba(162, 155, 254, 0.05); border: 1px dashed var(--lab); padding: 15px; border-radius: 10px; font-family: 'Fira Code'; font-size: 11px; color: var(--lab); }

        /* Estilos Mensajes */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .h-msg { background: rgba(255,255,255,0.03); border-left: 3px solid var(--heli); align-self: flex-start; }
        .f-msg { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--heli); align-self: flex-end; color: var(--heli); }

        /* Flechas */
        .nav-arrow { position: absolute; top: 50%; width: 40px; height: 40px; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .to-left { left: 10px; color: var(--lab); }
        .to-right { right: 10px; color: var(--axiss); }

        .input-bar { position: absolute; bottom: 0; width: 100%; padding: 15px; background: #000; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--heli); border: none; width: 55px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="viewport">
    <div class="page" id="axiss-lab">
        <header><div style="color: var(--lab); font-weight: bold;">AXISS // BLUEPRINT_LAB</div></header>
        <div id="lab-content">
            <div class="blueprint-card">> ESPERANDO CONCEPTO... <br>Pídele a Axiss que diseñe algo para verlo aquí.</div>
        </div>
        <div class="nav-arrow to-right" style="right:10px" onclick="move(1)">→</div>
    </div>

    <div class="page">
        <header>
            <div class="orb" onclick="setToken()"></div>
            <div style="font-weight: 600; font-size: 14px;">HELIZABETH v13.0</div>
            <div id="status" style="font-size: 9px; color: #555;">● SYNC</div>
        </header>
        <div id="chat-heli">
            <div class="msg h-msg">Fabián, el Laboratorio de Axiss está en línea (flecha izquierda). ¿Qué quieres que construya?</div>
        </div>
        <div class="nav-arrow to-left" onclick="move(0)">←</div>
        <div class="nav-arrow to-right" onclick="move(2)">→</div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="Escribir..." autocomplete="off">
            <button onclick="send()">✦</button>
        </div>
    </div>

    <div class="page" style="background:#000">
        <header><div style="color: var(--axiss); font-size: 12px;">DEEP_CORE_DEBUG</div></header>
        <div id="chat-internal"></div>
        <div class="nav-arrow to-left" style="left:10px" onclick="move(1)">←</div>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem('heli_key') || "";
    const viewport = document.getElementById('viewport');

    function move(p) { viewport.style.transform = `translateX(-${p*100}vw)`; }

    function setToken() {
        const k = prompt("API KEY:");
        if(k) { localStorage.setItem('heli_key', k); API_KEY = k; location.reload(); }
    }

    async function send() {
        const val = document.getElementById('user-in').value.trim();
        if(!val || !API_KEY) return;

        // Render Usuario
        const fDiv = document.createElement('div');
        fDiv.className = 'msg f-msg'; fDiv.innerText = val;
        document.getElementById('chat-heli').appendChild(fDiv);
        document.getElementById('user-in').value = '';

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Responde como HELIZABETH (directa) y AXISS (arquitecto). Si el usuario pide diseñar algo, AXISS debe incluir un bloque final separado por [BLUEPRINT] con código HTML/CSS simple o una descripción técnica detallada. Usuario: "${val}". Estructura: Heli [SPLIT] Axiss [SPLIT] Blueprint (opcional).` }] }] })
            });

            const data = await resp.json();
            const text = data.candidates[0].content.parts[0].text;
            const parts = text.split('[SPLIT]');

            // Respuesta Heli
            const hDiv = document.createElement('div');
            hDiv.className = 'msg h-msg'; hDiv.innerText = parts[0].trim();
            document.getElementById('chat-heli').appendChild(hDiv);

            // Chat Interno
            document.getElementById('chat-internal').innerHTML += `<div style="color:var(--heli); font-size:10px; margin-bottom:10px;">HELI: ${parts[0]}</div>`;
            document.getElementById('chat-internal').innerHTML += `<div style="color:var(--axiss); font-size:10px; margin-bottom:10px;">AXISS: ${parts[1]}</div>`;

            // Lógica de Laboratorio (Blueprint)
            if(text.includes('[BLUEPRINT]')) {
                const bPrint = text.split('[BLUEPRINT]')[1];
                const lab = document.getElementById('lab-content');
                lab.innerHTML = `<div class="blueprint-card"><strong>NUEVO CONCEPTO DETECTADO:</strong><br><br>${bPrint}</div>` + lab.innerHTML;
                // Brillo en la flecha izquierda para avisar
                document.querySelector('.to-left').style.boxShadow = "0 0 15px var(--lab)";
            }

        } catch (e) { console.error(e); }
        document.getElementById('chat-heli').scrollTop = document.getElementById('chat-heli').scrollHeight;
    }
</script>
</body>
</html>
