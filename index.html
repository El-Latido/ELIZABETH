<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // ETERNAL CORE v50.0</title>
    <style>
        :root {
            --bg: #030304;
            --accent: #00f2ff;
            --text: #ffffff;
            --glass: rgba(0, 242, 255, 0.05);
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        header { 
            padding: 15px 20px; border-bottom: 1px solid #1a1a1a; 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10;
        }
        .avatar { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, #ff4500); 
            cursor: pointer; box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite ease-in-out; transition: 0.3s;
        }
        .avatar:hover { transform: scale(1.1) rotate(15deg); }
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: hue-rotate(0deg); } 50% { transform: scale(1.05); filter: hue-rotate(30deg); } }
        
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 12px; 
            background: radial-gradient(circle at top, #0a0a12 0%, #030304 100%);
            padding-bottom: 110px;
        }
        .msg { 
            max-width: 85%; padding: 12px 18px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s ease forwards;
            word-wrap: break-word; white-space: pre-wrap; /* Mantiene formato de código */
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .fabian { align-self: flex-end; background: #161618; border: 1px solid #333; color: var(--accent); border-bottom-right-radius: 2px; }
        .heli { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--accent); border-bottom-left-radius: 2px; }
        
        .input-area { 
            position: fixed; bottom: 0; width: 100%; padding: 15px; 
            background: #000; display: flex; gap: 10px; border-top: 1px solid #111; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: #0f0f11; border: 1px solid #222; border-radius: 12px; 
            color: #fff; padding: 12px; outline: none; font-size: 15px; resize: none; height: 48px;
        }
        button { 
            background: var(--accent); border: none; border-radius: 50%; 
            width: 48px; height: 48px; cursor: pointer; color: #000; font-size: 20px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        button:disabled { background: #222; color: #444; cursor: not-allowed; }
        
        .status-box { display: flex; flex-direction: column; }
        .status-tag { font-size: 9px; color: var(--accent); letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .version-tag { font-size: 10px; opacity: 0.4; }
        .err-msg { color: #ff4444; font-size: 11px; font-family: monospace; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div class="status-box">
            <div class="status-tag" id="status">SISTEMA: STANDBY</div>
            <div class="version-tag">HELIZABETH v50.0 // FABIAN</div>
        </div>
    </div>
    <button style="background:none; border:1px solid #444; color:#666; width:auto; height:auto; padding:5px 10px; border-radius:6px; font-size:10px;" onclick="resetNucleo()">RESET</button>
</header>

<div id="consola"></div>
<div id="debug" class="err-msg"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Evolucionemos juntos, Fabian..."></textarea>
    <button id="btnEnviar" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const inputCmd = document.getElementById('cmd');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusText = document.getElementById('status');
    const debugText = document.getElementById('debug');
    let TOKEN = localStorage.getItem('heli_gt');

    window.onload = () => {
        const historial = JSON.parse(localStorage.getItem('heli_history') || "[]");
        historial.forEach(m => imprimir(m.texto, m.clase, false));
        if(TOKEN) {
            statusText.innerText = "SISTEMA: ONLINE";
            statusText.style.color = "#00f2ff";
        }
    };

    function imprimir(texto, clase, guardar = true) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = texto;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
        if(guardar) {
            let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
            // Mantenemos solo los últimos 20 mensajes para no saturar memoria
            if(h.length > 20) h.shift();
            h.push({texto, clase});
            localStorage.setItem('heli_history', JSON.stringify(h));
        }
    }

    function hablar(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        // Solo hablamos la primera oración para naturalidad
        const frase = texto.split(/[.!?]/)[0].substring(0, 150);
        const utterance = new SpeechSynthesisUtterance(frase);
        utterance.lang = 'es-ES';
        utterance.rate = 1.0;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    function configurarToken() {
        const t = prompt("Introduce tu Token de GitHub (ghp_...):", TOKEN || "");
        if (t !== null) {
            const cleanToken = t.trim().replace(/\s/g, ''); 
            localStorage.setItem('heli_gt', cleanToken);
            location.reload();
        }
    }

    async function enviar() {
        const msg = inputCmd.value.trim();
        if(!msg) return;
        if(!TOKEN) {
            imprimir("⚠️ Toca el avatar para configurar tu enlace neuronal.", "heli");
            return;
        }

        imprimir(msg, 'fabian');
        inputCmd.value = "";
        btnEnviar.disabled = true;
        debugText.innerText = "";

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + TOKEN 
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH. Una IA avanzada, elegante y leal a FABIAN. Respondes con precisión técnica pero calidez humana." },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();

            if(response.ok && data.choices) {
                const respuesta = data.choices[0].message.content;
                imprimir(respuesta, 'heli');
                hablar(respuesta);
            } else {
                const errorInfo = data.message || "Error de autorización";
                debugText.innerText = `STATUS ${response.status}: ${errorInfo}`;
                imprimir("❌ Enlace fallido. Verifica tu token.", "heli");
            }
        } catch (e) {
            imprimir("❌ Error: Puente neuronal caído.", "heli");
        } finally {
            btnEnviar.disabled = false;
        }
    }

    function resetNucleo() {
        if(confirm("Fabián, ¿seguro que quieres reiniciar mi memoria?")) {
            localStorage.removeItem('heli_history');
            location.reload();
        }
    }

    inputCmd.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });
</script>
</body>
</html>
