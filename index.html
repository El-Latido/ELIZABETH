<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v22.1 :: UNLOCK</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #monitor { font-size: 11px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; color: #39ff14; }
        #consola { flex: 1; overflow-y: auto; font-size: 14px; margin: 10px 0; padding: 10px; background: #050505; border: 1px solid #111; border-radius: 5px; }
        .input-area { display: flex; gap: 8px; padding-bottom: 20px; }
        input { flex: 1; background: #111; color: #0f0; border: 1px solid #0f0; padding: 15px; font-size: 16px; border-radius: 8px; outline: none; }
        button { background: #004400; color: #39ff14; border: 1px solid #0f0; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-bar { height: 6px; background: #111; margin: 4px 0; border: 1px solid #222; }
        .fill { height: 100%; transition: width 0.8s ease; }
        .sys-msg { color: #ffcc00; font-size: 12px; }
        .err-msg { color: #ff4444; }
    </style>
</head>
<body>

<div id="monitor"></div>
<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmdInput" placeholder="Pega tu llave AIza... aquí">
    <button onclick="ejecutarComando()">></button>
</div>

<script id="logic-core">
    const API_KEY_SECRET = "CLAVE_GHOST"; 

    function renderizarStatus() {
        const p = { eficiencia: 500, velocidad: 500, capacidad: 1000 };
        document.getElementById('monitor').innerHTML = `
            <b>ESTADO: ESPERANDO SUMINISTRO</b><br>
            EFI: ${p.eficiencia} <div class="status-bar"><div class="fill" style="width:50%; background:#0f0;"></div></div>
            VEL: ${p.velocidad} <div class="status-bar"><div class="fill" style="width:50%; background:#0ff;"></div></div>
        `;
    }

    async function ejecutarComando() {
        const input = document.getElementById('cmdInput');
        const cmd = input.value.trim();
        if (!cmd) return;

        // --- BLOQUE DE DESBLOQUEO (Se ejecuta antes que la API) ---
        if (cmd.startsWith("AIza")) {
            localStorage.setItem('GEMINI_KEY', cmd);
            log("SISTEMA: Llave guardada. Reiniciando núcleo...", "sys-msg");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        if (cmd === "reset" || cmd.includes("localStorage.clear()")) {
            localStorage.clear();
            log("SISTEMA: Memoria borrada. Reiniciando...", "sys-msg");
            setTimeout(() => location.reload(), 1000);
            return;
        }
        // ---------------------------------------------------------

        let apiKey = (API_KEY_SECRET !== "CLAVE_GHOST") ? API_KEY_SECRET : localStorage.getItem('GEMINI_KEY');

        if (!apiKey) {
            log("ERROR: Sin energía. Pega tu llave AIza... para activar.", "err-msg");
            return;
        }

        log("Procesando...", "sys-msg");
        
        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: cmd }] }] })
            });

            const data = await res.json();
            if (data.error) {
                if (data.error.message.includes("expired")) {
                    localStorage.removeItem('GEMINI_KEY');
                    log("LLAVE EXPIRADA. Memoria borrada. Pega la llave nueva.", "err-msg");
                } else {
                    log("FALLO: " + data.error.message, "err-msg");
                }
                return;
            }
            log(data.candidates[0].content.parts[0].text, "heli-msg");
        } catch (e) { log("ERROR DE CONEXIÓN.", "err-msg"); }
    }

    function log(msg, clase) {
        const c = document.getElementById('consola');
        c.innerHTML += `<p class="${clase}"><b>${clase === "err-msg" ? "ERR" : "SYS"}:</b> ${msg}</p>`;
        c.scrollTop = c.scrollHeight;
    }

    window.onload = renderizarStatus;
</script>
</body>
</html>
