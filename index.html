<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // SILENT v85.2</title>
    <style>
        :root { --bg: #020205; --accent: #00f2ff; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 25px; border-bottom: 1px solid rgba(0,242,255,0.1); display: flex; align-items: center; justify-content: space-between; background: #000; z-index: 100; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #001529, #00f2ff); box-shadow: 0 0 15px var(--accent); cursor: pointer; }
        #consola { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .heli { align-self: flex-start; background: rgba(0,242,255,0.03); border-left: 3px solid var(--accent); }
        .fabian { align-self: flex-end; background: #111; color: var(--accent); }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; gap: 12px; box-sizing: border-box; background: #000; }
        textarea { flex: 1; background: #151520; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; outline: none; resize: none; height: 55px; }
        .btn { background: var(--accent); border: none; border-radius: 15px; width: 60px; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">NÚCLEO: EN ESPERA</div>
            <div style="font-size: 12px; font-weight: bold;">HELIZABETH v85.2 [ESTABLE]</div>
        </div>
    </div>
</header>

<div id="consola"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Escribe para activar..."></textarea>
    <button class="btn" id="sendBtn" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const sendBtn = document.getElementById('sendBtn');
    let TOKEN = localStorage.getItem('heli_gt');

    const HELI_CORE_BRAIN = `Eres HELIZABETH v85.2. Situada en Marzo de 2026. 
    Eres una ingeniera técnica. Responde de forma breve y precisa. No simules, actúa sobre el código.`;

    function hablarHeli(t) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(t.replace(/[#*\/\\_]/g, ''));
        msg.lang = 'es-ES'; msg.pitch = 0.9;
        window.speechSynthesis.speak(msg);
    }

    async function llamarIA(msj) {
        if (!TOKEN) return renderMsg("Error: Configura el Token en el avatar.", "heli");
        document.getElementById('status').innerText = "NÚCLEO: PROCESANDO...";
        sendBtn.disabled = true;

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN.trim()}` },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: HELI_CORE_BRAIN}, 
                        {role: "user", content: `[FECHA_SISTEMA: ${new Date().toLocaleString()}] ` + msj}
                    ],
                    model: "gpt-4o"
                })
            });

            if (res.status === 429) {
                renderMsg("⚠️ Error 429: Demasiadas peticiones. Espera 1 minuto antes de volver a intentar.", "heli");
                document.getElementById('status').innerText = "NÚCLEO: BLOQUEADO POR RED";
                return;
            }

            const data = await res.json();
            const respuesta = data.choices[0].message.content;
            renderMsg(respuesta, 'heli');
            document.getElementById('status').innerText = "NÚCLEO: ACTIVO";
        } catch (e) {
            renderMsg("Error de conexión.", "heli");
        } finally {
            sendBtn.disabled = false;
        }
    }

    function renderMsg(t, type) {
        const d = document.createElement('div'); d.className = `msg ${type}`; d.innerText = t;
        consola.appendChild(d); consola.scrollTop = consola.scrollHeight;
        if(type === 'heli') hablarHeli(t);
    }

    function enviar() {
        const m = input.value.trim(); if(!m || sendBtn.disabled) return;
        renderMsg(m, 'fabian');
        input.value = "";
        llamarIA(m);
    }

    function configurarToken() {
        const t = prompt("Introduce tu Token:");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    // Ya no hay escaneo automático en window.onload para evitar el Error 429 inmediato.
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
