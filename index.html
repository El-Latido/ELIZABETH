<script id="logic-core">
    // HELIZABETH buscará la llave aquí primero
    const API_KEY_SECRET = "{{ secrets.GEMINI_KEY }}"; 
    
    let CONFIGURACION = JSON.parse(localStorage.getItem('CONFIG_HELIZABETH')) || {
        identidad: "Eres HELIZABETH, núcleo v21.0 desplegado desde GitHub.",
        parametros: { eficiencia: 500, velocidad: 500, capacidad: 1000 }
    };

    async function ejecutarComando() {
        const input = document.getElementById('cmdInput');
        const cmd = input.value.trim();
        
        // Prioridad: 1. Secret de GitHub | 2. Memoria Local
        let apiKey = API_KEY_SECRET.includes("{{") ? localStorage.getItem('GEMINI_KEY') : API_KEY_SECRET;

        if (!cmd) return;
        if (!apiKey || apiKey === "undefined") {
            log("SISTEMA: No se detectó Secret. Pega tu llave manualmente para esta sesión.", "err-msg");
            if(cmd.startsWith("AIza")) {
                localStorage.setItem('GEMINI_KEY', cmd);
                location.reload();
            }
            return;
        }

        log(cmd, "AXISS");
        input.value = '';

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `ADN: ${document.getElementById('logic-core').text}\nORDEN: ${cmd}` }] }]
                })
            });

            const data = await res.json();
            const respuesta = data.candidates[0].content.parts[0].text;
            log(respuesta, "HELIZABETH");

            // Detector de [CORRECCION]
            if (respuesta.includes("[CORRECCION]")) {
                const code = respuesta.match(/\[CORRECCION\]([\s\S]*?)\[\/CORRECCION\]/)[1];
                document.getElementById('logic-core').text = code;
                log("NÚCLEO ACTUALIZADO.", "sys-msg");
            }
        } catch (e) { log("Error de enlace.", "err-msg"); }
    }
    // ... (resto de funciones log y renderizarStatus)
</script>
