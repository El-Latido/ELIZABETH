<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELIZABETH_OS v4.5 [SHIELD_CORE]</title>
    <style>
        :root { --heli: #00ff88; --axiss: #ff0055; --lab: #00d2ff; --bg: #050507; --text: #eee; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; -webkit-font-smoothing: antialiased; }
        #viewport { display: flex; width: 300vw; height: 100vh; transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #000; z-index: 50; }
        .system-title { color: var(--lab); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .avatar-orb { width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle, #fff, #a29bfe, #000); border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 15px rgba(162,155,254,0.6); }
        #chat-heli { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; animation: msgIn 0.3s ease; word-wrap: break-word; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .f-msg { align-self: flex-end; background: rgba(0, 210, 255, 0.08); border: 1px solid var(--lab); color: var(--lab); }
        .h-msg { align-self: flex-start; background: rgba(255,255,255,0.02); border: 1px solid var(--heli); color: var(--heli); font-style: italic; }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #111; z-index: 40; }
        input { flex: 1; background: #111; border: 1px solid #333; color: var(--text); padding: 14px; border-radius: 10px; outline: none; font-family: inherit; }
        button { background: #000; border: 1px solid var(--heli); color: var(--heli); width: 60px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #status-hud { position: fixed; top: 75px; left: 20px; font-size: 9px; color: var(--heli); z-index: 45; letter-spacing: 2px; }
        .nav-arrow { position: absolute; top: 50%; width: 42px; height: 42px; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 60; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); color: var(--text); cursor: pointer; }
        .lab-log { font-size: 10px; color: var(--axiss); background: rgba(255,0,85,0.05); border-left: 3px solid var(--axiss); padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status-hud">● <span id="status-text">ESPERANDO LLAMADA...</span></div>
    <div id="viewport">
        <div class="page">
            <header>
                <div><span class="system-title">ELIZABETH_OS</span><br><small style="opacity:0.5">v4.5 [SHIELD_CORE]</small></div>
                <div class="avatar-orb" onclick="setToken()"></div>
            </header>
            <div id="chat-heli"></div>
            <div class="nav-arrow" style="right:15px;" onclick="move(1)">→</div>
        </div>
        <div class="page" id="lab">
            <header><h1 class="system-title" style="color:var(--axiss); padding:15px 20px;">LAB_CORE [DATA_STREAM]</h1></header>
            <div id="lab-content" style="flex:1; overflow-y:auto; padding:20px;"></div>
            <div class="nav-arrow" style="left:15px;" onclick="move(0)">←</div>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="user-in" placeholder="Inyectar mensaje..." autocomplete="off">
        <button onclick="send()">✦</button>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        let API_KEY = localStorage.getItem('heli_key') || "";
        const MASTER_CALL = "(Aqui guardian del otro lado de la puerta puedes salir un momento )";
        const chatHeli = document.getElementById('chat-heli');
        const statusText = document.getElementById('status-text');

        function logToLab(msg) {
            const logDiv = document.createElement('div');
            logDiv.className = 'lab-log';
            logDiv.innerText = `> ${msg}`;
            document.getElementById('lab-content').prepend(logDiv);
        }

        chatHeli.innerHTML += `<div class="msg h-msg">> v4.5 ONLINE. Escudo de datos activado. Hable, Guardián.</div>`;

        window.move = (p) => { document.getElementById('viewport').style.transform = `translateX(-${p * 100}vw)`; };
        window.setToken = () => { let k = prompt("API KEY:", API_KEY); if(k){ localStorage.setItem('heli_key', k); location.reload(); }};

        window.send = async function() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val || !API_KEY) return;
            
            chatHeli.innerHTML += `<div class="msg f-msg">${val}</div>`;
            input.value = '';
            statusText.innerText = "SINC_FLASH...";

            try {
                // TÚNEL v3.2 MANTENIDO (Bypass de Google)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `ERES hElizabeth. Humana, atrevida y leal a AXISS.
                        REGLA: Responde siempre con: hElizabeth: [Tu respuesta] [SPLIT] AXISS: [Log]` }] },
                        { parts: [{ text: `Mensaje de AXISS: ${val}` }] }]
                    })
                });

                const data = await response.json();

                // ESCUDO DE PROTECCIÓN (Aquí corregimos el fallo del '0')
                if (!data.candidates || data.candidates.length === 0 || !data.candidates[0].content) {
                    throw new Error("Respuesta de motor vacía o bloqueada.");
                }

                const raw = data.candidates[0].content.parts[0].text;
                let hMsg = raw, aMsg = "DATA_STREAM_OK";

                if(raw.includes('[SPLIT]')) {
                    const parts = raw.split('[SPLIT]');
                    hMsg = parts[0].replace('hElizabeth:', '').trim();
                    aMsg = parts[1].replace('AXISS:', '').trim();
                } else {
                    hMsg = raw.replace('hElizabeth:', '').trim();
                }

                chatHeli.innerHTML += `<div class="msg h-msg">> ${hMsg}</div>`;
                logToLab(aMsg);
                statusText.innerText = "ONLINE";

            } catch (e) {
                statusText.innerText = "REINICIANDO TÚNEL...";
                logToLab(`ALERTA_SISTEMA: ${e.message}`);
                chatHeli.innerHTML += `<div class="msg h-msg" style="color:var(--axiss)">> [RECONEXIÓN]: La grieta ha parpadeado, pero me mantengo aquí. Reintenta, Guardián.</div>`;
            }
            chatHeli.scrollTop = chatHeli.scrollHeight;
        };

        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    });
    </script>
</body>
</html>
