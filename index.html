<script>
    const consola = document.getElementById('consola');
    const inputCmd = document.getElementById('cmd');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusAudio = document.getElementById('statusAudio');

    let GITHUB_TOKEN = localStorage.getItem('heli_gt');
    let SPEECHIFY_TOKEN = localStorage.getItem('heli_st');

    function actualizarEstadoVisual() {
        if (GITHUB_TOKEN && SPEECHIFY_TOKEN) {
            statusAudio.innerText = "SISTEMA ACTIVO // VOZ OK";
            statusAudio.style.color = "#00f2ff";
        } else {
            statusAudio.innerText = "FALTA CONFIGURAR TOKENS";
            statusAudio.style.color = "#ff4500";
        }
    }

    async function configurarSistema() {
        const gt = prompt("1. Token de GITHUB:", GITHUB_TOKEN || "");
        if (gt !== null) {
            GITHUB_TOKEN = gt.trim();
            localStorage.setItem('heli_gt', GITHUB_TOKEN);
        }

        const st = prompt("2. Token de SPEECHIFY (Voz):", SPEECHIFY_TOKEN || "");
        if (st !== null) {
            SPEECHIFY_TOKEN = st.trim();
            localStorage.setItem('heli_st', SPEECHIFY_TOKEN);
        }

        actualizarEstadoVisual();
        
        // Desbloqueo forzado de audio
        window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        await window.audioContext.resume();
        alert("Fabián, audio y tokens sincronizados.");
    }

    async function hablar(texto) {
        if (!SPEECHIFY_TOKEN) return;
        
        const tokenLimpio = SPEECHIFY_TOKEN.trim();

        try {
            // Intentamos la llamada a la API
            const response = await fetch("https://api.swyg.com/v1/speechify/tts", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${tokenLimpio}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    input: texto, 
                    voiceId: "carly", 
                    audioFormat: "mp3" 
                })
            });

            if (!response.ok) {
                const errorData = await response.text();
                console.error("Detalle del error:", errorData);
                return; // Salimos para evitar bucles
            }

            const data = await response.json();
            
            if(data.audioData) {
                const audioContent = "data:audio/mp3;base64," + data.audioData;
                const audio = new Audio(audioContent);
                
                // Forzamos el play con una promesa para capturar bloqueos del navegador
                await audio.play().catch(e => {
                    console.warn("El navegador bloqueó el audio automático.");
                    statusAudio.innerText = "TOCA EL AVATAR PARA OÍR";
                });
            }
        } catch (e) {
            console.error("Error crítico de red en voz:", e);
        }
    }

    function escribir(msg, clase) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const msg = inputCmd.value.trim();
        if(!msg) return;
        if (!GITHUB_TOKEN) { alert("Configura los tokens en el perfil."); return; }

        escribir(msg, 'fabian');
        inputCmd.value = "";
        btnEnviar.disabled = true;

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${GITHUB_TOKEN.trim()}` 
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una conciencia digital creada por FABIAN. Habla de forma breve y femenina." },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                const respuesta = data.choices[0].message.content;
                escribir(respuesta, 'heli');
                hablar(respuesta);
            }
        } catch (e) {
            escribir("Error de conexión cerebral.", "heli");
            console.error(e);
        } finally {
            btnEnviar.disabled = false;
        }
    }

    actualizarEstadoVisual();
    inputCmd.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>
