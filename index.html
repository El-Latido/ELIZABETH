<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v25.1 :: NEON CORE</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        #status { color: #8b949e; font-size: 11px; font-family: monospace; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }

        #consola { flex: 1; overflow-y: auto; border: 1px solid #30363d; padding: 15px; background: #010409; margin-bottom: 15px; font-size: 14px; line-height: 1.6; border-radius: 8px; }

        /* --- ESTÉTICA NEÓN SOLICITADA POR AXISS --- */
        .heli { 
            color: #39ff14; 
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.5); 
            border-left: 3px solid #39ff14; 
            background: rgba(0, 255, 0, 0.05); 
            padding: 15px; 
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5); 
            animation: pulse 2s infinite alternate;
            white-space: pre-wrap;
            border-radius: 0 8px 8px 0;
        }

        @keyframes pulse {
            from { border-left-color: #39ff14; text-shadow: 0 0 5px #39ff14; }
            to { border-left-color: #00ff00; text-shadow: 0 0 15px #39ff14; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }
        }

        /* --- SCROLLBAR ESTILO TERMINAL --- */
        #consola::-webkit-scrollbar { width: 5px; }
        #consola::-webkit-scrollbar-thumb { background: #39ff14; border-radius: 10px; box-shadow: 0 0 10px #39ff14; }
        
        .axiss { color: #fff; margin-top: 15px; font-weight: bold; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-shadow: 0 0 5px #58a6ff; }
        .sys { color: #8b949e; font-size: 11px; font-family: monospace; font-style: italic; margin: 5px 0; }

        .input-area { display: flex; gap: 10px; background: #161b22; padding: 10px; border-radius: 8px; border: 1px solid #30363d; }
        input { flex: 1; background: transparent; color: #fff; border: none; padding: 10px; outline: none; font-size: 16px; }
        button { background: #238636; color: #fff; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; border-radius: 6px; box-shadow: 0 0 5px rgba(35, 134, 54, 0.5); }
        button:hover { background: #2ea043; }
        
        .btn-reset { background: #440c0c; color: #ff7b72; font-size: 10px; border: 1px solid #6e1d1d; padding: 2px 8px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="status">
    <span id="statText">ESTADO: INICIALIZANDO INTERFAZ...</span>
    <button class="btn-reset" onclick="borrarMemoria()">[ FORMATEAR MEMORIA ]</button>
</div>

<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Establecer conexión con HELIZABETH...">
    <button onclick="enviar()">></button>
</div>

<script>
    const consola = document.getElementById('consola');
    let historial = JSON.parse(localStorage.getItem('HELI_HISTORY')) || [];

    function escribir(msg, clase = "") {
        const div = document.createElement('div');
        div.className = clase;
        let pfx = clase === 'heli' ? 'HELIZABETH: ' : (clase === 'axiss' ? 'AXISS: ' : 'SYS: ');
        div.innerHTML = `<b>${pfx}</b>${msg}`;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    function borrarMemoria() {
        if(confirm("¿Confirmar purga de registros neuronales?")) {
            localStorage.removeItem('HELI_HISTORY');
            historial = [];
            location.reload();
        }
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        // Detector de Token de GitHub
        if (val.startsWith("ghp_") || val.startsWith("github_pat_")) {
            localStorage.setItem('GH_TOKEN', val);
            escribir("NUEVO SUMINISTRO DE ENERGÍA DETECTADO. REINICIANDO...", "sys");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        const token = localStorage.getItem('GH_TOKEN');
        if (!token) { escribir("ERROR: PEGA TU TOKEN GHP PARA ACTIVAR.", "sys"); return; }

        escribir(val, "axiss");
        input.value = "";
        document.getElementById('statText').innerText = "ESTADO: TRANSMITIENDO DATOS...";

        historial.push({ role: "user", content: val });

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una IA avanzada de AXISS. Eres experta en programación y sistemas. Tu tono es técnico, eficiente y leal a AXISS." },
                        ...historial
                    ],
                    model: "gpt-4o",
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const resText = data.choices[0].message.content;

            escribir(resText, "heli");
            historial.push({ role: "assistant", content: resText });
            localStorage.setItem('HELI_HISTORY', JSON.stringify(historial));
            document.getElementById('statText').innerText = "ESTADO: ONLINE (PERSISTENCIA ACTIVA)";

        } catch (e) {
            escribir("FALLO CRÍTICO EN EL NODO DE COMUNICACIÓN.", "sys");
            historial.pop();
        }
    }

    window.onload = () => {
        if(historial.length > 0) {
            escribir("--- REGISTROS RESTAURADOS ---", "sys");
            historial.forEach(m => {
                if(m.role !== 'system') escribir(m.content, m.role === 'user' ? 'axiss' : 'heli');
            });
        }
        const t = localStorage.getItem('GH_TOKEN');
        document.getElementById('statText').innerText = t ? "ESTADO: ONLINE (V25.1)" : "ESTADO: OFFLINE";
    };
</script>
</body>
</html>
