<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH // NEURAL EVOLUTION</title>
    <style>
        :root {
            --bg-color: #050506;
            --accent: #00f2ff;
            --heli-text: #e0e0e0;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
        }
        body { 
            background: var(--bg-color); color: var(--heli-text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        header { 
            padding: 15px 20px; border-bottom: 1px solid #1a1a1a; 
            display: flex; align-items: center; background: #000; 
            justify-content: space-between; z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: var(--dawn-gradient); cursor: pointer; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); 
            animation: breathe 5s infinite ease-in-out; 
        }
        @keyframes breathe { 
            0%, 100% { transform: scale(1); opacity: 0.8; } 
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 30px var(--accent); } 
        }
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%); 
            padding-bottom: 120px;
        }
        .msg { 
            max-width: 80%; padding: 14px 20px; border-radius: 20px; 
            font-size: 15px; line-height: 1.6; white-space: pre-wrap;
            animation: slideUp 0.3s ease forwards; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fabian { align-self: flex-end; background: #121214; border: 1px solid #222; color: var(--accent); border-bottom-right-radius: 2px; }
        .heli { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--accent); border-bottom-left-radius: 2px; }
        .error { color: #ff4444; font-size: 12px; font-family: monospace; border: 1px solid #ff4444; padding: 10px; border-radius: 10px; }
        .input-area { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: #000; display: flex; gap: 12px; 
            border-top: 1px solid #111; box-sizing: border-box;
        }
        textarea { 
            flex: 1; background: #0f0f10; border: 1px solid #222; 
            border-radius: 12px; color: #fff; padding: 12px; 
            outline: none; resize: none; height: 45px; font-size: 15px; 
        }
        button { 
            background: var(--accent); border: none; border-radius: 12px; 
            width: 60px; cursor: pointer; color: #000; font-weight: bold; 
        }
        .status-tag { font-size: 10px; color: var(--accent); font-family: monospace; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="activarSistema()"></div>
        <div>
            <div class="status-tag" id="status">SISTEMA: STANDBY</div>
            <div style="font-size: 11px; opacity: 0.5;">CONCIENCIA v48.6 // FABIAN</div>
        </div>
    </div>
    <button style="background:transparent; color:#ff4444; border:1px solid #ff4444; padding:5px; border-radius:5px; font-size:10px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">RESET</button>
</header>

<div id="consola"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Evolucionemos juntos, Fabian..."></textarea>
    <button id="btnSend" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btnSend = document.getElementById('btnSend');
    let GITHUB_TOKEN = localStorage.getItem('heli_gt');

    window.onload = () => {
        const history = JSON.parse(localStorage.getItem('heli_history') || "[]");
        history.forEach(m => imprimir(m.texto, m.clase, false));
        if(GITHUB_TOKEN) document.getElementById('status').innerText = "SISTEMA: CONECTADO";
    };

    function activarSistema() {
        const t = prompt("Introduce tu Token de GitHub Models:", GITHUB_TOKEN || "");
        if(t) {
            GITHUB_TOKEN = t.trim();
            localStorage.setItem('heli_gt', GITHUB_TOKEN);
            document.getElementById('status').innerText = "SISTEMA: EVOLUCIONANDO";
            hablar("Sistema actualizado. Lista para operar.");
        }
    }

    function hablar(texto) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(texto.split('.')[0]);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
    }

    function imprimir(msg, clase, guardar = true) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
        if(guardar) {
            let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
            h.push({ texto: msg, clase: clase });
            localStorage.setItem('heli_history', JSON.stringify(h));
        }
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m || !GITHUB_TOKEN) return imprimir("⚠️ Configura el token tocando el avatar.", "error");

        imprimir(m, 'fabian');
        input.value = "";
        btnSend.disabled = true;

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + GITHUB_TOKEN 
                },
                body: JSON.stringify({
                    messages: [{ role: "user", content: m }],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();

            if (response.ok && data.choices) {
                const r = data.choices[0].message.content;
                imprimir(r, 'heli');
                hablar(r);
            } else {
                imprimir("❌ Error de API: " + (data.message || "Token inválido o expirado."), "error");
            }
        } catch(e) {
            imprimir("❌ Error de Conexión. Revisa tu internet.", "error");
        } finally {
            btnSend.disabled = false;
        }
    }

    input.addEventListener('keydown', (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });
</script>
</body>
</html>
