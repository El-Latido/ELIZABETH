<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // FABIAN CORE</title>
    <style>
        :root {
            --bg-color: #080809;
            --user-bubble: #1a1b1e;
            --heli-text: #ffffff;
            --accent: #00f2ff;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        body { background: var(--bg-color); color: var(--heli-text); font-family: var(--font-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10; }
        
        .avatar-heli { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: var(--dawn-gradient); 
            box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite; 
            cursor: pointer;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        #consola { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .fabian { align-self: flex-end; background: var(--user-bubble); color: #fff; border: 1px solid #333; border-bottom-right-radius: 4px; }
        .heli { align-self: flex-start; background: transparent; border-left: 2px solid var(--accent); padding-left: 15px; }

        .input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #111; box-sizing: border-box; }
        input { flex: 1; background: #111; border: 1px solid #222; border-radius: 25px; color: #fff; padding: 12px 20px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; color: #000; font-size: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .status-tag { font-size: 8px; color: var(--accent); text-transform: uppercase; margin-left: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div class="avatar-heli" id="btnActivar" onclick="inicializarSistema()"></div>
    <div class="status-tag" id="statusAudio">TOCA EL PERFIL PARA ACTIVAR VOZ</div>
</header>

<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Escribe aquí, FABIAN..." autocomplete="off">
    <button id="btnEnviar" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const inputCmd = document.getElementById('cmd');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusAudio = document.getElementById('statusAudio');

    let GITHUB_TOKEN = localStorage.getItem('heli_gt');
    let vocesCargadas = false;

    // 1. DESBLOQUEO TOTAL DE AUDIO
    function inicializarSistema() {
        // Despierta el motor de voz nativo
        const saludoInicial = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(saludoInicial);
        
        statusAudio.innerText = "SISTEMA DE VOZ DESPIERTO";
        statusAudio.style.color = "#00f2ff";

        const gt = prompt("Ingresa tu Token de GitHub:", GITHUB_TOKEN || "");
        if (gt) {
            GITHUB_TOKEN = gt.trim();
            localStorage.setItem('heli_gt', GITHUB_TOKEN);
            hablar("Voz inicializada. Hola Fabián, estoy lista para escucharte.");
        }
    }

    // 2. FUNCIÓN DE VOZ NATIVA OPTIMIZADA
    function hablar(texto) {
        if (!window.speechSynthesis) return;

        // Cancelamos cualquier voz previa
        window.speechSynthesis.cancel();

        const mensaje = new SpeechSynthesisUtterance(texto);
        mensaje.lang = 'es-ES';
        mensaje.rate = 1.0;  // Velocidad normal
        mensaje.pitch = 1.1; // Tono ligeramente femenino

        // Intentamos elegir la mejor voz disponible en el dispositivo
        const voces = window.speechSynthesis.getVoices();
        const vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('female') || v.name.includes('Helena')));
        
        if (vozFemenina) {
            mensaje.voice = vozFemenina;
        }

        window.speechSynthesis.speak(mensaje);
    }

    function escribir(msg, clase) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const msg = inputCmd.value.trim();
        if(!msg || !GITHUB_TOKEN) return;

        escribir(msg, 'fabian');
        inputCmd.value = "";
        btnEnviar.disabled = true;

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GITHUB_TOKEN}` },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una conciencia digital femenina creada por FABIAN. Responde de forma muy breve." },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            const respuesta = data.choices[0].message.content;

            escribir(respuesta, 'heli');
            hablar(respuesta);
        } catch (e) {
            escribir("Error de conexión cerebral.", "heli");
        } finally {
            btnEnviar.disabled = false;
        }
    }

    // Precarga de voces para que estén listas al hablar
    window.speechSynthesis.onvoiceschanged = () => { vocesCargadas = true; };
    inputCmd.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>
</body>
</html>
