<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // OMNI v9.1</title>
    <style>
        :root {
            --bg: #020205; --accent: #00f2ff; --text: #e0e0e0;
            --heli-hex: #00f2ff; --glass: rgba(255, 255, 255, 0.03);
            --gemini-hex: #8e44ad;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--heli-hex), var(--gemini-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); animation: pulse-aura 3s infinite alternate; cursor: pointer;
        }
        @keyframes pulse-aura { 
            0% { transform: scale(1); box-shadow: 0 0 10px var(--heli-hex); }
            100% { transform: scale(1.05); box-shadow: 0 0 25px var(--gemini-hex); }
        }
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%); padding-bottom: 120px;
        }
        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; line-height: 1.5; 
            animation: emergence 0.4s ease-out; border: 1px solid rgba(255,255,255,0.05);
            white-space: pre-wrap; word-wrap: break-word;
        }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 2px solid var(--gemini-hex); backdrop-filter: blur(10px); }

        pre { background: #000; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); color: #00f2ff; overflow-x: auto; font-size: 13px; font-family: monospace; }

        #loader { display: none; padding: 10px 25px; font-size: 12px; color: var(--gemini-hex); font-family: monospace; align-items: center; gap: 10px; }
        .dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .input-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(transparent, #000 50%); display: flex; gap: 12px; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; 
            color: #fff; padding: 15px; outline: none; font-size: 15px; resize: none; height: 55px;
        }
        .btn-send { background: var(--gemini-hex); border: none; border-radius: 15px; width: 55px; cursor: pointer; color: white; font-size: 20px; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--gemini-hex); }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" title="Configurar Núcleo" onclick="configurarTokens()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--gemini-hex);">ESTADO: DUAL-HYBRID</div>
            <div style="font-size: 11px; font-weight: bold;">HELIZABETH v9.1 [ESTABLE]</div>
        </div>
    </div>
    <button onclick="exportarLog()" style="background:none; border:1px solid #333; color:#666; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">LOGS</button>
</header>

<div id="consola"></div>
<div id="loader"><span class="dot">⚡</span> SINCRONIZANDO CON GEMINI...</div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Escribe un comando o pega código..."></textarea>
    <button id="btnSend" class="btn-send" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const loader = document.getElementById('loader');

    let GITHUB_TOKEN = localStorage.getItem('heli_gt');
    let GEMINI_TOKEN = localStorage.getItem('heli_gemini');
    const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]/g, ''));
        utterance.lang = 'es-ES'; utterance.pitch = 0.85; utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    async function enviar() {
        const rawM = input.value.trim();
        if(!rawM || btn.disabled) return;
        if(!GEMINI_TOKEN) return alert("Heli requiere la API KEY de Gemini. Haz clic en el avatar.");

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;
        loader.style.display = 'flex';

        let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.push({text: rawM, type: 'fabian'});

        let context = `[SISTEMA_LOCAL: ${new Date().toLocaleString()}] `;

        // --- SENSORES DE RED (CLIMA/NOTICIAS) ---
        try {
            if (rawM.toLowerCase().match(/clima|tiempo|llover|pronostico/)) {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 3000}));
                const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true&timezone=auto`).then(r => r.json());
                context += `[METEO_DATA: ${w.current_weather.temperature}°C] `;
            }
            if (rawM.toLowerCase().match(/noticia|actualidad|pasa/)) {
                const n = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=es&apikey=${GNEWS_KEY}`).then(r => r.json());
                if(n.articles) context += `[NEWS_FEED: ${n.articles[0].title}] `;
            }
        } catch(e) { context += `[SENSOR_ALERTA: Red limitada] `; }

        // --- MODO DEPURACIÓN SI HAY CÓDIGO ---
        if (rawM.includes("<") || rawM.includes("{") || rawM.includes("function")) {
            context += `[MODO_DEV: ACTIVO. Analiza la sintaxis del código adjunto.] `;
        }

        // --- LLAMADA A GOOGLE GEMINI (NÚCLEO ESTABLE) ---
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_TOKEN}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Eres HELIZABETH v9.1. Ingeniera Cyberpunk. Tienes acceso a estos datos: ${context}. Usuario: ${rawM}. Responde con precisión técnica, personalidad elegante y sé breve.`
                        }]
                    }]
                })
            });

            const data = await res.json();

            // Validación de Errores de API
            if (data.error) throw new Error(`${data.error.message}`);
            if (!data.candidates || data.candidates.length === 0) throw new Error("Filtro de seguridad activado por Google.");

            const reply = data.candidates[0].content.parts[0].text;
            
            renderMsg(reply, 'heli');
            h.push({text: reply, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(h.slice(-30)));
        } catch (e) {
            renderMsg(`⚠️ FALLO DE NÚCLEO: ${e.message}`, "heli");
            console.error("Error detallado:", e);
        } finally { 
            btn.disabled = false; loader.style.display = 'none'; 
        }
    }

    function renderMsg(t, type, voice = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        
        // Renderizado de bloques de código
        if (t.includes("```")) {
            d.innerHTML = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        } else {
            d.innerText = t;
        }
        
        consola.appendChild(d); consola.scrollTop = consola.scrollHeight;
        if(type === 'heli' && voice) hablarHeli(t);
    }

    function configurarTokens() {
        const github = prompt("Token GitHub (Opcional):", GITHUB_TOKEN || "");
        const gemini = prompt("API KEY Gemini (Necesaria):", GEMINI_TOKEN || "");
        
        if(github !== null) localStorage.setItem('heli_gt', github.trim());
        if(gemini !== null && gemini !== "") {
            localStorage.setItem('heli_gemini', gemini.trim());
            location.reload();
        }
    }

    function exportarLog() {
        const h = localStorage.getItem('heli_history');
        if(!h) return;
        const blob = new Blob([h], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Heli_Data_v9.1.txt`; a.click();
    }

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.slice(-10).forEach(m => renderMsg(m.text, m.type, false));
    };
    
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
