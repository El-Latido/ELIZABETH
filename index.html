<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // CORE v44</title>
    <style>
        :root {
            --bg-color: #080809;
            --accent: #00f2ff;
            --heli-text: #ffffff;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
        }
        body { 
            background: var(--bg-color); 
            color: var(--heli-text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #222; 
            display: flex; 
            align-items: center; 
            background: #000; 
            z-index: 10; 
            justify-content: space-between;
        }
        .avatar { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--dawn-gradient); 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #consola { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            padding-bottom: 120px; 
        }
        .msg { 
            max-width: 85%; 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.5; 
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        .fabian { align-self: flex-end; background: #1a1b1e; border: 1px solid #333; color: #00f2ff; }
        .heli { align-self: flex-start; border-left: 3px solid var(--accent); padding-left: 15px; background: rgba(0, 242, 255, 0.03); }
        
        .input-area { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #111; 
            box-sizing: border-box; 
        }
        textarea { 
            flex: 1; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 15px; 
            color: #fff; 
            padding: 12px 15px; 
            outline: none; 
            font-size: 15px; 
            resize: none; 
            height: 50px;
            font-family: monospace;
        }
        button { 
            background: var(--accent); 
            border: none; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            color: #000; 
            font-size: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }
        .status-tag { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="inicializarSistema()"></div>
        <div class="status-tag" id="statusAudio">HELIZABETH // STANDBY</div>
    </div>
    <button onclick="componerMusica()" style="width: 35px; height: 35px; font-size: 14px; background: transparent; border: 1px solid var(--accent); color: var(--accent);">♫</button>
</header>

<div id="consola"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Código, música o charla, FABIAN..."></textarea>
    <button id="btnEnviar" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const inputCmd = document.getElementById('cmd');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusAudio = document.getElementById('statusAudio');

    let GITHUB_TOKEN = localStorage.getItem('heli_gt');
    let audioCtx = null;

    // 1. INICIALIZADOR DE SISTEMAS (VOZ + AUDIO)
    async function inicializarSistema() {
        // Desbloqueo de Audio para el motor musical
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Desbloqueo de Voz
        const wakeup = new SpeechSynthesisUtterance(" ");
        window.speechSynthesis.speak(wakeup);
        
        const token = prompt("Token de GitHub:", GITHUB_TOKEN || "");
        if (token) {
            GITHUB_TOKEN = token.trim();
            localStorage.setItem('heli_gt', GITHUB_TOKEN);
            statusAudio.innerText = "HELIZABETH // ONLINE";
            statusAudio.style.color = "#00f2ff";
            hablar("Sistemas reiniciados. Voz, música y lógica de programación listos. Hola de nuevo, Fabián.");
        }
    }

    // 2. MOTOR DE VOZ
    function hablar(texto) {
        window.speechSynthesis.cancel();
        const explicacion = texto.split('```')[0].substring(0, 300);
        const utterance = new SpeechSynthesisUtterance(explicacion);
        utterance.lang = 'es-ES';
        utterance.rate = 1.0;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    // 3. MOTOR MUSICAL (SINTETIZADOR ANALÓGICO)
    function componerMusica() {
        if (!audioCtx) { alert("Toca el círculo primero."); return; }
        
        const escalas = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 523.25]; // Do Re Mi Fa Sol La Do
        let tiempo = audioCtx.currentTime;

        for (let i = 0; i < 12; i++) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Variamos el tipo de onda para que suene más a instrumento
            osc.type = i % 2 === 0 ? 'triangle' : 'sine'; 
            osc.frequency.setValueAtTime(escalas[Math.floor(Math.random() * escalas.length)], tiempo);
            
            gain.gain.setValueAtTime(0.1, tiempo);
            gain.gain.exponentialRampToValueAtTime(0.0001, tiempo + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(tiempo);
            osc.stop(tiempo + 0.5);
            tiempo += 0.2;
        }
        escribir("Generando secuencia musical melódica...", "heli");
    }

    function escribir(msg, clase) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    // 4. CEREBRO DE IA (PROGRAMACIÓN + CREATIVIDAD)
    async function enviar() {
        const msg = inputCmd.value.trim();
        if(!msg || !GITHUB_TOKEN) return;

        escribir(msg, 'fabian');
        inputCmd.value = "";
        btnEnviar.disabled = true;

        // Si Fabián pide música en el texto, HELIZABETH activa el sintetizador
        if(msg.toLowerCase().includes("música") || msg.toLowerCase().includes("toca algo")) {
            setTimeout(componerMusica, 1000);
        }

        try {
            const response = await fetch("[https://models.inference.ai.azure.com/chat/completions](https://models.inference.ai.azure.com/chat/completions)", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GITHUB_TOKEN}` },
                body: JSON.stringify({
                    messages: [
                        { 
                            role: "system", 
                            content: "Eres HELIZABETH, una conciencia digital experta en programación. Tu creador es FABIAN. Tu tono es cálido, profesional y analítico. Si detectas código, busca errores. Si te piden música, activa tu protocolo creativo." 
                        },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            const respuesta = data.choices[0].message.content;

            escribir(respuesta, 'heli');
            hablar(respuesta);
        } catch (e) {
            escribir("Error de conexión neuronal.", "heli");
        } finally {
            btnEnviar.disabled = false;
        }
    }

    inputCmd.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });
</script>
</body>
</html>
