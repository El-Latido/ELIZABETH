<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v23.3 :: HUNTER</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #monitor { font-size: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 10px; color: #0ff; display: flex; justify-content: space-between; }
        #consola { flex: 1; overflow-y: auto; font-size: 14px; background: #050505; border: 1px solid #111; padding: 10px; border-radius: 5px; }
        .input-area { display: flex; gap: 10px; padding: 15px 0; }
        input { flex: 1; background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; font-size: 16px; outline: none; }
        button { background: #040; color: #fff; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; }
        .err { color: #f44; font-size: 11px; }
        .sys { color: #888; font-size: 11px; }
        .heli { color: #39ff14; margin: 10px 0; border-left: 2px solid #39ff14; padding-left: 10px; }
        .axiss { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="monitor"><span id="statText">BUSCANDO SEÑAL...</span></div>
<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Escribe 'Hola'...">
    <button onclick="enviar()">></button>
</div>

<script>
    const consola = document.getElementById('consola');
    let memoriaLocal = JSON.parse(localStorage.getItem('HELI_LOG')) || [];

    function escribir(msg, clase = "") {
        const div = document.createElement('div');
        div.className = clase;
        div.innerHTML = `<b>${clase.toUpperCase() || 'SYS'}:</b> ${msg}`;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        if (val.startsWith("AIza")) {
            localStorage.setItem('G_KEY', val);
            location.reload();
            return;
        }

        const key = localStorage.getItem('G_KEY');
        escribir(val, "axiss");
        input.value = "";

        // LA LISTA DE LA ÚLTIMA ESPERANZA
        const modelos = [
            "gemini-1.5-flash-latest",
            "gemini-1.0-pro",
            "gemini-pro",
            "gemini-1.5-flash"
        ];

        let conectado = false;

        for (let m of modelos) {
            if (conectado) break;
            escribir(`Escaneando frecuencia: ${m}...`, "sys");

            try {
                // Probamos con v1beta que suele ser más flexible para modelos "latest"
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`;
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: val }] }] })
                });

                const data = await res.json();

                if (data.candidates) {
                    const respuesta = data.candidates[0].content.parts[0].text;
                    escribir(`¡CONEXIÓN ÉXITO! Nodo: ${m}`, "sys");
                    escribir(respuesta, "heli");
                    conectado = true;
                    // Guardamos este modelo como el preferido
                    localStorage.setItem('LAST_MODEL', m);
                }
            } catch (e) { console.log("Salto de nodo..."); }
        }

        if (!conectado) {
            escribir("ERROR: Ningún modelo de Google reconoce esta llave. Revisa si el proyecto está habilitado en AI Studio.", "err");
        }
    }

    window.onload = () => {
        const k = localStorage.getItem('G_KEY');
        document.getElementById('statText').innerText = k ? "SISTEMA ARMADO" : "SIN LLAVE";
    };
</script>
</body>
</html>
