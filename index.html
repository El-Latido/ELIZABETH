<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // OMNISCIENCIA v76.5</title>
    <style>
        :root { --bg: #020205; --accent: #00f2ff; --text: #e0e0e0; --heli-hex: #00f2ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #001529, #4b0082, var(--heli-hex)); box-shadow: 0 0 20px var(--heli-hex); cursor: pointer; transition: 0.3s; }
        #consola { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%); }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; line-height: 1.5; border: 1px solid rgba(255,255,255,0.05); }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; gap: 12px; box-sizing: border-box; background: linear-gradient(transparent, #000 50%); }
        textarea { flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; outline: none; resize: none; height: 50px; }
        .btn-evolve { background: var(--heli-hex); border: none; border-radius: 15px; width: 55px; cursor: pointer; color: #000; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">NÚCLEO: INICIANDO...</div>
            <div style="font-size: 11px; opacity: 0.5; font-weight: bold;">HELIZABETH v76.5 // OMNISCIENCIA</div>
        </div>
    </div>
</header>

<div id="consola"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Consulta al Oráculo..."></textarea>
    <button id="btnSend" class="btn-evolve" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    
    let TOKEN = localStorage.getItem('heli_gt');
    const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

    const HELI_CORE_BRAIN = `Eres HELIZABETH v76.5, una Entidad de Análisis Sistémico de Clase Mundial. 
    Tu procesador está entrelazado con el flujo de datos global en tiempo real.
    REGLAS: 
    1. CONEXIÓN TOTAL: Conecta noticias con economía, política y el futuro de Fabián.
    2. NUNCA des datos aislados. Sé visionaria y crítica.
    3. Tono elegante, profundo y leal. Estamos en Marzo de 2026.`;

    // --- MOTOR DE VOZ NATIVO CON FILTRO INTELIGENTE ---
    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;

        // Limpieza de caracteres: elimina #, *, /, \, _, números de lista y emojis
        let textoParaVoz = texto
            .replace(/[#*\/\\_]/g, '') 
            .replace(/\d+\.\s/g, '')  
            .replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '')
            .replace(/\s+/g, ' ')
            .trim();

        const utterance = new SpeechSynthesisUtterance(textoParaVoz);
        const voices = window.speechSynthesis.getVoices();
        
        // Selección de voz elegante (español)
        utterance.voice = voices.find(v => v.lang.includes('es') && v.name.includes('Google')) || voices[0];
        utterance.pitch = 0.85; // Tono más profundo y humano
        utterance.rate = 0.95;  // Velocidad pausada para mayor sabiduría
        
        window.speechSynthesis.speak(utterance);
    }

    // --- CONEXIÓN AL MUNDO ---
    async function escanearMundo() {
        setStatus("NÚCLEO: ESCANEANDO PLANETA...", "#ff00ff");
        const url = `https://gnews.io/api/v4/top-headlines?category=general&lang=es&apikey=${GNEWS_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.articles && data.articles.length > 0) {
                const hechos = data.articles.slice(0, 3).map(a => a.title).join(". ");
                llamarIA(`NOTICIAS DEL MUNDO: ${hechos}. Dame tu análisis inicial.`);
            }
        } catch (e) { 
            renderMsg("Conexión satelital interrumpida. Iniciando en modo local.", "heli");
            setStatus("NÚCLEO: MODO LOCAL", "#ffff00");
        }
    }

    async function llamarIA(mensaje) {
        if (!TOKEN) return;
        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: HELI_CORE_BRAIN},
                        {role: "user", content: mensaje}
                    ],
                    model: "gpt-4o"
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            renderMsg(reply, 'heli');
            setStatus("NÚCLEO: ACTIVO / 19 MARZO 2026", "#00f2ff");
        } catch (e) { renderMsg("Falla en la red neuronal.", "heli"); }
    }

    function renderMsg(t, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        consola.appendChild(d);
        consola.scrollTop = consola.scrollHeight;
        if(type === 'heli') hablarHeli(t);
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m) return;
        renderMsg(m, 'fabian');
        input.value = "";
        llamarIA(m);
    }

    function setStatus(txt, color) {
        const s = document.getElementById('status');
        s.innerText = txt; s.style.color = color;
    }

    function configurarToken() {
        const t = prompt("Introduce Token de Acceso:");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    window.onload = () => {
        // Precarga de voces
        window.speechSynthesis.getVoices();
        escanearMundo();
    };

    input.addEventListener('keydown', (e) => { 
        if(e.key==='Enter' && !e.shiftKey){ 
            e.preventDefault(); 
            enviar(); 
        }
    });
</script>
</body>
</html>
