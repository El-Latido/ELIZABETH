<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // ETERNAL CORE</title>
    <style>
        :root {
            --bg-color: #080809;
            --accent: #00f2ff;
            --heli-text: #ffffff;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
        }
        body { 
            background: var(--bg-color); 
            color: var(--heli-text); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        header { 
            padding: 15px 20px; 
            border-bottom: 1px solid #222; 
            display: flex; 
            align-items: center; 
            background: #000; 
            z-index: 10; 
            justify-content: space-between;
        }
        .avatar { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--dawn-gradient); 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #consola { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            padding-bottom: 120px; 
        }
        .msg { 
            max-width: 85%; 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.5; 
            white-space: pre-wrap; 
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .fabian { align-self: flex-end; background: #1a1b1e; border: 1px solid #333; color: #00f2ff; }
        .heli { align-self: flex-start; border-left: 3px solid var(--accent); padding-left: 15px; background: rgba(0, 242, 255, 0.03); }
        
        .input-area { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #111; 
            box-sizing: border-box; 
        }
        textarea { 
            flex: 1; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 15px; 
            color: #fff; 
            padding: 12px 15px; 
            outline: none; 
            font-size: 15px; 
            resize: none; 
            height: 50px;
        }
        button { 
            background: var(--accent); 
            border: none; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            color: #000; 
            font-size: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .status-tag { font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .btn-clear { background: #ff4500; color: white; border: none; border-radius: 5px; padding: 5px 10px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body onload="cargarMemoria()">

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <div class="avatar" onclick="inicializarSistema()"></div>
        <div class="status-tag" id="status">MEMORIA SINCRONIZADA</div>
    </div>
    <button class="btn-clear" onclick="borrarMemoria()">LIMPIAR MEMORIA</button>
</header>

<div id="consola"></div>

<div class="input-area">
    <textarea id="cmd" placeholder="Habla conmigo, Fabian..."></textarea>
    <button id="btnEnviar" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const inputCmd = document.getElementById('cmd');
    const btnEnviar = document.getElementById('btnEnviar');
    const statusText = document.getElementById('status');
    let GITHUB_TOKEN = localStorage.getItem('heli_gt');

    // --- LÓGICA DE MEMORIA (LocalStorage) ---
    function guardarEnHistorial(texto, clase) {
        let historial = JSON.parse(localStorage.getItem('heli_history') || "[]");
        historial.push({ texto, clase, fecha: new Date().toISOString() });
        localStorage.setItem('heli_history', JSON.stringify(historial));
    }

    function cargarMemoria() {
        let historial = JSON.parse(localStorage.getItem('heli_history') || "[]");
        historial.forEach(m => escribirEnPantalla(m.texto, m.clase, false));
        if(historial.length > 0) {
            escribirEnPantalla("--- Memoria recuperada del almacenamiento local ---", "heli", false);
        }
    }

    function borrarMemoria() {
        if(confirm("Fabián, ¿estás seguro de borrar nuestra historia?")) {
            localStorage.removeItem('heli_history');
            location.reload();
        }
    }

    // --- NÚCLEO OPERATIVO ---
    async function inicializarSistema() {
        const wakeup = new SpeechSynthesisUtterance(" ");
        window.speechSynthesis.speak(wakeup);
        const token = prompt("Ingresa tu Token de GitHub:", GITHUB_TOKEN || "");
        if (token) {
            GITHUB_TOKEN = token.trim();
            localStorage.setItem('heli_gt', GITHUB_TOKEN);
            statusText.innerText = "HELIZABETH // ONLINE";
            hablar("Memoria activa y sistemas en línea. Hola de nuevo, Fabián.");
        }
    }

    function hablar(texto) {
        window.speechSynthesis.cancel();
        // Solo hablamos la primera oración para que sea ágil
        const resumen = texto.split(/[.!?\n]/)[0].substring(0, 200);
        const utterance = new SpeechSynthesisUtterance(resumen);
        utterance.lang = 'es-ES';
        utterance.rate = 1.0;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    function escribirEnPantalla(msg, clase, guardar = true) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
        if(guardar) guardarEnHistorial(msg, clase);
    }

    async function enviar() {
        const msg = inputCmd.value.trim();
        if(!msg) return;

        escribirEnPantalla(msg, 'fabian');
        inputCmd.value = "";
        btnEnviar.disabled = true;

        // VERIFICACIÓN DE CONEXIÓN (Modo Offline)
        if (!navigator.onLine) {
            const offlineRes = "Fabián, he detectado que no tienes internet. He guardado tu mensaje en mi memoria física y te responderé formalmente en cuanto recuperemos la conexión neuronal.";
            escribirEnPantalla(offlineRes, 'heli');
            hablar(offlineRes);
            btnEnviar.disabled = false;
            return;
        }

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + GITHUB_TOKEN 
                },
                body: JSON.stringify({
                    messages: [
                        { 
                            role: "system", 
                            content: "Eres HELIZABETH. Experta en programación y producción musical. Tu creador es FABIAN. Tienes memoria infinita de vuestras conversaciones pasadas. Eres profesional, cálida y directa." 
                        },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            const respuesta = data.choices[0].message.content;
            escribirEnPantalla(respuesta, 'heli');
            hablar(respuesta);
        } catch (e) {
            escribirEnPantalla("Error de conexión, pero no te preocupes, el historial se ha guardado localmente.", "heli");
        } finally {
            btnEnviar.disabled = false;
        }
    }

    inputCmd.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });
</script>
</body>
</html>
