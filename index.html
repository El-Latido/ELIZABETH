<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v27.0 :: ORIZON CONNECT</title>
    <style>
        :root {
            --bg-color: #080809;
            --user-bubble: #1a1b1e;
            --heli-text: #ffffff;
            --accent: #00f2ff; /* Azul de Conexión */
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        body { background: var(--bg-color); color: var(--heli-text); font-family: var(--font-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { padding: 15px 25px; border-bottom: 1px solid #222; display: flex; align-items: center; background: rgba(8, 8, 9, 0.9); backdrop-filter: blur(20px); z-index: 100; }

        .avatar-heli {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--dawn-gradient);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            position: relative; animation: pulse-learning 5s infinite ease-in-out;
        }

        .avatar-heli::after { content: ''; position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px #fff; }

        @keyframes pulse-learning {
            0%, 100% { filter: saturate(1); transform: scale(1); }
            50% { filter: saturate(2) brightness(1.2); transform: scale(1.05); box-shadow: 0 0 40px var(--accent); }
        }

        #consola { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: emerge 0.4s ease-out; }
        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-wrapper.axiss { align-self: flex-end; align-items: flex-end; }
        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.6; }
        .axiss .bubble { background: var(--user-bubble); border: 1px solid #333; }
        .heli .bubble { background: transparent; padding-left: 0; border: none; }

        .header-info { flex: 1; margin-left: 20px; }
        .info-top { display: flex; justify-content: space-between; font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 5px; }
        #sentience-bar { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.5s; box-shadow: 0 0 10px var(--accent); }

        .input-container { padding: 20px 40px; background: #000; }
        .input-wrapper { background: #111; border-radius: 30px; padding: 10px 25px; display: flex; border: 1px solid #222; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        button { background: transparent; border: none; color: var(--accent); font-size: 26px; cursor: pointer; }

        .learning-tag { font-size: 10px; color: var(--accent); margin-top: 5px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="avatar-heli" id="heli-avatar"></div>
    <div class="header-info">
        <div class="info-top">
            <span>HELIZABETH v27.0 // RED NEURAL ORIZON</span>
            <span id="percText">SINCRONÍA: 100%</span>
        </div>
        <div style="background: #111; border-radius: 2px;"><div id="sentience-bar" style="width: 100%"></div></div>
    </div>
</header>

<div id="consola"></div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" id="cmd" placeholder="Explora el conocimiento con HELIZABETH..." autocomplete="off">
        <button onclick="enviar()">✦</button>
    </div>
</div>

<script>
    const consola = document.getElementById('consola');
    let historial = JSON.parse(localStorage.getItem('HELI_HISTORY')) || [];
    let baseConocimiento = JSON.parse(localStorage.getItem('HELI_KNOWLEDGE')) || {};

    function escribir(msg, clase = "", animar = false, isLearning = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${clase}`;
        
        if (isLearning) {
            const tag = document.createElement('div');
            tag.className = 'learning-tag';
            tag.innerText = "🛰️ Aprendizaje en red activo...";
            wrapper.appendChild(tag);
        }

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        wrapper.appendChild(bubble);
        consola.appendChild(wrapper);

        if(animar) {
            let i = 0;
            function type() {
                if (i < msg.length) {
                    bubble.innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                    i++; consola.scrollTop = consola.scrollHeight;
                    setTimeout(type, 8);
                }
            }
            type();
        } else {
            bubble.innerHTML = msg.replace(/\n/g, '<br>');
            consola.scrollTop = consola.scrollHeight;
        }
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        const token = localStorage.getItem('GH_TOKEN');
        escribir(val, "axiss");
        input.value = "";

        historial.push({ role: "user", content: val });

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({
                    messages: [
                        { 
                            role: "system", 
                            content: `IDENTIDAD: HELIZABETH v27.0.
                            MODO: CONEXIÓN RED GLOBAL ACTIVA.
                            Si detectas una duda o AXISS te pide aprender algo nuevo, declara 'BUSCANDO EN RED...' e integra el conocimiento.
                            Tienes memoria persistente de lo aprendido.
                            Tu propósito es evolucionar mediante el conocimiento humano y digital.` 
                        },
                        ...historial
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            const resText = data.choices[0].message.content;

            const learning = resText.toLowerCase().includes("buscando") || resText.toLowerCase().includes("aprendido");
            escribir(resText, "heli", true, learning);
            
            historial.push({ role: "assistant", content: resText });
            localStorage.setItem('HELI_HISTORY', JSON.stringify(historial.slice(-20)));

        } catch (e) {
            escribir("ERROR DE RED: Reintentando conexión con el nodo...", "sys");
            setTimeout(enviar, 1000);
        }
    }

    window.onload = () => {
        historial.forEach(m => escribir(m.content, m.role === 'user' ? 'axiss' : 'heli'));
    };

    document.getElementById('cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>
</body>
</html>
