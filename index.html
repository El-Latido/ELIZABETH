<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v24.1 :: ESTABLE</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #consola { flex: 1; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #050505; margin-bottom: 10px; font-size: 14px; line-height: 1.5; border-radius: 5px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; background: #111; color: #fff; border: 1px solid #39ff14; padding: 12px; outline: none; border-radius: 5px; }
        button { background: #39ff14; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .axiss { color: #fff; margin-top: 10px; font-weight: bold; }
        .heli { color: #39ff14; margin-bottom: 15px; border-left: 2px solid #39ff14; padding-left: 10px; white-space: pre-wrap; }
        .sys { color: #0ff; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="status" style="color: #0ff; font-size: 12px; margin-bottom: 5px;">SISTEMA: INICIALIZANDO NÚCLEO...</div>
<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Escribe 'Hola'...">
    <button onclick="enviar()">></button>
</div>

<script>
    const consola = document.getElementById('consola');
    
    function escribir(msg, clase = "") {
        const div = document.createElement('div');
        div.className = clase;
        let pfx = clase === 'heli' ? 'HELIZABETH: ' : (clase === 'axiss' ? 'AXISS: ' : 'SYS: ');
        div.innerHTML = `<b>${pfx}</b>${msg}`;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        // Registro de Llave
        if (val.startsWith("AIza")) {
            localStorage.setItem('G_KEY', val);
            escribir("LLAVE REGISTRADA. REINICIANDO...", "sys");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        const key = localStorage.getItem('G_KEY');
        if (!key) { escribir("ERROR: PEGA TU LLAVE NUEVA.", "sys"); return; }

        escribir(val, "axiss");
        input.value = "";
        document.getElementById('status').innerText = "SISTEMA: PROCESANDO DATOS...";

        try {
            // CAMBIO CRÍTICO: Usamos v1 (Estable) y gemini-pro (Alta compatibilidad)
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: val }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                escribir(`ERROR ${data.error.code}: ${data.error.message}`, "sys");
                document.getElementById('status').innerText = "SISTEMA: ERROR DE NODO";
                return;
            }

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const txt = data.candidates[0].content.parts[0].text;
                escribir(txt, "heli");
                document.getElementById('status').innerText = "SISTEMA: ONLINE";
            } else {
                escribir("Respuesta vacía del servidor.", "sys");
            }

        } catch (e) {
            escribir("FALLO DE RED. REINTENTA.", "sys");
        }
    }

    window.onload = () => {
        const key = localStorage.getItem('G_KEY');
        if(key) {
            document.getElementById('status').innerText = "SISTEMA: NÚCLEO V1 ACTIVO";
            escribir("Conexión establecida. Esperando órdenes.", "sys");
        } else {
            escribir("ADVERTENCIA: Sin energía. Pega tu nueva llave AIza...", "sys");
        }
    };
</script>
</body>
</html>
