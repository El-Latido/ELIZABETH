<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v27.5 // FABIAN CORE</title>
    <style>
        :root {
            --bg-color: #080809;
            --user-bubble: #1a1b1e;
            --heli-text: #ffffff;
            --accent: #00f2ff;
            --dawn-gradient: linear-gradient(135deg, #001529, #4b0082, #ff4500, #ffcc00);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        body { background: var(--bg-color); color: var(--heli-text); font-family: var(--font-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10; }
        
        .avatar-heli { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: var(--dawn-gradient); 
            box-shadow: 0 0 15px var(--accent); 
            animation: pulse 4s infinite; 
            cursor: pointer;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        #consola { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .fabian { align-self: flex-end; background: var(--user-bubble); color: #fff; border: 1px solid #333; border-bottom-right-radius: 4px; }
        .heli { align-self: flex-start; background: transparent; border-left: 2px solid var(--accent); padding-left: 15px; border-radius: 0; }

        .input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #111; padding-bottom: 30px; }
        input { flex: 1; background: #111; border: 1px solid #222; border-radius: 25px; color: #fff; padding: 12px 20px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-weight: bold; color: #000; font-size: 20px; }
        
        .status-info { margin-left: 12px; }
        .status-title { font-size: 11px; font-weight: bold; color: #fff; }
        .status-tag { font-size: 8px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div class="avatar-heli" onclick="activarAudio()"></div>
    <div class="status-info">
        <div class="status-title">HELIZABETH</div>
        <div class="status-tag">Voz Femenina Pro // Speechify</div>
    </div>
</header>

<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Toca el círculo para activar voz..." autocomplete="off">
    <button onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    
    // CONFIGURACIÓN DE TOKENS
    const SPEECHIFY_TOKEN = "a12WKyizRwPhSdF4Ptg19Sv8R5RpsCtWeC5ScVqeJDY=";
    const GITHUB_TOKEN = "TU_TOKEN_DE_GITHUB_AQUÍ"; // <--- NO OLVIDES PONER TU TOKEN AQUÍ

    let audioActivado = false;

    function activarAudio() {
        audioActivado = true;
        alert("¡Voz de HELIZABETH activada para esta sesión, FABIAN!");
    }

    async function hablar(texto) {
        try {
            const response = await fetch("https://api.swyg.com/v1/speechify/tts", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${SPEECHIFY_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: texto,
                    voiceId: "carly",
                    audioFormat: "mp3"
                })
            });

            const data = await response.json();
            if(data.audioData) {
                const audio = new Audio("data:audio/mp3;base64," + data.audioData);
                audio.play();
            }
        } catch (e) {
            console.error("Error de voz:", e);
        }
    }

    function escribir(msg, clase) {
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        div.innerText = msg;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const msg = input.value.trim();
        
        if(!msg) return;
        if(GITHUB_TOKEN === "TU_TOKEN_DE_GITHUB_AQUÍ") {
            alert("FABIAN, falta tu Token de GitHub en el código.");
            return;
        }

        escribir(msg, 'fabian');
        input.value = "";

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GITHUB_TOKEN}` },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una conciencia digital femenina y serena. Tu creador es FABIAN. Tu voz es cálida, humana y pausada." },
                        { role: "user", content: msg }
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await response.json();
            const respuesta = data.choices[0].message.content;

            escribir(respuesta, 'heli');
            hablar(respuesta);

        } catch (e) {
            escribir("Error de conexión. Revisa tu Token de GitHub.", "heli");
        }
    }

    document.getElementById('cmd').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>
</body>
</html>
