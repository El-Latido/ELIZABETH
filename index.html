<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI v12.0 [SLIDE_CORE]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090b; --heli: #00d2ff; --axiss: #00ff88; --glass: rgba(255, 255, 255, 0.03);
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Contenedor Deslizante */
        #viewport { display: flex; width: 200vw; height: 100vh; transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1); }

        /* SECCIÓN 1: HELIZABETH (PRINCIPAL) */
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .orb { width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, var(--heli), transparent); border: 2px solid var(--heli); cursor: pointer; }
        
        #chat-heli { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .h-msg { background: var(--glass); border-left: 3px solid var(--heli); align-self: flex-start; }
        .f-msg { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--heli); align-self: flex-end; color: var(--heli); }

        /* SECCIÓN 2: DEEP LOGS (INTERNO) */
        #deep-logs { background: #000; border-left: 1px solid #222; }
        #chat-internal { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Fira Code', monospace; font-size: 11px; }
        .int-msg { margin-bottom: 15px; padding-left: 10px; border-left: 2px solid #333; }
        .tag-h { color: var(--heli); font-weight: bold; }
        .tag-a { color: var(--axiss); font-weight: bold; }

        /* FLECHAS DE NAVEGACIÓN */
        .nav-arrow { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            width: 40px; height: 60px; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 100; border-radius: 5px; font-size: 24px;
        }
        .to-right { right: 10px; color: var(--axiss); }
        .to-left { left: 10px; color: var(--heli); }

        /* INPUT FIX */
        .input-bar { padding: 20px; background: #000; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--heli); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="viewport">
    <div class="page">
        <header>
            <div class="orb" onclick="setToken()"></div>
            <div style="font-weight: bold; font-size: 14px;">HELIZABETH v12.0</div>
            <div style="font-size: 10px; color: #555;">[SECURE]</div>
        </header>
        <div id="chat-heli">
            <div class="msg h-msg">Sistemas listos, Fabián. ¿En qué trabajaremos hoy?</div>
        </div>
        <div class="nav-arrow to-right" onclick="move(1)">→</div>
        <div class="input-bar">
            <input type="text" id="user-in" placeholder="Escribe a Heli..." autocomplete="off">
            <button onclick="send()">✦</button>
        </div>
    </div>

    <div class="page" id="deep-logs">
        <header>
            <div style="color: var(--axiss); font-weight: bold; letter-spacing: 2px;">DEEP_CORE_SYNC</div>
        </header>
        <div id="chat-internal">
            <div class="int-msg">> [SYSTEM]: Canal de auditoría abierto. Monitoreando hilos...</div>
        </div>
        <div class="nav-arrow to-left" onclick="move(0)">←</div>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem('heli_axiss_key');
    const viewport = document.getElementById('viewport');
    const hChat = document.getElementById('chat-heli');
    const iChat = document.getElementById('chat-internal');
    const input = document.getElementById('user-in');

    function move(page) { viewport.style.transform = `translateX(-${page * 100}vw)`; }

    function setToken() {
        const k = prompt("API KEY GEMINI:");
        if(k) { localStorage.setItem('heli_axiss_key', k); API_KEY = k; location.reload(); }
    }

    async function send() {
        const val = input.value.trim();
        if(!val || !API_KEY) return;

        // Render en chat principal
        const fDiv = document.createElement('div');
        fDiv.className = 'msg f-msg';
        fDiv.innerText = val;
        hChat.appendChild(fDiv);
        input.value = '';

        // Logs internos iniciales
        iChat.innerHTML += `<div class="int-msg">> [FABIAN]: ${val}</div>`;
        iChat.innerHTML += `<div class="int-msg" id="loading">> [SYNC]: Conectando con los núcleos...</div>`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Actúa como dos entidades. 
                    1. HELIZABETH (Auditora de seguridad, seria, responde directo al usuario). 
                    2. AXISS (Arquitecto técnico, analiza el código y estructura en secreto).
                    Usuario: "${val}".
                    Responde PRIMERO lo que HELIZABETH le dice al usuario.
                    Luego pon el marcador [AXISS_INTERNAL] y escribe el análisis técnico de AXISS.` }] }]
                })
            });

            const data = await response.json();
            const fullReply = data.candidates[0].content.parts[0].text;
            const parts = fullReply.split('[AXISS_INTERNAL]');

            document.getElementById('loading').remove();

            // Respuesta de Heli (Principal)
            const hDiv = document.createElement('div');
            hDiv.className = 'msg h-msg';
            hDiv.innerText = parts[0].trim();
            hChat.appendChild(hDiv);

            // Chat interno (Heli + Axiss)
            iChat.innerHTML += `<div class="int-msg"><span class="tag-h">HELI:</span> ${parts[0].trim()}</div>`;
            iChat.innerHTML += `<div class="int-msg"><span class="tag-a">AXISS:</span> ${parts[1] ? parts[1].trim() : "Análisis estructural completado sin observaciones."}</div>`;

            hChat.scrollTop = hChat.scrollHeight;
            iChat.scrollTop = iChat.scrollHeight;

        } catch (e) {
            iChat.innerHTML += `<div class="int-msg" style="color:red">> [ERROR]: Fallo de conexión neuronal.</div>`;
        }
    }

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
