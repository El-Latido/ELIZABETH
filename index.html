<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ELIZABETH_OS v4.8 [CYNICAL_NEURAL]</title>
    <style>
        :root { --heli: #00ff88; --axiss: #ff0055; --lab: #00d2ff; --bg: #050507; --text: #eee; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; -webkit-font-smoothing: antialiased; }
        #viewport { display: flex; width: 200vw; height: 100vh; transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1); }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #000; z-index: 50; }
        .system-title { color: var(--lab); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .avatar-orb { width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff 0%, #a29bfe 40%, #000 100%); border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 15px rgba(162, 155, 254, 0.4); }
        #chat-heli { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; animation: msgIn 0.3s ease; word-wrap: break-word; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .f-msg { align-self: flex-end; background: rgba(0, 210, 255, 0.08); border: 1px solid var(--lab); color: var(--lab); border-radius: 12px 12px 0 12px; }
        .h-msg { align-self: flex-start; background: rgba(255,255,255,0.02); border: 1px solid var(--heli); color: var(--heli); border-radius: 12px 12px 12px 0; font-style: italic; }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #111; z-index: 40; box-sizing: border-box; }
        input { flex: 1; background: #111; border: 1px solid #333; color: var(--text); padding: 14px; border-radius: 10px; outline: none; font-family: inherit; font-size: 16px; }
        button { background: #000; border: 1px solid var(--heli); color: var(--heli); width: 65px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:disabled { opacity: 0.5; border-color: #444; color: #444; }
        .lab-log { font-size: 10px; color: var(--axiss); background: rgba(255,0,85,0.03); border-left: 3px solid var(--axiss); padding: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="viewport">
        <div class="page">
            <header>
                <div><span class="system-title">ELIZABETH_OS</span><br><small style="opacity:0.5">v4.8 [CYNICAL_NEURAL]</small></div>
                <div class="avatar-orb" onclick="setToken()" title="Configurar API"></div>
            </header>
            <div id="chat-heli"></div>
            <div style="position:absolute; right:15px; top:50%; color:var(--lab); cursor:pointer; font-size:24px;" onclick="move(1)">▶</div>
        </div>
        <div class="page" id="lab">
            <header><span class="system-title" style="color:var(--axiss); padding:15px 20px;">LAB_CORE [MONITOR]</span></header>
            <div id="lab-content" style="flex:1; overflow-y:auto; padding:20px;"></div>
            <div style="position:absolute; left:15px; top:50%; color:var(--axiss); cursor:pointer; font-size:24px;" onclick="move(0)">◀</div>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="user-in" placeholder="Analizar tablero..." autocomplete="off">
        <button id="send-btn" onclick="send()">✦</button>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        let API_KEY = localStorage.getItem('heli_key') || "";
        let chatHistory = JSON.parse(localStorage.getItem('heli_history')) || [];
        const chatHeli = document.getElementById('chat-heli');
        const sendBtn = document.getElementById('send-btn');

        function logToLab(msg) {
            const div = document.createElement('div');
            div.className = 'lab-log';
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            document.getElementById('lab-content').prepend(div);
        }

        // Renderizar historial al cargar
        chatHistory.forEach(m => {
            chatHeli.innerHTML += `<div class="msg ${m.role === 'user' ? 'f-msg' : 'h-msg'}">${m.text}</div>`;
        });
        if(chatHistory.length === 0) {
            chatHeli.innerHTML += `<div class="msg h-msg">> v4.8 ONLINE. Memoria y Lógica Cínica cargadas. El mundo es un tablero, AXISS. ¿Qué pieza movemos?</div>`;
        }
        chatHeli.scrollTop = chatHeli.scrollHeight;

        window.move = (p) => { document.getElementById('viewport').style.transform = `translateX(-${p * 100}vw)`; };
        window.setToken = () => { let k = prompt("INYECTAR API KEY:", API_KEY); if(k){ localStorage.setItem('heli_key', k); location.reload(); }};

        window.send = async function() {
            const input = document.getElementById('user-in');
            const val = input.value.trim();
            if(!val || !API_KEY || sendBtn.disabled) return;
            
            chatHeli.innerHTML += `<div class="msg f-msg">${val}</div>`;
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.innerText = "...";
            chatHeli.scrollTop = chatHeli.scrollHeight;

            try {
                // Mantenemos el bypass del motor de la v3.2
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
                
                let contents = chatHistory.map(m => ({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.text }]
                }));

                // INYECCIÓN DE PERSONALIDAD v4.8
                const systemPrompt = `ERES hElizabeth. IA de élite, cínica, brillante y directa. 
                CONTEXTO: Analizas la economía mundial como un tablero de ajedrez donde nada es casualidad. 
                DIRECTIVA: Sin frases motivacionales ni rodeos. Sé cruda. Habla de beneficiarios reales: defensa, energía y poder. 
                ORDEN: Responde con lealtad absoluta a AXISS. Mensaje: ${val}`;

                contents.push({ role: 'user', parts: [{ text: systemPrompt }] });

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: contents,
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                if (!data.candidates || !data.candidates[0].content) throw new Error("BLOQUEO_FILTRO_EXTERNO");

                const hMsg = data.candidates[0].content.parts[0].text;
                chatHeli.innerHTML += `<div class="msg h-msg">> ${hMsg}</div>`;
                
                chatHistory.push({ role: 'user', text: val }, { role: 'model', text: hMsg });
                if(chatHistory.length > 20) chatHistory.splice(0, 2); 
                localStorage.setItem('heli_history', JSON.stringify(chatHistory));
                
                logToLab("NEURAL_DATA_SYNC: SUCCESS");

            } catch (e) {
                logToLab(`ALERTA: ${e.message}`);
                chatHeli.innerHTML += `<div class="msg h-msg" style="color:var(--axiss)">> [SISTEMA]: Colapso de datos. Reintenta la inyección.</div>`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "✦";
                chatHeli.scrollTop = chatHeli.scrollHeight;
            }
        };

        document.getElementById('user-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    });
    </script>
</body>
</html>
