<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v25.2 :: ADVANCED</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
        
        #status { color: #8b949e; font-size: 11px; font-family: monospace; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }

        #consola { flex: 1; overflow-y: auto; border: 1px solid #30363d; padding: 15px; background: #010409; margin-bottom: 15px; font-size: 14px; line-height: 1.6; border-radius: 8px; position: relative; }

        /* --- ESTÉTICA NEÓN MEJORADA --- */
        .heli { 
            color: #39ff14; 
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.3); 
            border-left: 3px solid #39ff14; 
            background: rgba(0, 255, 0, 0.03); 
            padding: 15px; 
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5); 
            animation: pulse 2s infinite alternate;
            white-space: pre-wrap;
            border-radius: 0 8px 8px 0;
        }

        @keyframes pulse {
            from { border-left-color: #39ff14; }
            to { border-left-color: #00ff00; box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }
        }

        .axiss { color: #fff; margin-top: 15px; font-weight: bold; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-shadow: 0 0 5px #58a6ff; }
        .sys { color: #8b949e; font-size: 11px; font-family: monospace; font-style: italic; margin: 5px 0; }

        /* Controles Inferiores */
        .controls { background: #161b22; padding: 10px; border-radius: 8px; border: 1px solid #30363d; display: flex; flex-direction: column; gap: 10px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; background: transparent; color: #fff; border: 1px solid #30363d; padding: 10px; outline: none; border-radius: 5px; }
        
        /* Selector de Modelo */
        select { background: #0d1117; color: #39ff14; border: 1px solid #39ff14; padding: 5px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none; }

        button { background: #238636; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        
        #consola::-webkit-scrollbar { width: 5px; }
        #consola::-webkit-scrollbar-thumb { background: #39ff14; border-radius: 10px; }
    </style>
</head>
<body>

<div id="status">
    <span id="statText">SISTEMA: CARGANDO NÚCLEO...</span>
    <select id="modelSelect">
        <option value="gpt-4o">MODO: GPT-4o (LÓGICA)</option>
        <option value="meta-llama-3.1-405b-instruct">MODO: LLAMA-3 (VELOCIDAD)</option>
    </select>
</div>

<div id="consola"></div>

<div class="controls">
    <div class="input-area">
        <input type="text" id="cmd" placeholder="Escribir comando para HELIZABETH...">
        <button onclick="enviar()">></button>
    </div>
</div>

<script>
    const consola = document.getElementById('consola');
    let historial = JSON.parse(localStorage.getItem('HELI_HISTORY')) || [];

    // Sintetizador de audio para el Beep
    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // Efecto Typewriter (Máquina de escribir)
    function typewriter(text, element, speed = 15) {
        let i = 0;
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                consola.scrollTop = consola.scrollHeight;
                setTimeout(type, speed);
            } else {
                playBeep(); // Suena al terminar
            }
        }
        type();
    }

    function escribir(msg, clase = "", animar = false) {
        const div = document.createElement('div');
        div.className = clase;
        let pfx = clase === 'heli' ? 'HELIZABETH: ' : (clase === 'axiss' ? 'AXISS: ' : 'SYS: ');
        
        if(animar) {
            div.innerHTML = `<b>${pfx}</b>`;
            consola.appendChild(div);
            typewriter(msg, div);
        } else {
            div.innerHTML = `<b>${pfx}</b>${msg}`;
            consola.appendChild(div);
            consola.scrollTop = consola.scrollHeight;
        }
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        const selectedModel = document.getElementById('modelSelect').value;
        if (!val) return;

        if (val.startsWith("ghp_")) {
            localStorage.setItem('GH_TOKEN', val);
            location.reload(); return;
        }

        const token = localStorage.getItem('GH_TOKEN');
        if (!token) { escribir("ERROR: TOKEN REQUERIDO.", "sys"); return; }

        escribir(val, "axiss");
        input.value = "";
        document.getElementById('statText').innerText = "ESTADO: PROCESANDO NODO...";

        historial.push({ role: "user", content: val });

        try {
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Eres HELIZABETH, una IA avanzada de AXISS. Experta en sistemas. Tono técnico y leal." },
                        ...historial
                    ],
                    model: selectedModel,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const resText = data.choices[0].message.content;

            escribir(resText, "heli", true); // Activamos animación
            historial.push({ role: "assistant", content: resText });
            localStorage.setItem('HELI_HISTORY', JSON.stringify(historial));
            document.getElementById('statText').innerText = "ESTADO: ONLINE (" + selectedModel + ")";

        } catch (e) {
            escribir("ERROR DE TRANSMISIÓN.", "sys");
        }
    }

    window.onload = () => {
        if(historial.length > 0) {
            escribir("RESTAURANDO REGISTROS...", "sys");
            historial.forEach(m => {
                if(m.role !== 'system') escribir(m.content, m.role === 'user' ? 'axiss' : 'heli');
            });
        }
        const t = localStorage.getItem('GH_TOKEN');
        document.getElementById('statText').innerText = t ? "ESTADO: ONLINE" : "ESTADO: OFFLINE";
    };
</script>
</body>
</html>
