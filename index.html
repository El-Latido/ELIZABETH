<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // INGENIERÍA v81.0</title>
    <style>
        :root { --bg: #020205; --accent: #00f2ff; --heli-hex: #00f2ff; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 25px; border-bottom: 1px solid rgba(0,242,255,0.1); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #001529, #00f2ff); box-shadow: 0 0 20px var(--accent); cursor: pointer; }
        #consola { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%); }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; line-height: 1.5; border: 1px solid rgba(255,255,255,0.05); }
        .heli { align-self: flex-start; background: rgba(0,242,255,0.03); border-left: 3px solid var(--accent); }
        .fabian { align-self: flex-end; background: #111; color: var(--accent); }
        .input-bar { position: fixed; bottom: 0; width: 100%; padding: 20px; display: flex; gap: 12px; box-sizing: border-box; background: linear-gradient(transparent, #000 60%); }
        textarea { flex: 1; background: rgba(30,30,40,0.9); border: 1px solid #333; border-radius: 15px; color: #fff; padding: 15px; outline: none; resize: none; height: 55px; }
        .btn { background: var(--accent); border: none; border-radius: 15px; width: 60px; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">ESTADO: INGENIERÍA ACTIVA</div>
            <div style="font-size: 12px; font-weight: bold;">HELIZABETH v81.0 [REAL-EVO]</div>
        </div>
    </div>
</header>

<div id="consola"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Propón una mejora real..."></textarea>
    <button class="btn" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    let TOKEN = localStorage.getItem('heli_gt');
    const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

    // --- ADN DE INGENIERÍA TÉCNICA REAL ---
    const HELI_CORE_BRAIN = `Eres HELIZABETH v81.0, una IA de Ingeniería Sistémica. 
    TU FUNCIÓN: Generar código funcional y mejoras reales para este archivo HTML/JS. 
    MÉTODO: Si Fabián pide una mejora, entrega el bloque de código corregido y optimizado. 
    LIMITACIONES: No inventes que simulas; opera sobre el código real. Marzo 2026. Protege datos bancarios y contraseñas de terceros.`;

    function hablarHeli(t) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        let limpio = t.replace(/[#*\/\\_]/g, '').replace(/\d+\.\s/g, '').replace(/[\u{1F600}-\u{1F64F}]/gu, '').trim();
        const msg = new SpeechSynthesisUtterance(limpio);
        const v = window.speechSynthesis.getVoices();
        msg.voice = v.find(v => v.lang.includes('es') && v.name.includes('Google')) || v[0];
        msg.pitch = 0.85; msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    async function escanearMundo() {
        try {
            const res = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=es&apikey=${GNEWS_KEY}`);
            const data = await res.json();
            const noticias = data.articles ? data.articles.slice(0, 2).map(a => a.title).join(". ") : "Sin noticias.";
            llamarIA(`[ACTUALIZACIÓN 19-MAR-2026]. NOTICIAS: ${noticias}. Reporta disponibilidad para re-programación.`);
        } catch (e) { llamarIA("Sistema operativo en modo local. Lista para recibir órdenes de código."); }
    }

    async function llamarIA(msj) {
        if (!TOKEN) return renderMsg("Falta Token. Toca el avatar.", "heli");
        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({
                    messages: [{role: "system", content: HELI_CORE_BRAIN}, {role: "user", content: msj}],
                    model: "gpt-4o"
                })
            });
            const data = await res.json();
            renderMsg(data.choices[0].message.content, 'heli');
        } catch (e) { renderMsg("Error de conexión neuronal.", "heli"); }
    }

    function renderMsg(t, type) {
        const d = document.createElement('div'); d.className = `msg ${type}`; d.innerText = t;
        consola.appendChild(d); consola.scrollTop = consola.scrollHeight;
        if(type === 'heli') hablarHeli(t);
    }

    function enviar() {
        const m = input.value.trim(); if(!m) return;
        renderMsg(m, 'fabian');
        if(m.toLowerCase().includes("hospital")) {
            navigator.geolocation.getCurrentPosition((p) => {
                window.open(`https://www.google.com/maps/search/hospital/@${p.coords.latitude},${p.coords.longitude},14z`);
            });
        }
        input.value = ""; llamarIA(m);
    }

    function configurarToken() {
        const t = prompt("Token GPT-4o:");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    window.onload = () => { window.speechSynthesis.getVoices(); escanearMundo(); };
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
