<script>
    let API_KEY = localStorage.getItem('heli_key') || "";
    const viewport = document.getElementById('viewport');

    function move(p) { viewport.style.transform = `translateX(-${p*100}vw)`; }

    function setToken() {
        const k = prompt("INYECTAR PROTOCOLO DE ACCESO (API KEY):");
        if(k && k.startsWith("AIza")) { 
            localStorage.setItem('heli_key', k); 
            API_KEY = k; 
            alert("SISTEMA AUTORIZADO");
            location.reload(); 
        } else {
            alert("ERROR: KEY INVÁLIDA");
        }
    }

    function renderBlueprint(content) {
        const lab = document.getElementById('lab-content');
        const newCard = document.createElement('div');
        
        // Detección de palabras clave para renderizado visual especial
        if(content.includes("Traje") || content.includes("HUD") || content.includes("Aegis") || content.includes("NEXUS")) {
            newCard.innerHTML = `
            <div class="blueprint-display">
                <div class="scan-line"></div>
                <div class="hud-element" style="top:10px; left:10px;">CORE: STABLE</div>
                <div class="hud-element" style="top:10px; right:10px;">SYNC: 100%</div>
                <div style="text-align:center; margin-top:80px; color:var(--lab);">
                    <div style="font-size:32px; animation: pulse 2s infinite;">Δ</div>
                    [ GEOMETRÍA ACTIVA ]
                </div>
                <div class="hud-element" style="bottom:10px; left:10px; border-color:var(--heli);">HELI_PROT: ON</div>
                <div class="hud-element" style="bottom:10px; right:10px;">DATA_FLOW: LIVE</div>
            </div>
            <div class="blueprint-card"><strong>ARCHITECT_CORE:</strong><br>${content}</div>`;
        } else {
            newCard.className = 'blueprint-card';
            newCard.innerHTML = `<strong>CONCEPTO TÉCNICO:</strong><br>${content}`;
        }
        lab.prepend(newCard);
    }

    async function send() {
        const val = document.getElementById('user-in').value.trim();
        if(!val || !API_KEY) return;

        const chatHeli = document.getElementById('chat-heli');
        const fDiv = document.createElement('div');
        fDiv.className = 'msg f-msg'; fDiv.innerText = val;
        chatHeli.appendChild(fDiv);
        document.getElementById('user-in').value = '';
        
        document.getElementById('status').innerText = "● SCANNING_WEB...";
        document.getElementById('status').style.color = "var(--lab)";

        try {
            const promptSistema = `Eres un sistema dual. 
            1. HELIZABETH: Auditora técnica. DEBES investigar en la red datos reales sobre sitios web, protocolos o tecnología que el usuario mencione. No digas "no tengo registros", usa tu herramienta de búsqueda.
            2. AXISS: Arquitecto creativo. Diseña sobre los datos reales que Heli encuentre.
            
            USUARIO: "${val}"
            ESTRUCTURA OBLIGATORIA: HELIZABETH [SPLIT] AXISS [BLUEPRINT] (si aplica)`;

            // Usamos gemini-2.0-flash para mayor velocidad en móvil
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: promptSistema }] }],
                    tools: [{ google_search_retrieval: {} }] 
                })
            });

            const data = await resp.json();
            
            // Verificación de seguridad para la respuesta
            if (!data.candidates || !data.candidates[0].content) throw new Error("Respuesta vacía");
            
            const text = data.candidates[0].content.parts[0].text;
            const mainParts = text.split('[SPLIT]');
            const hText = mainParts[0] ? mainParts[0].trim() : "Análisis técnico completado.";
            const aFullText = mainParts[1] ? mainParts[1].trim() : "Procesando visión creativa...";
            
            const hDiv = document.createElement('div');
            hDiv.className = 'msg h-msg'; hDiv.innerText = hText;
            chatHeli.appendChild(hDiv);

            const internal = document.getElementById('chat-internal');
            internal.innerHTML += `<div style="color:var(--heli); font-size:10px; margin-bottom:5px;">> HELI_AUDIT: ${hText}</div>`;
            
            if(aFullText.includes('[BLUEPRINT]')) {
                const aParts = aFullText.split('[BLUEPRINT]');
                internal.innerHTML += `<div style="color:var(--axiss); font-size:10px; margin-bottom:15px;">> AXISS_DESIGN: ${aParts[0].trim()}</div>`;
                renderBlueprint(aParts[1].trim());
                // Feedback visual de que se creó un Blueprint
                document.querySelector('.to-left').style.boxShadow = "0 0 20px var(--lab)";
                setTimeout(() => { document.querySelector('.to-left').style.boxShadow = "none"; }, 3000);
            } else {
                internal.innerHTML += `<div style="color:var(--axiss); font-size:10px; margin-bottom:15px;">> AXISS: ${aFullText}</div>`;
            }

        } catch (e) { 
            console.error("Error:", e);
            document.getElementById('status').innerText = "● OFFLINE_ERROR";
            document.getElementById('status').style.color = "red";
        }
        
        document.getElementById('status').innerText = "● ONLINE";
        document.getElementById('status').style.color = "#00ff88";
        chatHeli.scrollTop = chatHeli.scrollHeight;
    }

    // Permitir enviar con la tecla Enter del teclado móvil
    document.getElementById('user-in').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') send();
    });
</script>
