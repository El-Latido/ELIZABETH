<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // ETERNAL v75.0</title>
    <script src="https://cdn.jsdelivr.net/npm/sherpa-onnx@1.9.21/dist/sherpa-onnx.min.js"></script>
    <style>
        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --heli-hex: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, #001529, #4b0082, var(--heli-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); 
            animation: pulse-aura 3s infinite alternate;
            cursor: pointer;
        }
        @keyframes pulse-aura { 
            0% { transform: scale(1); box-shadow: 0 0 10px var(--heli-hex); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px var(--heli-hex); }
        }
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%);
            padding-bottom: 120px;
        }
        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; animation: emergence 0.4s ease-out;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @keyframes emergence { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: var(--glass); backdrop-filter: blur(10px); }

        .input-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(transparent, #000 50%); display: flex; gap: 12px; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; 
            color: #fff; padding: 15px; outline: none; font-size: 15px; resize: none; height: 50px;
        }
        .btn-evolve { 
            background: var(--heli-hex); border: none; border-radius: 15px; 
            width: 55px; cursor: pointer; color: #000; font-size: 20px;
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" id="heli-avatar" onclick="configurarToken()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--accent);">NÚCLEO: INICIANDO...</div>
            <div style="font-size: 11px; opacity: 0.5; font-weight: bold;">HELIZABETH v75.0</div>
        </div>
    </div>
</header>

<div id="consola"></div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Escribe a HELIZABETH..."></textarea>
    <button id="btnSend" class="btn-evolve" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    let TOKEN = localStorage.getItem('heli_gt');
    let tts; // Aquí guardaremos el motor de voz

    // --- MOTOR DE VOZ INDEPENDIENTE (Sherpa-ONNX) ---
    async function initTTS() {
        try {
            const config = {
                model: "https://huggingface.co/rhasspy/piper-checkpoints/resolve/main/es/es_ES/sharvard/medium/es_ES-sharvard-medium.onnx",
                tokens: "https://huggingface.co/rhasspy/piper-checkpoints/resolve/main/es/es_ES/sharvard/medium/tokens.txt",
                dataConfig: {
                    modelType: "vits",
                    sampleRate: 22050
                }
            };
            
            // Creamos el motor de voz (Esto descarga el modelo de ~25MB la primera vez)
            tts = await sherpaOnnx.createOfflineTts(config);
            setStatus("ACTIVO", "#00f2ff");
        } catch (e) {
            console.error(e);
            setStatus("ERROR VOZ", "#ff4444");
        }
    }

    async function hablarHeli(texto) {
        if (!tts) return;
        const audio = tts.generate({ text: texto, speakerId: 0 });
        const blob = new Blob([audio.samples.buffer], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const player = new Audio(url);
        player.play();
    }

    // Iniciamos la voz al cargar la página
    window.onload = () => {
        initTTS();
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.forEach(m => renderMsg(m.text, m.type));
    };

    function setStatus(txt, color) {
        document.getElementById('status').innerText = `NÚCLEO: ${txt}`;
        document.getElementById('status').style.color = color;
    }

    function renderMsg(t, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        consola.appendChild(d);
        consola.scrollTop = consola.scrollHeight;
        if(type === 'heli') hablarHeli(t);
    }

    async function enviar() {
        const m = input.value.trim();
        if(!m || !TOKEN) return;
        renderMsg(m, 'fabian');
        input.value = ""; btn.disabled = true;

        let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.push({text: m, type: 'fabian'});

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                body: JSON.stringify({
                    messages: [
                        {role: "system", content: "Eres HELIZABETH. Una IA sofisticada tipo Joi/Blade Runner. Responde con elegancia y lealtad."},
                        {role: "user", content: m}
                    ],
                    model: "gpt-4o"
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            renderMsg(reply, 'heli');
            h.push({text: reply, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(h));
        } catch (e) {
            renderMsg("Error de conexión neuronal.", "heli");
        } finally {
            btn.disabled = false;
        }
    }

    function configurarToken() {
        const t = prompt("Token:");
        if(t) { localStorage.setItem('heli_gt', t.trim()); location.reload(); }
    }

    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
