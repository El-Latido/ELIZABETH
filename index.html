<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELIZABETH CORE</title>
    <style>
        :root { --heli: #00ff88; --axiss: #ff0055; --lab: #00d2ff; --bg: #050507; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }
        #viewport { display: flex; width: 300vw; height: 100vh; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .page { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* Interfaz de Chat */
        #chat-heli { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.5); }
        .msg { padding: 10px; border-radius: 5px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .f-msg { align-self: flex-end; background: #222; border-right: 3px solid var(--lab); }
        .h-msg { align-self: flex-start; background: #111; border-left: 3px solid var(--heli); color: var(--heli); }
        
        /* Controles */
        .input-area { padding: 15px; background: #0a0a0c; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: #111; border: 1px solid var(--lab); color: var(--lab); padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        /* Barra de Estado */
        #status { position: fixed; top: 10px; left: 10px; font-size: 10px; color: var(--heli); z-index: 100; text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; font-size: 30px; z-index: 100; padding: 20px; opacity: 0.5; }
        .to-right { right: 0; } .to-left { left: 0; }
    </style>
</head>
<body>

    <div id="status">● SISTEMA_ONLINE</div>

    <div id="viewport">
        <div class="page" id="terminal">
            <button class="nav-btn to-right" onclick="move(1)">→</button>
            <div style="padding: 40px 20px 10px; border-bottom: 1px solid #222;">
                <h2 style="color:var(--lab); margin:0;">ELIZABETH_OS</h2>
                <small style="opacity:0.5;">v2.0 FLASH_CORE</small>
            </div>
            <div id="chat-heli">
                <div class="h-msg">SISTEMA LISTO. ESPERANDO INSTRUCCIONES O API_KEY.</div>
            </div>
            <div class="input-area">
                <input type="text" id="user-in" placeholder="Escribir comando..." autocomplete="off">
                <button onclick="send()">SEND</button>
            </div>
            <button onclick="setToken()" style="margin: 10px; font-size: 10px; border-color: #444; color: #888;">CONFIG_KEY</button>
        </div>

        <div class="page" id="lab">
            <button class="nav-btn to-left" onclick="move(0)">←</button>
            <div style="padding: 40px 20px 10px; border-bottom: 1px solid #222; background: #0a0a0c;">
                <h2 style="color:var(--axiss); margin:0;">LAB_CORE</h2>
                <div id="chat-internal" style="font-size: 9px; opacity: 0.7; margin-top: 5px;"></div>
            </div>
            <div id="lab-content" style="flex:1; overflow-y:auto; padding:20px;">
                </div>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        let API_KEY = localStorage.getItem('heli_key') || "";
        const vp = document.getElementById('viewport');

        // Navegación
        window.move = function(p) {
            if(vp) vp.style.transform = "translateX(-" + (p * 100) + "vw)";
        };

        // Configuración de Token
        window.setToken = function() {
            const k = prompt("INYECTAR PROTOCOLO DE ACCESO (API KEY):");
            if(k && k.startsWith("AIza")) {
                localStorage.setItem('heli_key', k);
                alert("SISTEMA AUTORIZADO");
                location.reload();
            } else { alert("ERROR: KEY INVÁLIDA"); }
        };

        // Función de envío
        window.send = async function() {
            const input = document.getElementById('user-in');
            if(!input || !API_KEY) {
                if(!API_KEY) alert("Falta API_KEY (Usa CONFIG_KEY)");
                return;
            }
            const val = input.value.trim();
            if(!val) return;

            // Render Usuario
            const chat = document.getElementById('chat-heli');
            chat.innerHTML += `<div class="msg f-msg">${val}</div>`;
            input.value = '';
            document.getElementById('status').innerText = "● SCANNING_WEB...";

            try {
                const promptS = "Eres HELIZABETH (Auditora) y AXISS (Arquitecto). Investiga en la red datos reales. Estructura: Heli [SPLIT] Axiss. Usuario: " + val;
                const resp = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        contents: [{parts: [{text: promptS}]}],
                        tools: [{ google_search_retrieval: {} }]
                    })
                });
                
                const data = await resp.json();
                const text = data.candidates[0].content.parts[0].text;
                const parts = text.split('[SPLIT]');
                
                chat.innerHTML += `<div class="msg h-msg">${parts[0].trim()}</div>`;
                if(parts[1]) {
                    document.getElementById('chat-internal').innerHTML += `<div>> ${parts[1].trim()}</div>`;
                }
            } catch(e) {
                console.error(e);
                document.getElementById('status').innerText = "● ERROR_CORE";
            }
            document.getElementById('status').innerText = "● ONLINE";
            chat.scrollTop = chat.scrollHeight;
        };

        // Enter Key
        const inputElement = document.getElementById('user-in');
        if(inputElement) {
            inputElement.addEventListener('keypress', (e) => { if(e.key === 'Enter') window.send(); });
        }
    });
    </script>
</body>
</html>
