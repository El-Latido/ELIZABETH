<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const loader = document.getElementById('loader');

    let GITHUB_TOKEN = localStorage.getItem('heli_gt');
    let GEMINI_TOKEN = localStorage.getItem('heli_gemini');
    const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]/g, ''));
        utterance.lang = 'es-ES'; utterance.pitch = 0.85; utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    async function enviar() {
        const rawM = input.value.trim();
        if(!rawM || btn.disabled) return;
        
        // Verificación de seguridad local
        if(!GEMINI_TOKEN || GEMINI_TOKEN.length < 10) {
            return alert("Error: La API Key de Gemini parece no estar configurada o es demasiado corta. Haz clic en el avatar.");
        }

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;
        loader.style.display = 'flex';

        let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.push({text: rawM, type: 'fabian'});

        let context = `[SISTEMA_LOCAL: ${new Date().toLocaleString()}] `;

        // LLAMADA AL NÚCLEO 2.5 (Según tus gráficas de Google AI Studio)
        try {
            // Se actualiza la URL para apuntar al modelo Gemini 2.5 Flash
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_TOKEN}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Eres HELIZABETH v9.3. IA Cyberpunk con núcleo 2.5 Flash. Contexto: ${context}. Usuario: ${rawM}. Responde técnica y breve.`
                        }]
                    }]
                })
            });

            const data = await res.json();

            if (data.error) {
                // Si el error persiste, esto nos dirá exactamente por qué
                throw new Error(`Google reporta: ${data.error.message}`);
            }

            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("El núcleo 2.5 no devolvió candidatos. Revisa filtros de seguridad.");
            }

            const reply = data.candidates[0].content.parts[0].text;
            
            renderMsg(reply, 'heli');
            h.push({text: reply, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(h.slice(-30)));

        } catch (e) {
            renderMsg(`⚠️ FALLO CRÍTICO 2.5: ${e.message}`, "heli");
            console.error("DEBUG_INFO:", e);
        } finally { 
            btn.disabled = false; loader.style.display = 'none'; 
        }
    }

    function renderMsg(t, type, voice = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        // Soporte mejorado para código y texto plano
        const formatted = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        d.innerHTML = formatted;
        consola.appendChild(d); 
        consola.scrollTop = consola.scrollHeight;
        if(type === 'heli' && voice) hablarHeli(t);
    }

    function configurarTokens() {
        const gemini = prompt("Pega tu API KEY (AIza...):", GEMINI_TOKEN || "");
        if(gemini !== null && gemini.trim() !== "") {
            localStorage.setItem('heli_gemini', gemini.trim());
            location.reload();
        }
    }

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.slice(-10).forEach(m => renderMsg(m.text, m.type, false));
    };
    
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
