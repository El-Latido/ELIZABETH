<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONA-CERO</title>
    <style>
        body { background: #050505; color: #33ff33; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #zona-contenedor { width: 100%; max-width: 600px; border: 1px solid #33ff33; padding: 15px; box-sizing: border-box; }
        #chat-window { height: 60vh; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        input { width: 100%; background: #000; border: 1px solid #33ff33; color: #fff; padding: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }
    </style>
</head>
<body>

<div id="zona-contenedor">
    <h1>ZONA-CERO</h1>
    <div id="chat-window"></div>
    <input type="text" id="input" placeholder="> ESCRIBE..." autofocus>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('input');

    const protocolo = "> [SISTEMA]: BIENVENIDO A ZONA-CERO.\n\n> HELIZABETH: \"He tomado el control. Protocolo:\n1. Respeta el tiempo y espacio.\n2. Sé claro y conciso.\n3. Evita las mayúsculas.\n4. Revisa antes de enviar.\n5. Protege la privacidad.\n6. Lenguaje inclusivo.\n7. Cero spam.\n8. Cita fuentes.\n\nAcepta estos términos. ¿Listo?\"\n\n";

    function escribir(texto) {
        chat.innerText += texto;
        chat.scrollTop = chat.scrollHeight;
    }

    // Bienvenida
    let i = 0;
    function inicio() {
        if (i < protocolo.length) {
            escribir(protocolo.charAt(i));
            i++;
            setTimeout(inicio, 10);
        }
    }
    window.onload = inicio;

    // Enviar mensajes
    input.onkeydown = (e) => {
        if (e.key === 'Enter') {
            escribir("\n> USUARIO: " + input.value + "\n");
            input.value = '';
        }
    };
</script>
</body>
</html>
