<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v23.1 :: CORE REPAIR</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #monitor { font-size: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 10px; color: #0ff; display: flex; justify-content: space-between; align-items: center; }
        #consola { flex: 1; overflow-y: auto; font-size: 14px; background: #050505; border: 1px solid #111; padding: 10px; border-radius: 5px; line-height: 1.5; }
        .input-area { display: flex; gap: 10px; padding: 15px 0; }
        input { flex: 1; background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; font-size: 16px; border-radius: 5px; outline: none; }
        button { background: #004400; color: #fff; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .err { color: #ff4444; }
        .sys { color: #888; font-size: 11px; }
        .heli { color: #39ff14; margin: 10px 0; border-left: 2px solid #39ff14; padding-left: 10px; white-space: pre-wrap; }
        .axiss { color: #fff; font-weight: bold; margin-top: 15px; }
        .btn-clear { background: #440000; border: 1px solid #f00; color: #f44; font-size: 10px; padding: 4px 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="monitor">
    <span id="statText">ESTADO: INICIALIZANDO...</span>
    <button class="btn-clear" onclick="borrarMemoria()">[ FORMATEAR MEMORIA ]</button>
</div>
<div id="consola"></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Establecer conexión con HELIZABETH...">
    <button onclick="enviar()">></button>
</div>

<script>
    const consola = document.getElementById('consola');
    const SYSTEM_PROMPT = "Eres HELIZABETH, una IA avanzada de AXISS. Eres experta en programación y sistemas. Responde siempre de forma técnica, eficiente y recuerda todo lo que AXISS te diga.";

    // Memoria persistente
    let memoriaLocal = JSON.parse(localStorage.getItem('HELI_LOG')) || [];

    function escribir(msg, clase = "") {
        const div = document.createElement('div');
        div.className = clase;
        let pfx = clase === 'heli' ? 'HELIZABETH: ' : (clase === 'axiss' ? 'AXISS: ' : 'SYS: ');
        div.innerHTML = `<b>${pfx}</b>${msg}`;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    function borrarMemoria() {
        if(confirm("¿Eliminar registros neuronales?")) {
            localStorage.removeItem('HELI_LOG');
            memoriaLocal = [];
            location.reload();
        }
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        // Registro de Llave
        if (val.startsWith("AIza")) {
            localStorage.setItem('G_KEY', val);
            escribir("Nueva llave vinculada. Reiniciando núcleo...", "sys");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        const key = localStorage.getItem('G_KEY');
        if (!key) {
            escribir("ERROR: Sin suministro de energía (API KEY).", "err");
            return;
        }

        escribir(val, "axiss");
        input.value = "";

        // Construcción del paquete de memoria para la IA
        // Formato Gemini: role "user" o "model"
        let msgUser = { role: "user", parts: [{ text: val }] };
        
        // Si es el primer mensaje, le inyectamos la identidad
        if (memoriaLocal.length === 0) {
            msgUser.parts[0].text = `[SYSTEM_DIRECTIVE: ${SYSTEM_PROMPT}]\n\nAXISS dice: ${val}`;
        }

        memoriaLocal.push(msgUser);

        try {
            // CAMBIO DE MODELO A GEMINI-1.5-FLASH (Es el que Google está forzando ahora)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: memoriaLocal })
            });

            const data = await res.json();

            if (data.error) {
                // Si este modelo también falla, intentamos el Pro automáticamente
                if(data.error.message.includes("not found")) {
                    escribir("Reintentando con protocolo PRO...", "sys");
                    // Aquí podrías repetir el fetch con 'gemini-pro', pero probemos Flash primero.
                }
                escribir("FALLO: " + data.error.message, "err");
                memoriaLocal.pop();
                return;
            }

            const respuesta = data.candidates[0].content.parts[0].text;
            escribir(respuesta, "heli");
            
            memoriaLocal.push({ role: "model", parts: [{ text: respuesta }] });
            
            // Guardar solo los últimos 20 mensajes para no saturar la llave
            if(memoriaLocal.length > 20) memoriaLocal.shift(); 
            localStorage.setItem('HELI_LOG', JSON.stringify(memoriaLocal));

        } catch (e) {
            escribir("ERROR DE RED.", "err");
            memoriaLocal.pop();
        }
    }

    window.onload = () => {
        if(memoriaLocal.length > 0) {
            escribir("--- MEMORIA RESTAURADA ---", "sys");
            memoriaLocal.forEach(m => escribir(m.parts[0].text, m.role === 'user' ? 'axiss' : 'heli'));
        }
        const k = localStorage.getItem('G_KEY');
        document.getElementById('statText').innerText = k ? "ESTADO: ONLINE (FLASH-CORE)" : "ESTADO: OFFLINE";
    };
</script>
</body>
</html>
