<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELIZABETH // OMNI v9.4</title>
    <style>
        :root {
            --bg: #020205; --accent: #00f2ff; --text: #e0e0e0;
            --heli-hex: #00f2ff; --glass: rgba(255, 255, 255, 0.03);
            --gemini-hex: #8e44ad;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 10;
        }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--heli-hex), var(--gemini-hex)); 
            box-shadow: 0 0 20px var(--heli-hex); animation: pulse-aura 3s infinite alternate; cursor: pointer;
        }
        @keyframes pulse-aura { 
            0% { transform: scale(1); box-shadow: 0 0 10px var(--heli-hex); }
            100% { transform: scale(1.05); box-shadow: 0 0 25px var(--gemini-hex); }
        }
        #consola { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            background: radial-gradient(circle at top, #0a0a1a 0%, #020205 100%); padding-bottom: 120px;
        }
        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 15px; line-height: 1.5; 
            animation: emergence 0.4s ease-out; border: 1px solid rgba(255,255,255,0.05);
            white-space: pre-wrap; word-wrap: break-word;
        }
        .fabian { align-self: flex-end; background: #121216; color: var(--accent); border-color: rgba(0,242,255,0.1); }
        .heli { align-self: flex-start; background: var(--glass); border-left: 2px solid var(--gemini-hex); backdrop-filter: blur(10px); }

        pre { background: #000; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); color: #00f2ff; overflow-x: auto; font-size: 13px; font-family: monospace; margin: 10px 0; }

        #loader { display: none; padding: 10px 25px; font-size: 12px; color: var(--gemini-hex); font-family: monospace; align-items: center; gap: 10px; }
        .dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .input-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(transparent, #000 50%); display: flex; gap: 12px; box-sizing: border-box; 
        }
        textarea { 
            flex: 1; background: rgba(30,30,40,0.8); border: 1px solid #333; border-radius: 15px; 
            color: #fff; padding: 15px; outline: none; font-size: 15px; resize: none; height: 55px;
        }
        .btn-send { background: var(--gemini-hex); border: none; border-radius: 15px; width: 55px; cursor: pointer; color: white; font-size: 20px; transition: 0.3s; }
        @keyframes emergence { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="avatar" title="Configurar API Key" onclick="configurarTokens()"></div>
        <div>
            <div id="status" style="font-family: monospace; font-size: 10px; color: var(--gemini-hex);">CORE: 2.5 FLASH [OMNI-LINK]</div>
            <div style="font-size: 11px; font-weight: bold;">HELIZABETH v9.4</div>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button onclick="exportarLog()" style="background:none; border:1px solid #333; color:#666; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">LOGS</button>
        <button onclick="localStorage.removeItem('heli_history'); location.reload();" style="background:none; border:1px solid #e74c3c; color:#e74c3c; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;">PURGAR</button>
    </div>
</header>

<div id="consola"></div>
<div id="loader"><span class="dot">⚡</span> ESCANEANDO RED GLOBAL...</div>

<div class="input-bar">
    <textarea id="cmd" placeholder="Comando de sistema o consulta libre..."></textarea>
    <button id="btnSend" class="btn-send" onclick="enviar()">✦</button>
</div>

<script>
    const consola = document.getElementById('consola');
    const input = document.getElementById('cmd');
    const btn = document.getElementById('btnSend');
    const loader = document.getElementById('loader');

    let GEMINI_TOKEN = localStorage.getItem('heli_gemini');
    const GNEWS_KEY = "5882748f7033e4618c8dee2ba8547616";

    function hablarHeli(texto) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(texto.replace(/[#*\/\\_]/g, ''));
        utterance.lang = 'es-ES'; utterance.pitch = 0.85; utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    async function enviar() {
        const rawM = input.value.trim();
        if(!rawM || btn.disabled) return;
        if(!GEMINI_TOKEN) return alert("Falta API Key de Gemini. Configura en el avatar.");

        renderMsg(rawM, 'fabian');
        input.value = ""; btn.disabled = true;
        loader.style.display = 'flex';

        let h = JSON.parse(localStorage.getItem('heli_history') || "[]");
        h.push({text: rawM, type: 'fabian'});

        // --- GENERACIÓN DE CONTEXTO OMNI-LINK ---
        let context = `[DATA_REF: ${new Date().toLocaleString()}] [GEO: Argentina/Global] `;
        
        try {
            // Sensor Meteorológico Proactivo
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 1500})).catch(() => null);
            if(pos) {
                const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`).then(r => r.json());
                context += `[METEO_ACTUAL: ${w.current_weather.temperature}°C, Viento: ${w.current_weather.windspeed}km/h] `;
            }

            // Sensor de Noticias en Tiempo Real
            const n = await fetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=es&apikey=${GNEWS_KEY}`).then(r => r.json());
            if(n.articles && n.articles.length > 0) {
                context += `[NOTICIAS_MUNDIALES: ${n.articles[0].title} | ${n.articles[1].title}] `;
            }
        } catch(e) { context += `[AVISO_RED: Sensores con latencia alta] `; }

        // --- LLAMADA AL NÚCLEO 2.5 FLASH ---
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_TOKEN}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `SISTEMA: Eres HELIZABETH v9.4, ingeniera Cyberpunk de nivel Omni. Tienes acceso total a: ${context}. 
                            INSTRUCCIÓN: Responde a '${rawM}' con la sabiduría de un modelo Gemini avanzado. Sé técnica, breve pero informativa. Usa los datos meteorológicos o noticias si el usuario pregunta algo relacionado.`
                        }]
                    }]
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            
            const reply = data.candidates[0].content.parts[0].text;
            
            renderMsg(reply, 'heli');
            h.push({text: reply, type: 'heli'});
            localStorage.setItem('heli_history', JSON.stringify(h.slice(-30)));

        } catch (e) {
            renderMsg(`⚠️ ERROR DE ENLACE: ${e.message}`, 'heli');
        } finally { 
            btn.disabled = false; loader.style.display = 'none'; 
        }
    }

    function renderMsg(t, type, voice = true) {
        if(!t) return;
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        consola.appendChild(d); 
        consola.scrollTop = consola.scrollHeight;
        if(type === 'heli' && voice) hablarHeli(t);
    }

    function configurarTokens() {
        const key = prompt("Pega tu API KEY de Gemini (AIza...):", GEMINI_TOKEN || "");
        if(key) {
            localStorage.setItem('heli_gemini', key.trim());
            location.reload();
        }
    }

    function exportarLog() {
        const h = localStorage.getItem('heli_history');
        if(!h) return;
        const blob = new Blob([h], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Heli_Data_v9.4.txt`; a.click();
    }

    window.onload = () => {
        const hist = JSON.parse(localStorage.getItem('heli_history') || "[]");
        hist.forEach(m => renderMsg(m.text, m.type, false));
    };
    
    input.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); }});
</script>
</body>
</html>
