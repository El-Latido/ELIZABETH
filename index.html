<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELIZABETH v24.0</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #consola { flex: 1; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #050505; margin-bottom: 10px; font-size: 14px; line-height: 1.5; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; background: #111; color: #fff; border: 1px solid #39ff14; padding: 12px; outline: none; }
        button { background: #39ff14; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .axiss { color: #fff; margin-top: 10px; }
        .heli { color: #39ff14; margin-bottom: 15px; border-left: 2px solid #39ff14; padding-left: 10px; }
        .sys { color: #0ff; font-size: 11px; }
    </style>
</head>
<body>

<div id="status" class="sys">ESTADO: ESPERANDO COMANDO...</div>
<div id="consola">--- NÚCLEO HELIZABETH CARGADO ---<br></div>

<div class="input-area">
    <input type="text" id="cmd" placeholder="Escribe 'Hola' o pega tu nueva AIza...">
    <button onclick="enviar()">ENVIAR</button>
</div>

<script>
    const consola = document.getElementById('consola');
    
    function escribir(msg, clase = "") {
        const div = document.createElement('div');
        div.className = clase;
        div.innerHTML = `<b>${clase.toUpperCase() || 'SYS'}:</b> ${msg}`;
        consola.appendChild(div);
        consola.scrollTop = consola.scrollHeight;
    }

    async function enviar() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if (!val) return;

        // Si pegas la llave nueva directamente
        if (val.startsWith("AIza")) {
            localStorage.setItem('G_KEY', val);
            escribir("LLAVE VINCULADA. REINICIANDO...", "sys");
            setTimeout(() => location.reload(), 1000);
            return;
        }

        const key = localStorage.getItem('G_KEY');
        if (!key) { escribir("ERROR: NO HAY LLAVE.", "sys"); return; }

        escribir(val, "axiss");
        input.value = "";
        document.getElementById('status').innerText = "ESTADO: PROCESANDO...";

        try {
            // USAMOS LA URL MÁS SIMPLE Y COMPATIBLE DE GOOGLE
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: val }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                escribir(`ERROR ${data.error.code}: ${data.error.message}`, "sys");
                document.getElementById('status').innerText = "ESTADO: FALLIDO";
                return;
            }

            const txt = data.candidates[0].content.parts[0].text;
            escribir(txt, "heli");
            document.getElementById('status').innerText = "ESTADO: ONLINE";

        } catch (e) {
            escribir("FALLO CRÍTICO DE CONEXIÓN.", "sys");
        }
    }
</script>
</body>
</html>
